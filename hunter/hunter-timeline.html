<style>
:root{--bg:#080f0a;--bg2:#0f1a10;--bg3:#1a2e1c;--g:#52b788;--gd:#2d6a4f;--gy:rgba(82,183,136,0.12);--text:#e8f5e9;--muted:#6b7280;--card:rgba(255,255,255,0.035);--border:rgba(82,183,136,0.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:var(--bg);min-height:100vh;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:var(--text);padding-bottom:80px}

/* ── HEADER ── */
#hd{background:linear-gradient(135deg,#0a1e0c 0%,#061408 100%);border-bottom:1px solid rgba(82,183,136,0.2);padding:14px 14px 10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,0.6)}
.hd-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hd-icon{width:40px;height:40px;border-radius:10px;filter:drop-shadow(0 0 8px rgba(82,183,136,0.6))}
.hd-texts .sub{font-size:9px;color:rgba(82,183,136,0.7);letter-spacing:2px;text-transform:uppercase}
.hd-texts .ttl{font-size:17px;font-weight:800;color:#e8f5e9;line-height:1.2;letter-spacing:-0.5px}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:rgba(82,183,136,0.7);margin-bottom:4px}
.prog-bg{background:rgba(82,183,136,0.1);border-radius:6px;height:7px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#2d6a4f,#52b788,#95d5b2);border-radius:6px;transition:width .6s ease}
#cannow-badge{display:none;margin-top:6px;background:rgba(82,183,136,0.12);border:1px solid rgba(82,183,136,0.35);border-radius:7px;padding:4px 10px;font-size:10px;color:#95d5b2}
#sync-bar{font-size:9px;margin-top:4px;color:rgba(82,183,136,0.4);min-height:12px}
#sync-bar.ok{color:#52b788}#sync-bar.err{color:#f87171}#sync-bar.ing{color:#fbbf24}

/* ── TOOLBAR ── */
#toolbar{padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap}
.tb{padding:5px 10px;border-radius:8px;border:1px solid rgba(82,183,136,0.25);background:rgba(82,183,136,0.08);color:rgba(82,183,136,0.8);font-size:10px;font-family:inherit;cursor:pointer;transition:all .2s}
.tb:active{background:rgba(82,183,136,0.2)}

/* ── TABS ── */
#tabs{padding:6px 12px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
#tabs::-webkit-scrollbar{display:none}
.tabs-inner{display:flex;gap:5px;min-width:max-content}
.tab{padding:5px 10px;border-radius:16px;border:none;cursor:pointer;font-size:10px;font-family:inherit;white-space:nowrap;background:rgba(255,255,255,0.05);color:#888;transition:all .2s}
.tab.on{font-weight:700;color:#fff}
.tab-pend{border:1px solid #444;background:transparent;color:#666}
.tab-pend.on{border-color:#fbbf24;background:rgba(251,191,36,.12);color:#fbbf24}

/* ── TASKS ── */
#tasks{padding:0 12px}
.phase-sec{margin-bottom:20px}
.phase-hd{display:flex;align-items:center;gap:8px;padding:8px 0 6px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)}
.phase-nm{font-weight:800;font-size:13px}
.phase-ct{font-size:9px;color:#555;margin-left:auto;background:rgba(255,255,255,0.04);padding:2px 7px;border-radius:8px}

.tcard{border-radius:10px;overflow:hidden;margin-bottom:6px;border:1px solid rgba(255,255,255,0.06);transition:all .2s}
.tcard.done{background:rgba(82,183,136,0.05);border-color:rgba(45,106,79,0.25)}
.tcard.now{background:rgba(82,183,136,0.09);border-color:rgba(82,183,136,0.28)}
.tcard.urg.now{background:rgba(251,191,36,0.07);border-color:rgba(251,191,36,0.25)}
.tcard.norm{background:var(--card)}

.thead{padding:10px 11px;cursor:pointer;user-select:none;display:flex;align-items:flex-start;gap:8px}
.chk{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:2px solid #444;background:transparent;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;transition:all .2s;font-family:inherit}
.chk.on{border-color:var(--g);background:var(--g)}
.tmain{flex:1;min-width:0}
.trow{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:2px}
.ttl{font-size:13px;font-weight:600;color:var(--text)}
.ttl.done{text-decoration:line-through;color:#4a7c59}
.b-now{font-size:8px;background:rgba(82,183,136,0.15);color:#52b788;border:1px solid rgba(82,183,136,0.35);border-radius:4px;padding:1px 5px;white-space:nowrap}
.b-urg{font-size:8px;background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.35);border-radius:4px;padding:1px 5px;white-space:nowrap}
.b-done{font-size:8px;background:rgba(82,183,136,0.1);color:#4a7c59;border:1px solid rgba(45,106,79,0.3);border-radius:4px;padding:1px 5px;white-space:nowrap}
.b-dt{font-size:8px;color:#666;background:rgba(255,255,255,0.04);border-radius:4px;padding:1px 5px}
.tdet{font-size:11px;color:#5a6e5e;line-height:1.5}
.chev{color:#444;font-size:10px;flex-shrink:0;margin-top:3px}

.titems{border-top:1px solid rgba(255,255,255,0.04);padding:0;background:rgba(0,0,0,0.2);display:none;overflow:hidden;transition:max-height .3s}
.titems.open{display:block}
.titems-inner{padding:8px 11px 10px 38px}
.ilbl{font-size:9px;color:rgba(82,183,136,0.6);margin-bottom:5px;letter-spacing:1px;font-weight:700}
.irow{font-size:11px;color:#8aab8e;padding:2px 0;display:flex;align-items:flex-start;gap:5px;line-height:1.4}
.idot{color:rgba(82,183,136,0.5);font-size:9px;margin-top:3px;flex-shrink:0}
.irow.done-item{color:#4a6e4e;text-decoration:line-through}

/* ── MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.mbox{background:#0f1e10;border:1px solid rgba(82,183,136,0.25);border-radius:14px;padding:18px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto}
.mbox h3{color:#74b49b;font-size:14px;margin-bottom:8px}
.mbox p{color:#6a8a6e;font-size:11px;margin-bottom:10px;line-height:1.7}
.mbox textarea{width:100%;height:100px;background:rgba(0,0,0,0.3);border:1px solid rgba(82,183,136,0.25);border-radius:7px;color:#e8f5e9;font-size:10px;padding:7px;font-family:monospace;resize:none;margin-bottom:10px}
.mbox input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(82,183,136,0.25);border-radius:7px;color:#e8f5e9;font-size:12px;padding:8px;font-family:inherit;margin-bottom:8px}
.mbtns{display:flex;gap:7px;flex-wrap:wrap}
.mb{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-family:inherit;cursor:pointer;min-width:70px}
.mb.p{background:var(--g);color:#fff;font-weight:700}
.mb.s{background:rgba(255,255,255,0.07);color:#aaa}

/* ── FOOTER ── */
#foot{margin:14px 12px 0;background:rgba(255,255,255,0.02);border-radius:9px;padding:8px 11px;font-size:9px;color:#3a4e3c;line-height:1.8;border:1px solid rgba(255,255,255,0.04)}
</style>
</head>
<body>

// SYNC（JSONBin.io）
// ════════════════════════════════════════════════════
const JB = 'https://api.jsonbin.io/v3';
let syncTimer = null;

function getSC(){
  try{return{key:localStorage.getItem('jb_key')||'',bin:localStorage.getItem('jb_bin')||''};}
  catch(e){return{key:'',bin:''};}
}
function setSC(k,b){localStorage.setItem('jb_key',k);localStorage.setItem('jb_bin',b);}

function sts(msg,cls=''){const e=document.getElementById('sync-bar');e.textContent=msg;e.className=cls;}

async function pushCloud(data){
  const {key,bin}=getSC();if(!key||!bin)return;
  try{
    sts('☁️ 保存中...','ing');
    const r=await fetch(`${JB}/b/${bin}`,{method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':key,'X-Bin-Private':'false'},
      body:JSON.stringify({tasks:data})});
    if(!r.ok)throw new Error(r.status);
    const now=new Date();
    sts(`✅ 同期完了 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`,'ok');
  }catch(e){sts('⚠️ 同期失敗','err');}
}

async function pullCloud(){
  const {key,bin}=getSC();if(!key||!bin){sts('⚙️ 同期未設定（ツールバーから設定）');return;}
  try{
    sts('🔄 同期中...','ing');
    const r=await fetch(`${JB}/b/${bin}/latest`,{headers:{'X-Master-Key':key}});
    if(!r.ok)throw new Error(r.status);
    const j=await r.json();const arr=j.record?.tasks||[];
    if(arr.length>0){
      tasks=INIT.map(t=>{const f=arr.find(x=>x.id===t.id);return f?{...t,done:f.done}:{...t};});
      saveL();render();
    }
    const now=new Date();
    sts(`✅ 同期完了 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`,'ok');
  }catch(e){sts('⚠️ クラウド読込失敗','err');}
}

async function initSync(){
  const key=document.getElementById('api-key-inp').value.trim();
  if(!key){alert('APIキーを入力してください');return;}
  sts('🚀 初期化中...','ing');
  try{
    const existBin=document.getElementById('bin-id-inp').value.trim();
    if(existBin){setSC(key,existBin);await pullCloud();document.getElementById('bin-display').textContent='Bin ID: '+existBin;return;}
    const r=await fetch(`${JB}/b`,{method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':key,'X-Bin-Name':'hunter-timeline','X-Bin-Private':'false'},
      body:JSON.stringify({tasks:tasks.map(t=>({id:t.id,done:t.done}))})});
    if(!r.ok)throw new Error(await r.text());
    const j=await r.json();const bin=j.metadata.id;
    setSC(key,bin);
    document.getElementById('bin-display').textContent='Bin ID: '+bin;
    sts('✅ 同期設定完了！','ok');
    alert(`✅ 同期完了！
iPhoneでも同じAPIキーとBin ID「${bin}」を入力してください。`);
  }catch(e){sts('❌ 設定失敗','err');alert('失敗: '+e.message);}
}

async function manualSync(){await pullCloud();}

function schedPush(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>pushCloud(tasks.map(t=>({id:t.id,done:t.done}))),800);
}

// STATE
// ════════════════════════════════════════════════════
let tasks=loadL(), activePhase='全て', showPend=false, expId=null;

function loadL(){
  try{const s=localStorage.getItem('hunter_v5');
    if(s){const sv=JSON.parse(s);return INIT.map(t=>{const f=sv.find(x=>x.id===t.id);return f?{...t,done:f.done}:{...t};});}
  }catch(e){}
  return INIT.map(t=>({...t}));
}
function saveL(){localStorage.setItem('hunter_v5',JSON.stringify(tasks.map(t=>({id:t.id,done:t.done}))));}

// ════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════
function render(){
  const done=tasks.filter(t=>t.done).length;
  const pct=Math.round(done/tasks.length*100);
  document.getElementById('ptxt').textContent=`${done}/${tasks.length} (${pct}%)`;
  document.getElementById('pfill').style.width=pct+'%';
  const cn=tasks.filter(t=>!t.done&&t.now).length;
  const cb=document.getElementById('cannow-badge');
  cb.style.display=cn>0?'block':'none';
  cb.textContent=`⚡ 今すぐできること：${cn}件`;

  // tabs
  const ti=document.getElementById('ti');
  ti.innerHTML=['全て',...PHASES].map(p=>{
    const act=activePhase===p;
    const col=PCOL[p]||'#52b788';
    const st=act&&p!=='全て'?`background:${col};color:#fff;font-weight:700`:act?`background:#52b788;color:#fff;font-weight:700`:'';
    return `<button class="tab${act?' on':''}" style="${st}" onclick="setP(${JSON.stringify(p)})">${p}</button>`;
  }).join('')+`<button class="tab tab-pend${showPend?' on':''}" onclick="togPend()">未完了のみ</button>`;

  // tasks
  const phases=PHASES.filter(p=>activePhase==='全て'||p===activePhase);
  let html='';
  for(const ph of phases){
    const pt=tasks.filter(t=>{if(t.ph!==ph)return false;if(showPend&&t.done)return false;return true;});
    if(!pt.length)continue;
    const pd=tasks.filter(t=>t.ph===ph&&t.done).length;
    const ptot=tasks.filter(t=>t.ph===ph).length;
    const col=PCOL[ph];
    html+=`<div class="phase-sec"><div class="phase-hd" style="border-bottom-color:${col}30">
      <span class="phase-nm" style="color:${col}">${ph}</span>
      <span class="phase-ct">${pd}/${ptot}</span></div>`;
    for(const t of pt){
      const cls=t.done?'done':t.now&&t.urg?'urg now':t.now?'now':'norm';
      const bl=t.done?'#2d6a4f':t.urg&&t.now?'#fbbf24':t.now?'#52b788':col;
      const ex=expId===t.id;
      html+=`<div class="tcard ${cls}" style="border-left:3px solid ${bl}">
        <div class="thead" onclick="togExp(${t.id})">
          <button class="chk${t.done?' on':''}" onclick="event.stopPropagation();togDone(${t.id})">${t.done?'✓':''}</button>
          <div class="tmain">
            <div class="trow">
              <span class="ttl${t.done?' done':''}">${t.tt}</span>
              ${t.done?'<span class="b-done">✅ 完了</span>':''}
              ${t.urg&&!t.done?'<span class="b-urg">⚠️ 急ぎ</span>':''}
              ${t.now&&!t.done?'<span class="b-now">⚡ 今すぐ</span>':''}
              ${t.date?`<span class="b-dt">📅 ${t.date}</span>`:''}
            </div>
            <div class="tdet">${t.dt}</div>
          </div>
          <span class="chev">${ex?'▲':'▼'}</span>
        </div>
        ${t.items.length?`<div class="titems${ex?' open':''}"><div class="titems-inner">
          <div class="ilbl">📋 持ち物・やること</div>
          ${t.items.map(i=>`<div class="irow"><span class="idot">◆</span>${i}</div>`).join('')}
        </div></div>`:''}
      </div>`;
    }
    html+='</div>';
  }
  document.getElementById('tasks').innerHTML=html;
}

function setP(p){activePhase=p;render();}
function togPend(){showPend=!showPend;render();}
function togExp(id){expId=expId===id?null:id;render();}
function togDone(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  saveL();schedPush();render();
}

function showMod(id){
  if(id==='sync-m'){const{bin}=getSC();if(bin)document.getElementById('bin-display').textContent='現在のBin ID: '+bin;}
  document.getElementById(id).classList.add('open');
}
function closeMod(id){document.getElementById(id).classList.remove('open');}
function bgClose(e,id){if(e.target.id===id)closeMod(id);}

function doExp(){
  const data=JSON.stringify({tasks:tasks.map(t=>({id:t.id,tt:t.tt,done:t.done}))},null,2);
  try{
    const b=new Blob([data],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download='hunter-progress.json';a.click();URL.revokeObjectURL(u);
  }catch(e){}
  if(/iPad|iPhone/.test(navigator.userAgent))prompt('進捗データ:',data);
}
function applyImp(){
  try{
    const raw=document.getElementById('imp-txt').value.trim();
    const j=JSON.parse(raw),arr=j.tasks||j;
    tasks=INIT.map(t=>{const f=arr.find(x=>x.id===t.id);return f?{...t,done:f.done}:{...t};});
    saveL();closeMod('imp-m');render();alert('読み込みました！');
  }catch(e){alert('形式エラー');}
}

// 既存の完了状態を引き継ぐ（旧hunter_v4から移行）
function migrateOld(){
  try{
    const old=localStorage.getItem('hunter_v4');
    if(!old||localStorage.getItem('hunter_v5'))return;
    const arr=JSON.parse(old);
    const idMap={101:101,102:102,103:103,104:104,105:105,106:106,107:107,108:108,
      201:201,202:202,203:203,204:204,
      301:301,302:302,303:303,304:304,305:305,306:306,
      400:400,401:401,402:402,
      501:501,502:502,503:503,
      601:601,602:602,
      701:901,703:703};
    tasks=tasks.map(t=>{
      const f=arr.find(x=>x.id===t.id);
      return f?{...t,done:f.done}:{...t};
    });
    // 旧401（日程確定✅）→新401（合格✅）
    // 旧402（講習受講）→新501（講習会参加）
    const old402=arr.find(x=>x.id===402);
    if(old402?.done){tasks=tasks.map(t=>t.id===501?{...t,done:true}:t);}
    saveL();
  }catch(e){}
}

migrateOld();
