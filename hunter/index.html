<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="狩猟HQ">
<title>狩猟試験 HQ</title>
<style>
:root {
  --bg: #0a0f0a;
  --bg2: #111811;
  --bg3: #1a221a;
  --card: #1e281e;
  --border: rgba(74,222,128,.15);
  --text: #e8f0e8;
  --muted: #6b8a6b;
  --green: #4ade80;
  --green2: #16a34a;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --orange: #fb923c;
  --accent: #4ade80;
  --font: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  --mono: 'SF Mono', 'Courier New', monospace;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* ── SCREENS ── */
.screen { display: none; position: fixed; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.screen.active { display: flex; flex-direction: column; }

/* ── HEADER ── */
.app-header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 10px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 50; flex-shrink: 0;
}
.app-header h1 { font-size: 16px; font-weight: 700; color: var(--green); letter-spacing: .05em; flex: 1; }
.app-header .sub { font-size: 11px; color: var(--muted); }
.icon-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 6px 0 calc(var(--safe-bottom) + 6px);
  display: flex;
  position: sticky; bottom: 0; flex-shrink: 0;
}
.bottom-nav button {
  flex: 1; background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 0; color: var(--muted); font-family: var(--font); font-size: 10px;
  transition: color .15s;
}
.bottom-nav button .nav-ic { font-size: 22px; }
.bottom-nav button.active { color: var(--green); }

/* ── SCROLL CONTENT ── */
.scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px calc(var(--safe-bottom) + 80px); }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.card-title { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }

/* ── STATS ROW ── */
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 8px; text-align: center; }
.stat-box .val { font-size: 24px; font-weight: 700; font-family: var(--mono); color: var(--green); }
.stat-box .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── EXAM BUTTONS ── */
.exam-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.exam-btn {
  background: var(--bg3); border: 2px solid var(--border); border-radius: var(--radius);
  padding: 16px 10px; cursor: pointer; text-align: center; transition: all .15s;
  color: var(--text); font-family: var(--font);
}
.exam-btn.selected { border-color: var(--green); background: rgba(74,222,128,.1); }
.exam-btn .eic { font-size: 28px; margin-bottom: 6px; }
.exam-btn .enm { font-size: 13px; font-weight: 700; }
.exam-btn .esb { font-size: 10px; color: var(--muted); margin-top: 2px; }
.exam-btn .ert { font-size: 12px; margin-top: 6px; font-family: var(--mono); font-weight: 700; }

/* ── MODE BUTTONS ── */
.mode-list { display: flex; flex-direction: column; gap: 8px; }
.mode-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
  color: var(--text); font-family: var(--font); text-align: left; transition: all .15s;
}
.mode-btn:active { transform: scale(.98); }
.mode-btn .mic { font-size: 22px; flex-shrink: 0; }
.mode-btn .mtx { flex: 1; }
.mode-btn .mtx .mn { font-size: 14px; font-weight: 700; }
.mode-btn .mtx .ms { font-size: 11px; color: var(--muted); margin-top: 2px; }
.mode-btn .mbadge { background: var(--red); color: white; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
.mode-btn .mbadge.yellow { background: var(--yellow); color: #000; }
.mode-btn.highlight { border-color: rgba(74,222,128,.4); background: rgba(74,222,128,.06); }

/* ── QUIZ SCREEN ── */
.quiz-header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 10px) 14px 10px;
  position: sticky; top: 0; z-index: 50; flex-shrink: 0;
}
.quiz-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.q-exit { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 4px 8px; }
.q-counter { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.q-cat-badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 700; margin-left: auto; }
.prog-wrap { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.prog-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }

.quiz-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 14px calc(var(--safe-bottom) + 20px); }
.q-number { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 8px; }
.q-text { font-size: 16px; font-weight: 600; line-height: 1.65; margin-bottom: 20px; color: var(--text); }

/* ── 三肢択一 ── */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  background: var(--bg3); border: 2px solid var(--border); border-radius: 12px;
  padding: 14px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px;
  color: var(--text); font-family: var(--font); text-align: left; transition: all .15s;
  font-size: 14px; line-height: 1.55;
}
.choice:active { transform: scale(.98); }
.choice-label {
  background: var(--bg); width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; border: 1px solid var(--border);
  font-family: var(--mono);
}
.choice.correct { background: rgba(74,222,128,.15); border-color: var(--green); }
.choice.correct .choice-label { background: var(--green); color: #000; border-color: var(--green); }
.choice.wrong { background: rgba(248,113,113,.12); border-color: var(--red); }
.choice.wrong .choice-label { background: var(--red); color: white; border-color: var(--red); }
.choice.show-correct { background: rgba(74,222,128,.08); border-color: rgba(74,222,128,.4); }
.choice.show-correct .choice-label { background: rgba(74,222,128,.3); }
.choice-text { flex: 1; }

/* ── RESULT BOX ── */
.result-box { margin-top: 16px; background: var(--bg3); border-radius: 12px; padding: 14px; display: none; border: 1px solid var(--border); }
.result-box.correct-box { border-color: rgba(74,222,128,.4); background: rgba(74,222,128,.06); }
.result-box.wrong-box { border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.05); }
.result-icon { font-size: 22px; margin-bottom: 6px; }
.result-verdict { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.result-explain { font-size: 13px; line-height: 1.7; color: #c0d0c0; }
.result-ref { font-size: 10px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

.next-btn {
  width: 100%; margin-top: 14px; padding: 16px;
  background: linear-gradient(135deg, #16a34a, #052e16);
  border: 1px solid rgba(74,222,128,.3); border-radius: var(--radius);
  color: var(--green); font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: var(--font); display: none;
}
.mark-btn {
  margin-top: 10px; background: none; border: none; color: var(--muted);
  font-size: 13px; cursor: pointer; font-family: var(--font); padding: 4px;
}

/* ── RESULT SCREEN ── */
.result-screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 14px calc(var(--safe-bottom) + 20px); }
.result-big { text-align: center; margin-bottom: 20px; }
.result-score { font-size: 52px; font-weight: 700; font-family: var(--mono); color: var(--green); }
.result-rate { font-size: 20px; color: var(--muted); margin-top: 4px; }
.result-pass { font-size: 14px; font-weight: 700; margin-top: 8px; padding: 8px 16px; border-radius: 8px; display: inline-block; }
.pass-ok { background: rgba(74,222,128,.15); color: var(--green); }
.pass-ng { background: rgba(248,113,113,.12); color: var(--red); }
.cat-result-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
.cat-result-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
.cat-bar-bg { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 3px; }
.res-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.res-btn { padding: 14px; border-radius: var(--radius); border: none; cursor: pointer; font-family: var(--font); font-size: 14px; font-weight: 700; }
.res-btn.primary { background: linear-gradient(135deg,#16a34a,#052e16); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
.res-btn.secondary { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

/* ── DASHBOARD ── */
.progress-row { margin-bottom: 8px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.progress-bar { height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .5s; }
.fill-hunter { background: var(--orange); }
.fill-gun { background: var(--blue); }

.weak-section { margin-top: 4px; }
.weak-cat-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.weak-cat-row:last-child { border-bottom: none; }
.weak-pct { font-family: var(--mono); font-size: 13px; font-weight: 700; min-width: 38px; }

/* ── NOTES ── */
.note-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; position: relative; }
.note-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 8px; margin-bottom: 6px; font-weight: 600; }
.tag-h { background: rgba(251,146,60,.15); color: var(--orange); }
.tag-g { background: rgba(96,165,250,.15); color: var(--blue); }
.tag-b { background: rgba(251,191,36,.15); color: var(--yellow); }
.note-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.note-body { font-size: 12px; color: #a0b4a0; line-height: 1.65; white-space: pre-wrap; }
.note-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
.note-meta { font-size: 10px; color: var(--muted); margin-top: 6px; }

/* ── FORMS ── */
.form-group { margin-bottom: 12px; }
.form-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 600; letter-spacing: .05em; }
input, select, textarea {
  width: 100%; padding: 11px 12px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 14px;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); }
textarea { resize: vertical; min-height: 80px; }
.btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-family: var(--font); font-size: 14px; font-weight: 700; transition: all .15s; }
.btn-green { background: linear-gradient(135deg,#16a34a,#052e16); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
.btn-full { width: 100%; }
.btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 8px; }
.btn-muted { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.btn-red { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.3); }

/* ── SETTINGS ── */
.setting-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.setting-row:last-child { border-bottom: none; }
.setting-label { flex: 1; font-size: 13px; }
.setting-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: var(--green); }
.dot-err { background: var(--red); }
.dot-idle { background: var(--muted); }

/* ── ADD QUESTION ── */
.add-q-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.tab-btn { flex: 1; padding: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font); font-size: 12px; cursor: pointer; }
.tab-btn.active { border-color: var(--green); color: var(--green); background: rgba(74,222,128,.08); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: calc(var(--safe-bottom) + 75px); left: 50%;
  transform: translateX(-50%) translateY(40px);
  background: var(--bg2); color: var(--text); padding: 10px 18px;
  border-radius: 20px; font-size: 13px; border: 1px solid var(--border);
  transition: transform .25s; z-index: 999; white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── SECTION HEADER ── */
.sec-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.sec-hd h2 { font-size: 16px; font-weight: 700; }
.sec-hd .count { font-size: 11px; color: var(--muted); background: var(--bg3); padding: 2px 8px; border-radius: 10px; }

/* ── COUNTDOWN ── */
.countdown-row { display: flex; gap: 8px; margin-bottom: 12px; }
.cd-chip { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
.cd-days { font-size: 24px; font-weight: 700; font-family: var(--mono); color: var(--yellow); }
.cd-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<!-- ══ HOME SCREEN ══ -->
<div class="screen active" id="screen-home">
  <div class="app-header">
    <h1>🎯 狩猟試験 HQ</h1>
    <span class="sub" id="syncStatus">―</span>
  </div>
  <div class="scroll-body">
    <!-- カウントダウン -->
    <div class="countdown-row" id="countdownRow"></div>

    <!-- 試験選択 -->
    <div class="card">
      <div class="card-title">試験を選ぶ</div>
      <div class="exam-select">
        <button class="exam-btn selected" id="exam-hunter" onclick="selectExam('hunter')">
          <div class="eic">🦆</div>
          <div class="enm">狩猟免許</div>
          <div class="esb">三肢択一 · 30問 · 70%合格</div>
          <div class="ert" id="hunter-rate">-%</div>
        </button>
        <button class="exam-btn" id="exam-gun" onclick="selectExam('gun')">
          <div class="eic">🔫</div>
          <div class="enm">猟銃講習会</div>
          <div class="esb">○× · 50問 · 90%合格</div>
          <div class="ert" id="gun-rate">-%</div>
        </button>
      </div>
    </div>

    <!-- モード選択 -->
    <div class="card">
      <div class="card-title">学習モード</div>
      <div class="mode-list">
        <button class="mode-btn highlight" onclick="startMode('random')">
          <span class="mic">🎯</span>
          <div class="mtx"><div class="mn">ランダム 20問</div><div class="ms">全分野からランダム出題</div></div>
        </button>
        <button class="mode-btn highlight" onclick="startMode('exam')">
          <span class="mic">📝</span>
          <div class="mtx"><div class="mn">本番模擬試験</div><div class="ms">本番と同じ形式・合格判定あり</div></div>
        </button>
        <button class="mode-btn" onclick="startMode('wrong')">
          <span class="mic">❌</span>
          <div class="mtx"><div class="mn">間違えた問題</div><div class="ms">苦手を集中攻略</div></div>
          <span class="mbadge" id="wrongBadge">0</span>
        </button>
        <button class="mode-btn" onclick="startMode('marked')">
          <span class="mic">⭐</span>
          <div class="mtx"><div class="mn">マーク済み問題</div><div class="ms">重要問題を復習</div></div>
          <span class="mbadge yellow" id="markBadge">0</span>
        </button>
        <button class="mode-btn" onclick="showCatScreen()">
          <span class="mic">📚</span>
          <div class="mtx"><div class="mn">分野別に攻める</div><div class="ms">カテゴリを絞って出題</div></div>
        </button>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="active" onclick="gotoTab('home')"><span class="nav-ic">🏠</span>ホーム</button>
    <button onclick="gotoTab('dash')"><span class="nav-ic">📊</span>分析</button>
    <button onclick="gotoTab('notes')"><span class="nav-ic">📝</span>メモ</button>
    <button onclick="gotoTab('add')"><span class="nav-ic">➕</span>問題追加</button>
    <button onclick="gotoTab('settings')"><span class="nav-ic">⚙️</span>設定</button>
  </div>
</div>

<!-- ══ CATEGORY SCREEN ══ -->
<div class="screen" id="screen-cat">
  <div class="app-header">
    <button class="icon-btn" onclick="showScreen('home')">← 戻る</button>
    <h1>分野を選ぶ</h1>
  </div>
  <div class="scroll-body">
    <div class="mode-list" id="catList"></div>
  </div>
</div>

<!-- ══ QUIZ SCREEN ══ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <div class="quiz-top">
      <button class="q-exit" onclick="exitQuiz()">✕</button>
      <span class="q-counter" id="qCounter">1/20</span>
      <span class="q-cat-badge" id="qCatBadge"></span>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:5%"></div></div>
  </div>
  <div class="quiz-body">
    <div class="q-number" id="qNumber">Q.001</div>
    <div class="q-text" id="qText"></div>
    <div class="choices" id="choicesEl"></div>
    <div class="result-box" id="resultBox">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-verdict" id="resultVerdict"></div>
      <div class="result-explain" id="resultExplain"></div>
      <div class="result-ref" id="resultRef"></div>
      <button class="mark-btn" id="markBtn" onclick="toggleMark()">☆ 重要マーク</button>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">次の問題 →</button>
  </div>
</div>

<!-- ══ RESULT SCREEN ══ -->
<div class="screen" id="screen-result">
  <div class="app-header">
    <h1>結果</h1>
  </div>
  <div class="result-screen">
    <div class="result-big">
      <div class="result-score" id="resScore">0/0</div>
      <div class="result-rate" id="resRate">0%</div>
      <div class="result-pass" id="resPass"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;" id="resTime"></div>
    </div>
    <div class="card">
      <div class="card-title">カテゴリ別</div>
      <div id="catResults"></div>
    </div>
    <div class="res-btns">
      <button class="res-btn primary" onclick="startMode('random')">🎯 もう一度</button>
      <button class="res-btn secondary" onclick="startMode('wrong')">❌ 間違えた問題を復習</button>
      <button class="res-btn secondary" onclick="showScreen('home')">🏠 ホームへ</button>
    </div>
  </div>
</div>

<!-- ══ DASHBOARD SCREEN ══ -->
<div class="screen" id="screen-dash">
  <div class="app-header">
    <h1>📊 学習分析</h1>
    <button class="icon-btn" onclick="doFullSync()" title="同期">🔄</button>
  </div>
  <div class="scroll-body">
    <!-- 進捗 -->
    <div class="card">
      <div class="card-title">試験別 正答率</div>
      <div class="progress-row">
        <div class="progress-label"><span>🦆 狩猟免許</span><span id="dashHunterPct" style="color:var(--orange)">0%</span></div>
        <div class="progress-bar"><div class="progress-fill fill-hunter" id="dashHunterBar" style="width:0%"></div></div>
      </div>

ref:'鳥獣保護管理法施行規則'},

{id:17,cat:'law',
q:'狩猟免許試験の適性試験（第一種銃猟）における視力の基準として正しいのはどれか。',
choices:['両眼0.5以上','両眼0.7以上かつ片眼それぞれ0.3以上','両眼1.0以上'],
answer:1,
explain:'第一種・第二種銃猟の視力基準は両眼0.7以上かつ片眼それぞれ0.3以上（1眼が見えない等の場合は他眼の視野左右150度以上で視力0.7以上）。わな・網猟は両眼0.5以上。',
ref:'鳥獣保護管理法施行規則'},

{id:18,cat:'law',
q:'狩猟期間（北海道以外）の原則として正しいのはどれか。',
choices:['10月1日〜翌年3月31日','11月15日〜翌年2月15日','11月1日〜翌年1月31日'],
answer:1,
explain:'北海道以外の狩猟期間の原則は11月15日〜翌年2月15日。北海道は10月1日〜翌年1月31日。「11月1日〜1月31日」は令和4年改正前の山形県カモ類の日程であり混同注意。',
ref:'鳥獣保護管理法施行規則'},

{id:19,cat:'law',
q:'山形県のカモ類の猟期について、令和4年度以降の正しい期間はどれか。',
choices:['11月1日〜翌年1月31日（従来通り）','11月15日〜翌年2月15日（全国一般期間に変更）','10月15日〜翌年3月15日（延長）'],
answer:1,
explain:'山形県のカモ類猟期は令和4年9月15日施行の改正で「11月1日〜1月31日」から「11月15日〜2月15日」に変更（青森・秋田・山形の3県共通）。近年の暖冬・少雪によるカモ類の渡来・渡去時期のずれへの対応。',
ref:'鳥獣保護管理法施行規則（令和4年改正）'},

{id:20,cat:'law',
q:'山形県でのイノシシ・ニホンジカの猟期として正しいのはどれか。',
choices:['11月15日〜翌年2月15日（全国一般期間）','11月15日〜翌年3月31日（延長措置）','通年捕獲可能'],
answer:1,
explain:'山形県のイノシシ・ニホンジカは11月15日〜翌年3月31日に延長措置がとられている。全国一般期間（2月15日まで）より長い点が山形県の特徴。',
ref:'山形県告示'},

{id:21,cat:'law',
q:'ヤマドリのメス・キジのメスについて正しいのはどれか。',
choices:['オスと同様に狩猟鳥獣として捕獲できる','令和9年9月14日まで全国で捕獲禁止','猟期外のみ捕獲禁止で猟期中は可能'],
answer:1,
explain:'ヤマドリのメス・キジのメスは令和9年9月14日まで全国で捕獲禁止（個体数保護のため）。猟期中であっても捕獲不可。「オスと同様に可」は誤り。',
ref:'鳥獣保護管理法施行規則'},

{id:22,cat:'law',
q:'カモ類の1日の捕獲制限として正しいのはどれか。',
choices:['1日合計3羽まで','1日合計5羽まで','制限なし（ただし1期間200羽まで）'],
answer:1,
explain:'カモ類は1日合計5羽まで（網使用は1猟期合計200羽まで）。「3羽」「制限なし」は誤り。種ごとの制限数値は頻出。',
ref:'鳥獣保護管理法施行規則'},

{id:23,cat:'law',
q:'キジバトの1日の捕獲制限として正しいのはどれか。',
choices:['1日2羽まで','1日10羽まで','1日5羽まで'],
answer:1,
explain:'キジバトは1日10羽まで。ヤマドリ・キジ（オス）は合計1日2羽、コジュケイは1日5羽、ヤマシギ・タシギは合計1日5羽、エゾライチョウは1日2羽。各種の制限数値を区別して覚える。',
ref:'鳥獣保護管理法施行規則'},

{id:24,cat:'law',
q:'法に違反した場合の狩猟免許の処分として正しいのはどれか。',
choices:['違反の程度にかかわらず必ず免許取消し','懲役相当の違反は免許取消し、罰金相当は1年の効力停止が原則','罰金以上の刑を受けた場合のみ3年間停止'],
answer:1,
explain:'違反処分は違反の重さによって異なる。懲役相当→取消し、罰金相当→1年の効力停止が原則。「違反の程度にかかわらず必ず取消し」は誤り。',
ref:'鳥獣保護管理法第44条'},

{id:25,cat:'law',
q:'禁止猟法として正しいのはどれか。',
choices:['くくりわなによるイノシシの捕獲','とりもちや据銃による捕獲','散弾銃によるキジの捕獲'],
answer:1,
explain:'とりもち・据銃（銃を固定して引き金を遠隔操作等で発射させる方法）は禁止猟法。くくりわなは適正な規格（輪の直径12cm以下等）を守れば使用可。',
ref:'鳥獣保護管理法第12条'},

{id:26,cat:'law',
q:'狩猟免許試験（知識試験）の問題数・試験時間として正しいのはどれか。',
choices:['20問・60分','30問・90分','50問・60分'],
answer:1,
explain:'狩猟免許試験の知識試験は三肢択一30問・90分。50問・60分は猟銃等講習会考査（○×式）の形式。混同しないこと。',
ref:'鳥獣保護管理法施行規則'},

{id:27,cat:'law',
q:'捕獲禁止場所として正しいのはどれか。',
choices:['農地（田畑）での捕獲は常に禁止','公道（法面含む）・都市公園・社寺境内・墓地・自然公園特別保護地区等は捕獲禁止','山林での捕獲は常に禁止'],
answer:1,
explain:'公道・都市公園・社寺境内・墓地・自然公園特別保護地区・原生自然環境保全地域等は捕獲禁止。農地・山林は原則可（ただし占有者の承諾等が必要な場合あり）。',
ref:'鳥獣保護管理法第14条'},

{id:28,cat:'law',
q:'ライフル銃でイノシシ・シカ・クマを捕獲する場合の最小口径として正しいのはどれか。',
choices:['4.5mm以上','5.9mm以上','7.62mm以上'],
answer:1,
explain:'イノシシ・シカ・クマに使用できるライフルの最小口径は5.9mm。4.5mm（空気銃の一般的口径）・7.62mmは誤り。また10番以上の口径の銃器使用は禁止。',
ref:'鳥獣保護管理法施行規則'},

{id:29,cat:'law',
q:'散弾銃で使用が禁止されている弾倉の装填数として正しいのはどれか。',
choices:['弾倉に2発以上装填できる散弾銃は禁止','弾倉に3発以上装填できる散弾銃は禁止','弾倉に6発以上装填できる散弾銃は禁止'],
answer:1,
explain:'弾倉に3発以上装填できる構造の散弾銃は禁止（薬室1発＋弾倉2発の計3発が上限）。ライフル・空気銃は弾倉6発以上が禁止（薬室1＋弾倉5の計6発が上限）。数値を混同しないこと。',
ref:'銃砲刀剣類所持等取締法第4条'},

{id:30,cat:'law',
q:'イノシシ・シカ用くくりわなの規格として正しいのはどれか。',
choices:['輪の直径15cm以下、ワイヤー直径3mm以上','輪の直径12cm以下、締付け防止金具・よりもどし装着、ワイヤー直径4mm以上','輪の直径10cm以下、ワイヤー直径5mm以上'],
answer:1,
explain:'くくりわなの規格：輪の直径12cm以下、締付け防止金具・よりもどし装着、ワイヤー直径4mm以上。「15cm以下」「3mm以上」は誤り。数値の入れ替えに注意。',
ref:'鳥獣保護管理法施行規則'},

{id:31,cat:'law',
q:'狩猟での実包消費（無許可消費）の1日の上限として正しいのはどれか。',
choices:['狩猟は1日200個まで・標的射撃は1日100個まで','狩猟は1日100個まで・標的射撃は1日400個まで','どちらも1日300個まで'],
answer:1,
explain:'無許可消費の上限：狩猟・有害鳥獣駆除は1日100個以下、標的射撃は1日400個以下。数値が逆の選択肢が頻出ひっかけ。',
ref:'火薬類取締法'},

{id:32,cat:'law',
q:'猟銃の全長と空気銃の全長の基準として正しいのはどれか。',
choices:['猟銃80cm以上・空気銃94cm以上','猟銃94cm以上・空気銃80cm以上','どちらも94cm以上'],
answer:1,
explain:'猟銃の全長は94cm以上、空気銃の全長は80cm以上。逆の組み合わせは誤り。猟銃の銃身長（替え銃身）は48.8cm以上。',
ref:'銃砲刀剣類所持等取締法'},

{id:101,cat:'bird',
q:'令和4年9月15日以降、ゴイサギの扱いとして正しいのはどれか。',
choices:['引き続き狩猟鳥獣として捕獲できる','狩猟鳥獣から除外され非狩猟鳥獣となったため捕獲禁止','都道府県の許可があれば捕獲できる'],
answer:1,
explain:'ゴイサギは令和4年9月15日施行の改正で狩猟鳥獣から除外。全国調査で顕著な個体数減少が確認されたため。試験では「非狩猟鳥獣＝捕獲禁止（×）」と即答できるようにする。',
ref:'鳥獣保護管理法施行規則（令和4年改正）'},

{id:102,cat:'bird',
q:'バンの扱いとして令和4年9月15日以降に正しいのはどれか。',
choices:['狩猟鳥として捕獲できる','狩猟鳥獣から除外され非狩猟鳥獣となった','冬期のみ捕獲が許可されている'],
answer:1,
explain:'バンも令和4年9月15日施行の改正でゴイサギと同様に狩猟鳥獣から除外。旧教材ではバンが狩猟鳥獣として記載されているため注意。現在は非狩猟鳥獣。',
ref:'鳥獣保護管理法施行規則（令和4年改正）'},

{id:103,cat:'bird',
q:'イタチの雌雄と狩猟鳥獣としての扱いについて正しいのはどれか。',
choices:['オス・メスともに狩猟獣として捕獲できる','オスは狩猟獣だがメスは非狩猟獣（雌雄同色・同形のため大きさで判断）','メスは狩猟獣だがオスは非狩猟獣'],
answer:1,
explain:'イタチはオスのみ狩猟獣、メスは非狩猟獣。雌雄が同色・同形のため大きさで判断（オス頭胴長30〜40cm、メス15〜20cm）。「メス」と明示されたら非狩猟獣（×）。最重要識別問題。',
ref:'狩猟読本 鳥獣識別編'},

{id:104,cat:'bird',
q:'キジバトの識別特徴として正しいのはどれか。',
choices:['全身灰色で首に横縞模様がなく、都市部に多いドバトと同じ種','首の側面に青灰色と黒の横縞模様があり、狩猟鳥である','翼に鮮やかな緑色の光沢があり非狩猟鳥である'],
answer:1,
explain:'キジバトは首の側面に青灰色と黒の横縞模様（鱗状斑）があり狩猟鳥。ドバト（カワラバト）・アオバト・シラコバトは非狩猟鳥。都市部に多いのはドバト。',
ref:'狩猟読本 鳥獣識別編'},

{id:105,cat:'bird',
q:'ドバト（カワラバト）の狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['キジバトと同様に狩猟鳥','非狩猟鳥のため捕獲禁止','都道府県によって異なる'],
answer:1,
explain:'ドバト（カワラバト）は非狩猟鳥。一見キジバトと混同しやすいが、ドバトは横縞がなく都市部に多い。キジバト（狩猟鳥）との識別は頻出。',
ref:'狩猟読本 鳥獣識別編'},

{id:106,cat:'bird',
q:'スズガモとキンクロハジロ（オス）の識別ポイントとして正しいのはどれか。',
choices:['嘴の色が異なり、スズガモは黄色・キンクロハジロは黒','後頭部の冠羽の有無で識別（キンクロハジロはオスに冠羽あり、スズガモはなし）','体の大きさのみで識別（スズガモが大きい）'],
answer:1,
explain:'スズガモとキンクロハジロの識別：キンクロハジロのオスは後頭部に特徴的な冠羽（長い黒い羽）がある。スズガモにはない。両方とも狩猟鳥だが識別は必須。',
ref:'狩猟読本 鳥獣識別編'},

{id:107,cat:'bird',
q:'カモシカの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['シカ類として狩猟獣に指定されている','特別天然記念物に指定されており非狩猟獣','有害鳥獣として捕獲できる'],
answer:1,
explain:'ニホンカモシカは特別天然記念物に指定されており非狩猟獣。シカの名がついているが狩猟対象のニホンジカとは別種。「シカ類として狩猟可」は誤り。',
ref:'狩猟読本 鳥獣識別編'},

{id:108,cat:'bird',
q:'ムササビ・モモンガの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['リス類として狩猟獣','非狩猟獣（捕獲禁止）','夜間のみ捕獲可能'],
answer:1,
explain:'ムササビ・モモンガは非狩猟獣で捕獲禁止。滑空している写真が出たら必ず「×（非狩猟）」と答える。ニホンリスも非狩猟獣。',
ref:'狩猟読本 鳥獣識別編'},

{id:109,cat:'bird',
q:'ニホンザルの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['狩猟獣として捕獲できる','非狩猟獣のため通常の狩猟では捕獲できない（有害鳥獣許可捕獲の対象にはなりうる）','猟期外のみ捕獲禁止'],
answer:1,
explain:'ニホンザルは狩猟獣ではなく非狩猟獣。ただし農業被害等の場合は有害鳥獣捕獲許可の対象にはなりうる。狩猟による捕獲は不可。',
ref:'狩猟読本 鳥獣識別編'},

{id:110,cat:'bird',
q:'鳥獣識別試験（技能試験）で「自信がない鳥獣・見覚えのない鳥獣」への対応として適切なのはどれか。',
choices:['知っている鳥獣に似ているなら狩猟鳥獣（○）と答える','迷ったら「非狩猟鳥獣（×）」と答える方が安全','種名が思い出せなくても○をつければ加点される'],
answer:1,
explain:'識別試験の鉄則：「見覚えのない・自信がないものは非狩猟鳥獣（×）と答える」。誤って狩猟鳥獣（○）と答えて間違いより、非狩猟（×）と答えておく方が安全な戦略。',
ref:'狩猟読本 鳥獣識別編'},

{id:111,cat:'bird',
q:'アオバトの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['キジバトと同じく狩猟鳥','非狩猟鳥','海岸部のみで捕獲可能'],
answer:1,
explain:'アオバトは非狩猟鳥。翼に鮮やかな緑色の光沢がある美しいハト科の鳥だが狩猟対象ではない。キジバト（狩猟鳥）との混同注意。',
ref:'狩猟読本 鳥獣識別編'},

{id:112,cat:'bird',
q:'シラコバトの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['狩猟鳥として捕獲できる','埼玉県等の限られた地域に生息する非狩猟鳥','渡り鳥のため捕獲制限あり'],
answer:1,
explain:'シラコバトは非狩猟鳥。埼玉県の一部地域等に生息し、個体数が少ない。キジバトと混同しやすいが狩猟対象ではない。',
ref:'狩猟読本 鳥獣識別編'},

{id:113,cat:'bird',
q:'オコジョの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['イタチの仲間として狩猟獣','非狩猟獣のため捕獲禁止','高山帯では捕獲可能'],
answer:1,
explain:'オコジョはイタチ科だが非狩猟獣。イタチ（オスのみ狩猟獣）と混同注意。白い冬毛の写真が出たら非狩猟獣（×）。',
ref:'狩猟読本 鳥獣識別編'},

{id:114,cat:'bird',
q:'ニホンリスの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['林業害獣として狩猟獣に指定','非狩猟獣のため捕獲禁止','本州では狩猟獣、北海道では非狩猟獣'],
answer:1,
explain:'ニホンリスは非狩猟獣。タイワンリス（特定外来種）とは別種で混同注意。写真が出たら非狩猟獣（×）と答える。',
ref:'狩猟読本 鳥獣識別編'},

{id:115,cat:'bird',
q:'マガモとカルガモの識別に使えるポイントとして正しいのはどれか。',
choices:['マガモは全体が茶色で嘴が黄色・カルガモはオスが緑の頭部','マガモのオスは光沢ある緑色の頭部・カルガモは嘴先端が黄色で全体褐色','大きさのみで識別できる'],
answer:1,
explain:'マガモのオスは光沢ある緑色の頭部・白い首輪・褐色の胸が特徴。カルガモは嘴先端が黄色で全体的に茶褐色・雌雄同色。両者とも狩猟鳥だが識別は必須。',
ref:'狩猟読本 鳥獣識別編'},

{id:201,cat:'gun',
q:'散弾銃の最大装填数として正しいのはどれか。',
choices:['弾倉2発のみ（薬室への装填は含まない）','薬室1発＋弾倉2発の計3発','薬室1発＋弾倉5発の計6発'],
answer:1,
explain:'散弾銃の最大装填数は薬室1発＋弾倉2発の計3発。ライフル銃・空気銃は薬室1発＋弾倉5発の計6発が上限。数値の混同は最頻出ひっかけ。',
ref:'銃砲刀剣類所持等取締法'},

{id:202,cat:'gun',
q:'12番スラッグ弾の有効射程と最大到達距離の組み合わせとして正しいのはどれか。',
choices:['有効射程50m・最大到達距離515m（OOBと同じ）','有効射程100m・最大到達距離700m','有効射程200m・最大到達距離1,000m'],
answer:1,
explain:'12番スラッグ弾：有効射程100m・最大到達距離700m。OOB（バックショット）は有効射程50m・最大到達距離515m。ライフル弾は最大到達距離約4,000m。各数値を混同しないこと。',

{id:203,cat:'gun',
q:'OOB（バックショット・大粒散弾）の最大到達距離として正しいのはどれか。',

answer:1,
explain:'OOB（バックショット）の最大到達距離は約515m。4号散弾は約275m、12番スラッグは約700m、ライフル弾は約4,000m。各弾種の数値を正確に覚える。',
ref:'狩猟読本 猟具編'},

{id:204,cat:'gun',
q:'ライフル銃の弾の最大到達距離として正しいのはどれか。',

answer:2,
explain:'ライフル弾（30口径等）の最大到達距離は約4,000m（約4km）。有効射程外でも非常に遠くまで届くため発射前の背景確認が特に重要。「1,000m」「2,000m」は誤り。',
ref:'狩猟読本 安全編'},

{id:205,cat:'gun',
q:'猟銃の銃身長（替え銃身）の基準として正しいのはどれか。',

answer:1,
explain:'猟銃の銃身長（替え銃身）は48.8cm（19インチ）以上。猟銃全長は94cm以上、空気銃全長は80cm以上。それぞれの数値を区別して覚える。',
ref:'銃砲刀剣類所持等取締法'},

{id:206,cat:'gun',
q:'安全な取扱いの4原則のうち「目標の確認」について正しいのはどれか。',
choices:['動いているものは獲物の可能性が高いため素早く発射する','目標が確実に獲物であることを視覚で確認し射線の背景も安全を確認してから発射','仲間から合図があれば背景確認を省略できる'],
answer:1,
explain:'「疑わしきは撃たず」が絶対原則。①目標が確実に獲物であること②射線の先・背景に人・家屋等がないこと③確認できない場合は絶対撃たないの3点が必須。「動くもの＝獲物」は危険な誤解。',
ref:'狩猟読本 安全編'},

{id:207,cat:'gun',
q:'技能試験での銃器操作で大幅減点・失格になる行為として正しいのはどれか。',

answer:1,
explain:'技能試験での大幅減点は：引き金（用心金）への触れ、人・人物ポスターへの銃口向けなど安全規則の違反。これらは1回でも大幅減点となり累計30点超で失格。',

{id:208,cat:'gun',

choices:['1問誤答で2点減点','1問誤答で5点減点（4問全誤答で20点減点）','距離目測問題は合否に影響しない'],
answer:1,
explain:'距離目測は1問誤答ごとに5点減点（4問全誤答で20点減点）。技能試験全体の失格ラインが30点超減点なので、距離目測で全部外すと残り10点の余裕しかない。',
ref:'鳥獣保護管理法施行規則（技能試験基準）'},

{id:209,cat:'gun',
q:'銃器の点検時に行う「薬室（チェンバー）内の確認」の目的として正しいのはどれか。',

answer:1,

ref:'狩猟読本 安全編'},

{id:210,cat:'gun',

explain:'狩猟・有害鳥獣駆除での無許可消費上限は1日100個以下。標的射撃は400個以下。「標的射撃と同じ400個」は誤り。狩猟の方が上限が低い点に注意。',
ref:'火薬類取締法'},

{id:301,cat:'safe',
q:'複数人での巻き狩りで最も重要な安全事項はどれか。',
choices:['勢子は必ず銃を携帯しないこと','全員の位置を事前に確認・共有し、発射前に必ず射線の安全を確認すること','待ち猟者は見えるものはすべて発射してよい'],
answer:1,
explain:'巻き狩りでは勢子が獲物の後方にいるため射線の安全確認が特に重要。全員の位置把握なしの発射は人身事故に直結。「見えるものすべて発射」は最も危険な誤り。',

{id:302,cat:'safe',
q:'休憩・移動時の正しい銃の取り扱いはどれか。',

answer:1,
explain:'休憩・移動時は必ず薬室を開放し実包を抜く。安全装置だけでは不十分。薬室開放が最も確実な安全措置。「安全装置だけでOK」は誤り。',

{id:303,cat:'safe',

answer:1,
explain:'不発時は遅発（スローファイア）の危険がある。薬室を開けた瞬間に点火することがある。最低10〜30秒間、銃口を安全方向に向けて待機してからゆっくり薬室を開放する。「直ちに開ける」は最も危険。',
ref:'狩猟読本 安全編'},

{id:304,cat:'safe',

choices:['まず猟友会・警察に連絡し、その後に負傷者を確認する','負傷者の救護を最優先とし、直ちに119番・110番通報、応急処置を行う','現場の証拠保全を最優先にして負傷者の移動を禁じる'],
answer:1,
explain:'事故発生時の最優先は人命（負傷者の救護）。①負傷者確認と救護②119番・110番通報③応急処置④現場保存の順。「まず猟友会・警察に連絡」は誤り。',
ref:'狩猟読本 安全編'},

{id:305,cat:'safe',
q:'銃身内異物（雪・泥・木の葉等）がある状態で発射するとどうなるか。',

answer:1,
explain:'銃身内閉塞がある状態での発射は弾の逃げ場がなくなり、閉塞後方で圧力急上昇→銃身破裂。射手の手・顔に重大な裂傷・骨折が起きる。使用前・倒伏後は必ず銃腔確認。',
ref:'狩猟読本 安全編'},

{id:401,cat:'eco',
q:'鳥獣保護管理法における「指定管理鳥獣捕獲等事業」の目的として正しいのはどれか。',

answer:1,
explain:'指定管理鳥獣捕獲等事業は、ニホンジカ・イノシシ等の急増で生態系・農林業に深刻な被害が生じた際に、都道府県等が計画的に捕獲数を管理する制度。絶滅危惧種保護・外来種防除とは別制度。',

{id:402,cat:'eco',

choices:['そのまま持ち帰ることができる','直ちに放獣し、必要に応じて都道府県に報告する','猟友会に連絡してから判断を仰ぐ'],

explain:'錯誤捕獲した非狩猟鳥獣は直ちに放獣が原則。持ち帰ることは違法。鳥獣の怪我の状態等によっては都道府県への報告も必要。',

{id:403,cat:'eco',

answer:1,

{id:11,cat:'law',

{id:13,cat:'law',

{id:17,cat:'law',

{id:19,cat:'law',

explain:'誤り。失効後の措置期限は「50日以内」。30日ではなく50日が正しい。この数値のひっかけは頻出。',
ref:'銃刀法第10条の3'},

{id:20,cat:'law',
q:'許可の有効期間が満了した場合は「失効」であり、「取消し」とは異なる。',
answer:true,
explain:'正しい。「失効」は有効期間満了・所持しないことによる自動的な効力消滅。「取消し」は違反行為等を理由とした行政処分による効力消滅。両者は法的に異なる概念。',
ref:'銃刀法'},

{id:21,cat:'law',
q:'猟銃の許可は1銃1許可であり、2人以上が共同して1丁の銃を所持することはできない。',
answer:true,
explain:'正しい。許可は1銃1許可制。1丁の銃を複数人で共有することは認められない。また、許可を持たない人に銃を預けることも違反となる（預けた側・預かった側双方が違反）。',
ref:'銃刀法第4条'},

{id:22,cat:'law',
q:'猟銃の所持許可証を他人に短期間貸すことは、その人が猟友会員であれば認められる。',
answer:false,
explain:'誤り。所持許可証は本人専用。猟友会員であっても他人への貸与は禁止。許可証は個人に対して発行されるものであり譲渡・貸与は一切できない。',
ref:'銃刀法'},

{id:23,cat:'law',
q:'猟銃の所持許可を受けた者が死亡した場合、その相続人は猟銃を相続財産として引き続き所持することができる。',
answer:false,
explain:'誤り。所持許可は一身専属（本人のみ有効）。所持者が死亡すると許可は失効し、遺族は直ちに公安委員会に届け出て警察に提出するか許可取得者に譲渡する必要がある。相続による所持継続は認められない。',
ref:'銃刀法'},

{id:24,cat:'law',
q:'空気銃の所持許可は、18歳未満の者には与えることができない。',
answer:true,
explain:'正しい。空気銃は18歳未満が欠格事由。猟銃（火薬式）は20歳未満が欠格事由。空気銃と猟銃で年齢要件が異なる点に注意。',
ref:'銃刀法第5条'},

{id:25,cat:'law',
q:'猟銃の所持許可は20歳未満の者には与えることができないが、空気銃は18歳以上であれば許可を受けられる。',
answer:true,
explain:'正しい。猟銃（火薬式）は20歳以上、空気銃は18歳以上が年齢要件。この区別は頻出。',
ref:'銃刀法第5条'},

{id:26,cat:'law',
q:'75歳以上の猟銃所持者は、許可更新の際に認知機能検査を受けなければならない。',
answer:true,
explain:'正しい。75歳以上の者は許可更新の際に認知機能検査が義務付けられている。「65歳以上」「80歳以上」と書かれていれば誤り。',
ref:'銃刀法第9条の5'},

{id:27,cat:'law',
q:'令和7年（2025年）3月の法改正により、3年以上用途に使用しない「眠り銃」は許可が取り消されることになった。',
answer:false,
explain:'誤り。令和7年3月1日施行の改正により、眠り銃の取消し要件は「3年以上不使用」から「2年以上不使用」に短縮された。改正後は2年が正しい。',
ref:'令和7年改正銃刀法'},

{id:28,cat:'law',
q:'令和7年（2025年）3月の法改正により、2年以上用途に使用しない「眠り銃」は許可が取り消されることになった。',
answer:true,
explain:'正しい。令和7年3月1日施行の改正で眠り銃の取消し要件が「3年以上→2年以上」に短縮。改正前の3年という数値との混同に注意。',
ref:'令和7年改正銃刀法'},

{id:29,cat:'law',
q:'ハーフライフル銃は、令和7年3月の法改正により「特定ライフル銃」となり、ライフル銃と同等の厳格な許可基準が適用されるようになった。',
answer:true,
explain:'正しい。令和7年3月改正でハーフライフル銃（腔旋部分が銃腔長の1/5以上1/2以下）は「特定ライフル銃」として分類され、ライフル銃と同等の許可基準（原則10年以上の猟銃所持歴）が適用された。',
ref:'令和7年改正銃刀法'},

{id:30,cat:'law',
q:'ライフル銃の所持許可を受けるためには、原則として継続して10年以上猟銃所持許可を受けていることが必要である。',
answer:true,
explain:'正しい。ライフル銃の所持には原則として継続して10年以上の猟銃所持実績が必要。ただし職業的捕獲者・事業被害防止目的等は例外がある。',
ref:'銃刀法第5条の2'},

{id:31,cat:'law',
q:'猟銃を携帯・運搬するときは、装填の有無にかかわらず、必ず覆いをかけるか容器に入れなければならない。',
answer:true,
explain:'正しい。「実包を装填している場合に限り覆い・容器が必要」は誤り。装填の有無にかかわらず、常に覆い・容器が必要。',
ref:'銃刀法第10条の2'},

{id:32,cat:'law',
q:'猟銃を携帯・運搬するときは、実包を装填している場合に限り覆いをかけるか容器に入れる必要がある。',
answer:false,
explain:'誤り。覆い・容器は装填の有無にかかわらず常に必要。「装填している場合に限り」は代表的なひっかけ表現。',
ref:'銃刀法第10条の2'},

{id:33,cat:'law',
q:'猟銃を携帯・運搬するときは、所持許可証を必ず携帯し、警察官から提示を求められた場合は提示しなければならない。',
answer:true,
explain:'正しい。携帯・運搬・使用時は所持許可証の携帯が義務。警察官の提示要求には応じる義務がある。',
ref:'銃刀法第10条の2'},

{id:34,cat:'law',
q:'猟銃を携帯・運搬する正当な理由には、修理・検査・狩猟・標的射撃などが含まれ、正当な理由なく携帯・運搬することは禁止されている。',
answer:true,
explain:'正しい。携帯・運搬は用途使用・修理等の「正当な理由」がある場合のみ認められる。正当な理由のない携帯・運搬は銃刀法違反。',
ref:'銃刀法第10条の2'},

{id:35,cat:'law',
q:'車のトランクに施錠して猟銃を保管すれば、それは法令上の「保管設備」として認められる。',
answer:false,
explain:'誤り。車のトランクは法令上の保管設備（ガンロッカー）ではない。猟銃は届け出た保管設備（ガンロッカー）にのみ保管できる。トランクへの保管は運搬中の一時的措置にすぎない。',
ref:'銃刀法第10条の6'},

{id:36,cat:'law',
q:'猟銃の盗難・紛失が発生した場合は、まず自分で探してから、見つからない場合に警察に届け出ればよい。',
answer:false,
explain:'誤り。盗難・紛失に気づいた時点で「直ちに」警察官に届け出る義務がある。「まず自分で探す」は誤り。盗難銃が犯罪に使われる危険があるため速報性が最重要。',
ref:'銃刀法第8条の4'},

{id:37,cat:'law',
q:'猟銃の盗難・紛失を発見したときは、直ちに警察官に届け出なければならない。',
answer:true,
explain:'正しい。発見（気づいた）時点で直ちに届け出る義務がある。「直ちに」という表現が重要で、猶予はない。',
ref:'銃刀法第8条の4'},

{id:38,cat:'law',
q:'猟銃を発射できる場所は、狩猟場・鳥獣被害防除・標的射撃などの正当な理由がある場所に限られ、みだりに発射してはならない。',
answer:true,
explain:'正しい。猟銃の発射は正当な理由（狩猟・有害鳥獣駆除・標的射撃等）がある場所のみ許可される。注意義務を怠ったが実害が発生しなかった場合でも違反となりうる。',
ref:'銃刀法第10条の2'},

{id:39,cat:'law',
q:'注意義務を怠って猟銃を発射したとしても、実際に被害が発生しなければ違反にはならない。',
answer:false,
explain:'誤り。注意義務違反は実害発生の有無にかかわらず違反となる。「実害がなければ違反にならない」は代表的なひっかけ。',
ref:'銃刀法第10条の2'},

{id:40,cat:'law',
q:'遺品として故人の猟銃を保存・展示する目的であっても、所持許可なしに所持することはできない。',
answer:true,
explain:'正しい。猟銃の所持は狩猟・有害鳥獣駆除・標的射撃等の用途に限られ、「遺品として」「コレクションとして」という目的では所持許可が与えられない。',
ref:'銃刀法第4条'},

{id:41,cat:'law',
q:'公安委員会は、所持許可の更新申請が許可基準に適合していれば、許可を与えないことができる。',
answer:false,
explain:'誤り。公安委員会は更新申請が許可基準に適合していれば「許可しなければならない」（羈束行為）。適合しているにもかかわらず許可しないことはできない。',
ref:'銃刀法第7条の3第2項'},

{id:42,cat:'law',
q:'猟銃の所持許可証を紛失した場合は、速やかに警察署に届け出て再交付申請をしなければならない。',
answer:true,
explain:'正しい。許可証紛失は届出義務がある。再交付申請も可能。許可証なしに銃を携帯・使用することは義務違反となる。',
ref:'銃刀法'},

{id:43,cat:'law',
q:'住所を変更した場合は、変更後30日以内に新住所地を管轄する公安委員会（警察署）に変更届を提出しなければならない。',
answer:true,
explain:'正しい。住所変更は変更後30日以内に届出義務がある。届出先は「新住所地」を管轄する公安委員会（警察署経由）。',
ref:'銃刀法第8条'},

{id:44,cat:'law',
q:'猟銃の所持許可を受けた者が他人（所持許可を持たない家族を含む）に銃を使用させることは原則として禁止されている。',
answer:true,
explain:'正しい。所持許可を持たない者（家族含む）への使用は原則禁止。射撃場での射撃教習等特定の例外はあるが、原則禁止が答え。',
ref:'銃刀法第4条の4'},

{id:45,cat:'law',
q:'猟銃の所持許可証は他人に貸すことができる。',
answer:false,
explain:'誤り。所持許可証は本人専用で他人への貸与は絶対禁止。許可証は個人と銃の組み合わせに対して発行されるもの。',
ref:'銃刀法'},

{id:101,cat:'safe',
q:'すべての銃は、実包が装填されていなくても常に装填されているものとして取り扱わなければならない。',
answer:true,
explain:'正しい。「すべての銃は常に装填されている」という意識が安全取扱いの大前提。薬室が空であることを自分で確認した後でも、他者に対してはこの原則を守る。',
ref:'猟銃等取扱読本 安全編'},

{id:102,cat:'safe',
q:'安全装置（安全子）をかけていれば、振動や衝撃を与えても暴発することはない。',
answer:false,
explain:'誤り。安全装置は引き金の動きを止めるだけの補助的機械装置であり、振動・衝撃による逆鉤の外れを完全に防ぐ機構ではない。「安全子を引けば振動を与えても作用しない」は×の代表例。',
ref:'猟銃等取扱読本 構造編'},

{id:103,cat:'safe',
q:'安全装置は補助的な機械装置であり、衝撃や故障によって意図せず解除される可能性がある。',
answer:true,
explain:'正しい。安全装置に過信は禁物。補助的安全措置として有効だが、機械的故障・衝撃・摩耗等で誤作動することがある。安全装置に頼り他の安全ルールを省略してはならない。',
ref:'猟銃等取扱読本 安全編'},

{id:104,cat:'safe',
q:'銃口は発射する直前まで、常に人のいない安全な方向に向けておかなければならない。',
answer:true,
explain:'正しい。「銃口は常に安全な方向へ」は安全取扱いの最重要原則。発射するしないに関わらず、安全装置の状態に関わらず、銃口を人に向けることは絶対禁止。',
ref:'猟銃等取扱読本 安全編'},

{id:105,cat:'safe',
q:'銃の分解・点検で銃身のみの状態になっていれば、その銃口を人に向けても構わない。',
answer:false,
explain:'誤り。「分解して銃身のみになっている」「脱包が確認できている」等いかなる状態でも、銃口を人に向けることは禁止。例外なしが原則。',
ref:'猟銃等取扱読本 安全編'},

{id:106,cat:'safe',
q:'発射する直前まで、引き金（トリガー）には指をかけずトリガーガードの外に指を置く。',
answer:true,
explain:'正しい。「撃つまで引き金に触れない」は安全の絶対原則。意図しない引き金操作による暴発を防ぐ。安全装置の状態・手袋の有無に関係なく常に守る。',
ref:'猟銃等取扱読本 安全編'},

{id:107,cat:'safe',
q:'安全装置をかけていれば、引き金に指をかけて歩いても安全である。',
answer:false,
explain:'誤り。安全装置をかけていても引き金への指かけは禁止。安全装置は補助装置であり、引き金に触れないことが絶対原則。',
ref:'猟銃等取扱読本 安全編'},

{id:108,cat:'safe',
q:'用心金（トリガーガード）の中に指を入れてよいのは、射撃の直前または空撃ちをする等の特別の場合に限られる。',
answer:true,
explain:'正しい。原則として指はトリガーガードの外に置くが、発射直前・空撃ち点検等の特別な場面では指を入れることが認められる。',
ref:'猟銃等取扱読本 安全編'},

{id:109,cat:'safe',
q:'狩猟中に休憩する場合や移動する場合は、安全装置をかけるだけでよく、実包を抜く必要はない。',
answer:false,
explain:'誤り。休憩・移動時は必ず薬室を開放し実包を取り出す。安全装置のみでは不十分。薬室開放が最も確実な安全措置。',
ref:'猟銃等取扱読本 安全編'},

{id:110,cat:'safe',
q:'射撃しない場面（移動・休憩・人に近づくとき・藪の通過時など）では、常に薬室を開放して実包を抜いておかなければならない。',
answer:true,
explain:'正しい。射撃しないあらゆる場面で薬室開放が原則。散弾銃の場合は銃を折り畳む（開放する）。この「常に開放する」習慣が事故を防ぐ。',
ref:'猟銃等取扱読本 安全編'},

{id:111,cat:'safe',
q:'引き金の「遊び」は小さければ小さいほど良く、遊びがない状態が最も安全である。',
answer:false,
explain:'誤り。引き金の遊びは適度にあることが必要。遊びがないと少しの接触で引き金が引かれ暴発しやすくなる。「遊びはあってはならない」は誤り。適度な遊びが安全のために必要。',
ref:'猟銃等取扱読本 構造編'},

{id:112,cat:'safe',
q:'狩猟用猟銃の引き金の重さの目安は2kg以上とされており、軽すぎると暴発しやすくなる。',
answer:true,
explain:'正しい。引き金の重さの目安：狩猟用2kg以上、射撃用1.5kg以上。軽すぎると意図しない操作で暴発しやすくなる。',
ref:'猟銃等取扱読本 構造編'},

{id:113,cat:'safe',
q:'撃発機構の構成要素を発火の順に並べると「引き金→逆鉤→撃鉄→撃針」となる。',
answer:true,
explain:'正しい。発火の連鎖：引き金を引く→逆鉤（シアー）が解放→撃鉄（ハンマー）が落下→撃針（ファイアリングピン）を打撃→雷管に点火→火薬着火→発射。この順序は正確に覚える。',
ref:'猟銃等取扱読本 構造編'},

{id:114,cat:'safe',
q:'引き金は、射手の意思により「撃鉄」を直接作動させる部品である。',
answer:false,
explain:'誤り。引き金は「逆鉤（シアー）」を作動させる部品。逆鉤が撃鉄を解放し、撃鉄が撃針を打撃する。「引き金→撃鉄を直接作動」は誤り。「引き金→逆鉤→撃鉄→撃針」の順序が正しい。',
ref:'猟銃等取扱読本 構造編'},

{id:115,cat:'safe',
q:'逆鉤（シアー）は、引き金の操作によって撃鉄を拘束または開放する部品である。',
answer:true,
explain:'正しい。逆鉤（シアー）の役割：撃鉄を拘束（コック状態を保持）し、引き金操作により撃鉄を開放する。この定義は頻出で正確に覚える。',
ref:'猟銃等取扱読本 構造編'},

{id:116,cat:'safe',
q:'不発（ミスファイア）が発生した場合は、直ちに薬室を開放して不発弾を取り出すべきである。',
answer:false,
explain:'誤り。不発時は遅発（スローファイア）の危険がある。薬室を開けた瞬間に点火（遅発）することがある。銃口を安全な方向に向けたまま「少なくとも10秒（一般的には30秒）」待ってからゆっくり薬室を開放する。',
ref:'猟銃等取扱読本 安全編'},

{id:117,cat:'safe',
q:'「遅発（スローファイア）」とは、引き金を引いて撃鉄が落ちた後、時間を置いて発射される現象であり、不発とは区別される。',
answer:true,
explain:'正しい。遅発は引き金操作後に時間をおいて発射される現象。不発（全く発射されない）とは異なる。遅発を不発と勘違いして薬室を開けた瞬間に発射される事故がある。10秒以上銃口を安全方向に保持する。',
ref:'猟銃等取扱読本 構造編'},

{id:118,cat:'safe',
q:'銃身内に木の葉・雪・泥などの異物が詰まったまま射撃すると、銃身が破裂する危険がある。',
answer:true,
explain:'正しい。銃身内閉塞（木の葉・雪・泥・先発弾の残留等）がある状態で発射すると、弾の逃げ場がなく銃身が破裂し射手に重大な傷害を与える。使用前・倒伏後は必ず銃腔を確認する。',
ref:'猟銃等取扱読本 安全編'},

{id:119,cat:'safe',
q:'銃身内の異物確認は、薬室を開放した状態で銃口から光を当てて目視確認する。',
answer:true,
explain:'正しい。銃腔内の確認は必ず薬室を開放（弾を抜いた状態）にしてから、銃口より光を当てて目視。薬室が閉じた状態や弾が入ったままの確認は絶対に行ってはならない。',
ref:'猟銃等取扱読本 安全編'},

{id:120,cat:'safe',
q:'発射前に目標を確認する際、茂みや藪の中で動くものは獲物である可能性が高いため、素早く発射するべきである。',
answer:false,
explain:'誤り。「疑わしきは撃たず」が絶対原則。動くもの・音がするものが確実に獲物であることを視覚で確認し、目標の背景・射線の先の安全も確認してから発射。確認できない場合は絶対に撃たない。',
ref:'猟銃等取扱読本 安全編'},

{id:121,cat:'safe',
q:'散弾は竹やぶや水面では跳弾（はねだん）が発生しないため、それらの方向に向けて発射しても安全である。',
answer:false,
explain:'誤り。跳弾はコンクリート・岩のみならず、竹やぶ・水面・地面でも発生しうる。「竹やぶ・水面なら跳弾しない」は誤り。どんな方向も安全でない場合は発射しない。',
ref:'猟銃等取扱読本 安全編'},

{id:122,cat:'safe',
q:'12番散弾（スラッグ弾）の最大到達距離は、約700mとされている。',
answer:true,
explain:'正しい。12番スラッグ弾の最大到達距離は約700m。「有効射程（約50〜100m）」と「最大到達距離」は別物。有効射程外でも致命的な危険がある距離まで弾は届く。',
ref:'猟銃等取扱読本 安全編'},

{id:123,cat:'safe',
q:'空気銃の弾の最大到達距離は約300mとされており、有効射程を超えても危険範囲は存在する。',
answer:true,
explain:'正しい。空気銃の最大到達距離は約300m。有効射程（約30〜50m程度）をはるかに超えた距離でも弾は届き危険。「空気銃は危険距離が短い」という過信は禁物。',
ref:'猟銃等取扱読本 安全編'},

{id:124,cat:'safe',
q:'ライフル銃（30口径）の弾の最大到達距離は約4,000mとされており、有効射程外でも非常に遠くまで危険である。',
answer:true,
explain:'正しい。30口径ライフル弾の最大到達距離は約3,200〜4,000m。約4kmもの距離まで弾が届く可能性があるため、ライフルの射撃前の背景確認は極めて重要。',
ref:'猟銃等取扱読本 安全編'},

{id:125,cat:'safe',
q:'散弾は発射角度が45度のとき最も遠くまで届く。',
answer:false,
explain:'誤り。物理の理想では45度だが、実弾は空気抵抗があるため、猟銃等取扱読本では散弾は約20〜35度、ライフルは約32〜35度の発射角で最大飛距離となるとされている。「45度で最大射程」は誤り。',
ref:'猟銃等取扱読本 安全編'},

{id:126,cat:'safe',
q:'散弾銃の有効射程は約40〜50mであり、スラッグ弾の有効射程は約50〜100mである。',
answer:true,
explain:'正しい。散弾の有効射程は約40〜50m、スラッグ弾は約50〜100m。ただし最大到達距離（散弾約200〜500m以上、スラッグ約700m）はこれをはるかに超えるため注意。',
ref:'猟銃等取扱読本 安全編'},

{id:127,cat:'safe',
q:'人に銃を渡すときは、薬室を開放して弾がないことを自分で確認し、相手にも確認させてから渡す。',
answer:true,
explain:'正しい。銃の受け渡し手順：①薬室開放②弾なしを自分が確認③相手にも確認させる④その状態で渡す。安全装置をかけるだけでは不十分。',
ref:'猟銃等取扱読本 安全編'},

{id:128,cat:'safe',
q:'猟銃の清掃作業を始める前に、まず全ての実包を取り出し薬室が空であることを確認する。',
answer:true,
explain:'正しい。清掃前の最初の手順は必ず全実包除去・薬室開放の確認。清掃中に暴発する事故が多い。引き金を引いて確認する行為は絶対禁止（残弾があれば発射される）。',
ref:'猟銃等取扱読本 取扱編'},

{id:129,cat:'safe',
q:'複数人での巻き狩りでは、全員の位置を事前に確認・共有し、発射前に射線の安全を確認することが最重要である。',
answer:true,
explain:'正しい。巻き狩りは勢子が獲物の後方にいるため射線の安全確認が特に重要。全員の位置把握なしの発射は人身事故に直結する。',
ref:'猟銃等取扱読本 安全編'},

{id:130,cat:'safe',
q:'猟銃清掃に使用するガンオイル・クリーナーは引火性のある製品が多いため、使用中は火気厳禁・十分な換気が必要である。',
answer:true,
explain:'正しい。多くのガンオイル・クリーナーは引火性有機溶剤を含む。火気厳禁の場所で十分換気して使用する。皮膚・目への接触も有害なものがある。',
ref:'猟銃等取扱読本 取扱編'},

{id:201,cat:'keep',
q:'自宅で保管できる実包や空包の数量は、合計800個以内である。',
answer:true,
explain:'正しい。自宅保管の実包・空包の上限は合計800個以内。「各々800個ずつ（合計1,600個）」は誤り。「1,500個以内」という数値が出たら誤り。800という数値を確実に覚える。',
ref:'火薬類取締法施行規則・猟銃等取扱読本'},

{id:202,cat:'keep',
q:'自宅で保管できる実包は狩猟用と標的射撃用それぞれ800個ずつ、合計1,600個まで保管できる。',
answer:false,
explain:'誤り。合計800個以内が正しい制限。「各々800個ずつ（合計1,600個）」は代表的なひっかけ問題。800個は個別ではなく合計の上限。',
ref:'火薬類取締法施行規則'},

{id:203,cat:'keep',
q:'自宅で保管できる無煙火薬と黒色猟用火薬の合計は、5kg以内である。',
answer:true,
explain:'正しい。無煙火薬と黒色猟用火薬の自宅保管上限は合計5kg（5,000g）以内。銃用雷管は2,000個以内。これらの数値は正確に覚えること。',
ref:'火薬類取締法施行規則'},

{id:204,cat:'keep',
q:'自宅で保管できる銃用雷管は2,000個以内である。',
answer:true,
explain:'正しい。銃用雷管の自宅保管上限は2,000個以内。実包800個・火薬5kg・雷管2,000個の3つの数値をセットで覚える。',
ref:'火薬類取締法施行規則'},

{id:205,cat:'keep',
q:'標的射撃の目的で、1日に実包・空包を合わせて400個を超えて消費する場合は火薬類の消費許可が必要である。',
answer:true,
explain:'正しい。無許可消費（消費許可不要）の上限：標的射撃は1日400個以下。400個を超えると消費許可が必要。「200個以下なら許可不要」は誤り（正解は400個）。',
ref:'火薬類取締法'},

{id:206,cat:'keep',
q:'標的射撃で1日に消費できる実包・空包の無許可消費上限は200個以下である。',
answer:false,
explain:'誤り。標的射撃の無許可消費上限は1日400個以下。「200個以下」は誤り。狩猟・有害鳥獣駆除は1日100個以下（こちらが200個以下と混同しやすい）。',
ref:'火薬類取締法'},

{id:207,cat:'keep',
q:'狩猟・有害鳥獣駆除の目的で1日に消費できる実包の無許可消費上限は100個以下である。',
answer:true,
explain:'正しい。無許可消費上限：狩猟・有害鳥獣駆除は1日100個以下。標的射撃は400個以下。それぞれの数値を区別して覚える。',
ref:'火薬類取締法'},

{id:208,cat:'keep',
q:'ガンロッカーは床または壁にボルト等で固定し、容易に持ち去れない構造にしなければならない。',
answer:true,
explain:'正しい。ガンロッカーは盗難防止のため固定が義務。固定されていないガンロッカーは丸ごと持ち去られる危険がある。鉄板厚1.0mm以上・施錠等の基準もある。',
ref:'銃刀法第10条の6'},

{id:209,cat:'keep',
q:'実包は銃と同じガンロッカーに保管すれば、銃と実包を分離して保管したことになる。',
answer:false,
explain:'誤り。同一ロッカーの別引き出しに分けても「共に保管」とみなされる。銃（ガンロッカー）と実包（装弾ロッカー）は別々の保管庫に入れることが原則。同一建物内でも可能な限り別保管が望ましい。',
ref:'銃刀法第10条の6'},

{id:210,cat:'keep',
q:'ガンロッカーの鍵を家族（所持許可を持たない）が使えるよう共有しておくことは、「自ら保管」したことにならない。',
answer:true,
explain:'正しい。家族に鍵を渡す・鍵を分かる場所に置くなど、他者がガンロッカーにアクセスできる状態は「自ら保管」の義務を果たしていない。ガンロッカーの鍵は本人が管理する義務がある。',
ref:'銃刀法第10条の6'},

{id:211,cat:'keep',
q:'帳簿（実包の消費記録）は最終記載日から3年間保存しなければならない。',
answer:true,
explain:'正しい。帳簿の保存期間は最終記載日から3年間。「1年間」「5年間」は誤り。令和7年改正で帳簿の記載事項（散弾/単弾の別・銃番号等）も拡大されている。',
ref:'火薬類取締法'},

{id:212,cat:'keep',
q:'帳簿（実包の消費記録）は最終記載日から1年間保存すれば足りる。',
answer:false,
explain:'誤り。保存期間は3年間。1年は誤り。「1年と書けば×」の代表的な数値ひっかけ問題。',
ref:'火薬類取締法'},

{id:213,cat:'keep',
q:'猟銃を携帯・運搬する際、複数丁の銃を一度に運ぶ場合でも家族に手伝わせることは認められていない。',
answer:true,
explain:'正しい。複数丁の運搬でも所持許可を持たない者（家族含む）が銃を持つことは所持許可違反。許可を持つ者本人のみが銃を持てる。',
ref:'銃刀法'},

{id:214,cat:'keep',
q:'長期入院等で自宅保管が困難な場合は、猟銃等保管業者に委託保管することができる。',
answer:true,
explain:'正しい。長期入院・長期旅行・住居建替え等の場合は猟銃等保管業者への委託保管が認められている。ただし短期留守では委託義務はない。',
ref:'銃刀法'},

{id:215,cat:'keep',
q:'実包の購入には都道府県公安委員会が発行する火薬類譲受許可証が必要であり、許可証に記載された数量の範囲内でのみ購入できる。',
answer:true,
explain:'正しい。実包（火薬類）の購入には火薬類譲受許可証が必要。許可証記載の数量を超えて購入することはできない。猟銃所持許可証だけでは実包の購入はできない。',
ref:'火薬類取締法第17条'},

{id:301,cat:'mech',
q:'散弾銃で弾倉に装填できる実包の数は、薬室の1発を含めて最大3発（弾倉2発＋薬室1発）に制限されている。',
answer:true,
explain:'正しい。猟銃として許可される散弾銃の装弾数は弾倉2発＋薬室1発の計3発まで。弾倉に3発以上装填できる構造の銃は猟銃としての所持許可を受けられない。',
ref:'銃刀法第4条'},

{id:302,cat:'mech',
q:'ライフル銃・空気銃で弾倉に6発以上装填できる構造のものは、猟銃としての所持許可を受けることができない。',
answer:true,
explain:'正しい。ライフル銃・空気銃は弾倉6発以上装填可能な構造のものは不許可。散弾銃は弾倉3発以上が不許可。それぞれ数値が異なる点に注意。',
ref:'銃刀法第4条'},

{id:303,cat:'mech',
q:'消音装置（サプレッサー・サイレンサー）を取り付けた猟銃は所持許可を受けることができない。',
answer:true,
explain:'正しい。消音装置付きの銃は猟銃としての許可が受けられない構造的不許可事由に該当する。',
ref:'銃刀法第4条'},

{id:304,cat:'mech',
q:'チョーク（絞り）のうち、フルチョークは弾が広がりやすいため近距離の鳥類に適している。',
answer:false,
explain:'誤り。フルチョークは最も強い絞りで散弾を集束させ遠距離向き。シリンダー（無絞り）が弾を広げ近距離向き。「フルチョーク=広がる=近距離」は逆。',
ref:'猟銃等取扱読本 構造編'},

{id:305,cat:'mech',
q:'薬室（チェンバー）長より長い実包を使用すると、薬室の完全閉鎖ができず高圧ガス漏れ・銃身破裂等の重大事故につながる。',
answer:true,
explain:'正しい。薬室長は使用できる実包の最大長を決める。規格外（長すぎる）実包は閉鎖不完全→高圧ガス漏れ→機関部破損・銃身破裂の原因となる。必ず銃の規格に合った実包を使用する。',
ref:'猟銃等取扱読本 実包編'},

{id:306,cat:'mech',
q:'半自動式（セミオートマチック）散弾銃は、引き金を引き続けると連続発射される。',
answer:false,
explain:'誤り。セミオートマチックは1回の引き金操作で1発のみ発射される。引き続けても1発しか出ない。連続発射（フルオート）は機関銃であり猟銃としての所持許可は受けられない。',
ref:'猟銃等取扱読本 構造編'},

{id:307,cat:'mech',
q:'自動装填式（セミオート）銃は、発射時の火薬ガス圧や反動を利用して自動的に排莢・次弾装填を行う。',
answer:true,
explain:'正しい。セミオートの作動原理：①ガス作動式（銃身のガスポートから発射ガスを取り出しピストンを動かす）②リコイル（反動）作動式の二種類が主流。',
ref:'猟銃等取扱読本 構造編'},

{id:308,cat:'mech',
q:'散弾銃の口径はゲージ（番）で表し、数字が小さいほど口径が大きい。',
answer:true,
explain:'正しい。ゲージ数が小さいほど口径大。12番（約18.5mm）>16番>20番>28番>.410の順で口径が小さくなる。「大きい数字=大口径」という逆の誤解が多い。',
ref:'猟銃等取扱読本 構造編'},

{id:309,cat:'mech',
q:'猟銃の全長は、おおむね94cm以上（銃身長は48.8cm以上）のものが猟銃として認められる。',
answer:true,
explain:'正しい。猟銃の全長・銃身長の基準：全長おおむね94cm以上、銃身長48.8cm（19インチ）以上が必要。これより短いものは猟銃として所持許可を受けられない。',
ref:'銃刀法第4条'},

{id:310,cat:'mech',
q:'ライフリング（腔線）のない銃（散弾銃等）でも、スラグ弾（一粒弾）を使用することができる。',
answer:true,
explain:'正しい。スラグ弾はライフリングのない散弾銃でも使用できる特殊弾頭。散弾銃のスラグ弾はイノシシ等大型獣向きで有効。ただし適切なチョーク（シリンダー等）を使用すること。',
ref:'猟銃等取扱読本 実包編'},

{id:401,cat:'exp',
q:'散弾実包のゲージ（番）表示で、12番は20番より口径が大きい。',
answer:true,
explain:'正しい。ゲージ数が小さいほど口径が大きい。12番（約18.5mm）は20番（約15.6mm）より大きい。',
ref:'猟銃等取扱読本 実包編'},

{id:402,cat:'exp',
q:'散弾実包のワッズ（Wad）は、推進薬と散弾の間を分離し、燃焼ガスの漏れを防ぎ、散弾を束ねて銃身内を運ぶ役割を持つ。',
answer:true,
explain:'正しい。ワッズの3機能：①推進薬と散弾の分離②ガス漏れ防止（オブチュレーション）③散弾を束ねて銃身内を運ぶ。プラスチック製が主流。',
ref:'猟銃等取扱読本 実包編'},

{id:403,cat:'exp',
q:'水で濡れた実包は、乾燥させれば問題なく使用できる。',
answer:false,
explain:'誤り。水に濡れた実包は雷管・推進薬が変質している可能性があり、乾燥させても使用してはならない。不発・遅発・過圧等の危険がある。銃砲火薬店に持ち込んで処分する。',
ref:'猟銃等取扱読本 実包編'},

{id:404,cat:'exp',
q:'不発弾（実包）は、燃えるゴミとして廃棄することができる。',
answer:false,
explain:'誤り。実包は火薬類であり一般廃棄物として処分することは火薬類取締法違反。銃砲火薬店または警察署に持ち込んで適切に処分する。土に埋める・水に浸けるなども不可。',
ref:'火薬類取締法'},

{id:405,cat:'exp',
q:'実包の自家製造（リロード）は、所持許可取得者であれば自己消費目的で行うことができる。',
answer:false,
explain:'誤り。火薬類の製造（リロードを含む）は火薬類取締法で規制される。所持許可の有無に関わらず、無許可製造は違法。市販の正規実包のみ使用すること。',
ref:'火薬類取締法'},

{id:406,cat:'exp',
q:'鉛製散弾による水鳥類の鉛中毒問題から、水鳥猟では非鉛弾（スチール弾等）の使用が義務付けられている地域・条件がある。',
answer:true,
explain:'正しい。水鳥（カモ等）猟では水辺に落ちた鉛散弾を水鳥が誤飲する鉛中毒問題があり、環境省の規制により多くの地域・条件で非鉛弾使用が義務化されている。',
ref:'鳥獣保護管理法・環境省通知'},

{id:407,cat:'exp',
q:'無許可で実包を自家製造できる上限は、1日に実包・空包合わせて100個以下である。',
answer:true,
explain:'正しい。無許可製造の上限は1日100個以下。標的射撃の無許可消費400個・狩猟の無許可消費100個と区別して覚える。',
ref:'火薬類取締法'},

{id:408,cat:'exp',
q:'無許可で実包を譲り受けられる上限は、実包（ライフル用を除く）300個以下である。',
answer:true,
explain:'正しい。無許可譲受票による譲受上限：実包300個以下（うちライフル用50個以下）。銃用雷管300個以下（うちライフル用50個以下）。無煙火薬等は600g以下。',
ref:'火薬類取締法（経産省通達）'},

{id:409,cat:'exp',
q:'薬室長76mmの散弾銃に、薬室長70mmの実包を使用することは問題ない。',
answer:true,

// 状態管理
// ════════════════════════════════════════════
const LS_KEY   = 'huntingHQ_v1';
const SYNC_KEY = 'hunting_sync_cfg';
const CLAUDE_KEY = 'huntingHQ_claudeKey';

let appState = {
  currentExam: 'hunter', // 'hunter' | 'gun'
  hunter: { totalAnswered:0, totalCorrect:0, wrongIds:[], markedIds:[], catStats:{} },
  gun:    { totalAnswered:0, totalCorrect:0, wrongIds:[], markedIds:[], catStats:{} },
  notes:  [],
  customQ: { hunter:[], gun:[] },
};

function saveLocal() {
  localStorage.setItem(LS_KEY, JSON.stringify(appState));
}
function loadLocal() {
  try {
    const d = localStorage.getItem(LS_KEY);
    if (d) appState = {...appState, ...JSON.parse(d)};
    // 後方互換: 旧キーから移行
    const oldH = localStorage.getItem('hunter_quiz_v1');
    const oldG = localStorage.getItem('gun_quiz_v1');
    if (oldH && appState.hunter.totalAnswered === 0) {
      try { const p = JSON.parse(oldH); appState.hunter = {...appState.hunter, ...p}; } catch(e){}
    }
    if (oldG && appState.gun.totalAnswered === 0) {
      try { const p = JSON.parse(oldG); appState.gun = {...appState.gun, ...p}; } catch(e){}
    }
  } catch(e) {}
}

function getExamState() { return appState[appState.currentExam]; }
function getQDB() {
  const base = appState.currentExam === 'hunter' ? HUNTER_QDB : GUN_QDB;
  const custom = (appState.customQ[appState.currentExam]||[]);
  return [...base, ...custom];
}
function getCats() { return appState.currentExam === 'hunter' ? HUNTER_CATS : GUN_CATS; }

// ════════════════════════════════════════════
// 同期
// ════════════════════════════════════════════
function getSyncCfg() { try { return JSON.parse(localStorage.getItem(SYNC_KEY)||'{}'); } catch(e) { return {}; } }
function setSyncCfg(cfg) { localStorage.setItem(SYNC_KEY, JSON.stringify(cfg)); }
function hasSyncCfg() { const c=getSyncCfg(); return !!(c.apiKey&&c.binId); }

async function _fetchBin() {
  const {apiKey,binId} = getSyncCfg();
  const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {headers:{'X-Master-Key':apiKey}});
  if (!r.ok) throw new Error('HTTP '+r.status);
  const j = await r.json(); return j.record||{};
}
async function _putBin(data) {
  const {apiKey,binId} = getSyncCfg();
  const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
    method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':apiKey},
    body: JSON.stringify(data)
  });
  return r.ok;
}

async function doPush() {
  if (!hasSyncCfg()) { toast('設定タブでAPI KeyとBin IDを入力してください'); return; }
  setCfgStatus('saving');
  try {
    const existing = await _fetchBin().catch(()=>({}));
    const ok = await _putBin({...existing, huntingHQ_v1: appState, _updated: Date.now()});
    if (ok) { setCfgStatus('ok','保存完了'); toast('☁️ 保存しました'); }
    else { setCfgStatus('err','保存失敗'); toast('❌ 保存エラー'); }
  } catch(e) { setCfgStatus('err', e.message); toast('❌ '+e.message); }
}

async function doFullSync() {
  if (!hasSyncCfg()) { toast('設定タブでAPI KeyとBin IDを入力してください'); return; }
  setCfgStatus('loading');
  const btn = document.getElementById('syncStatus');
  if (btn) btn.textContent = '同期中…';
  try {
    const data = await _fetchBin();
    if (data && data.huntingHQ_v1) {
      const cloud = data.huntingHQ_v1;
      // クラウドの方が新しければ上書き
      const localTotal = (appState.hunter.totalAnswered||0) + (appState.gun.totalAnswered||0);
      const cloudTotal = ((cloud.hunter||{}).totalAnswered||0) + ((cloud.gun||{}).totalAnswered||0);
      if (cloudTotal >= localTotal) {
        appState = {...appState, ...cloud};
        saveLocal();
        updateAllUI();
        toast('☁️ データを取得しました');
      } else {
        toast('ローカルが最新です');
      }
    } else {
      toast('クラウドにデータがありません');
    }
    setCfgStatus('ok','取得完了');
  } catch(e) { setCfgStatus('err', e.message); toast('❌ '+e.message); }
  if (btn) btn.textContent = hasSyncCfg() ? '同期済み' : '―';
}

// クイズロジック
// ════════════════════════════════════════════
let session = {qs:[], idx:0, answers:[], mode:'', startTime:0};
let currentQ = null;
let answered = false;
let shuffledAnswerIdx = 0;

function getPool(mode, catKey) {
  const qdb = getQDB();
  const st = getExamState();
  if (mode==='random') return shuffle([...qdb]);
  if (mode==='exam') return shuffleExam(qdb);
  if (mode==='wrong') {
    const p = qdb.filter(q=>st.wrongIds.includes(q.id));
    if (!p.length) { toast('間違えた問題がありません 🎉'); return null; }
    return shuffle(p);
  }
  if (mode==='marked') {
    const p = qdb.filter(q=>st.markedIds.includes(q.id));
    if (!p.length) { toast('マーク済み問題がありません'); return null; }
    return shuffle(p);
  }
  if (mode==='cat') return shuffle(qdb.filter(q=>q.cat===catKey));
  return shuffle([...qdb]);
}

function shuffleExam(qdb) {
  if (appState.currentExam === 'hunter') {
    const law  = shuffle(qdb.filter(q=>q.cat==='law')).slice(0,13);
    const bird = shuffle(qdb.filter(q=>q.cat==='bird')).slice(0,9);
    const gun  = shuffle(qdb.filter(q=>q.cat==='gun')).slice(0,6);
    const rest = shuffle(qdb.filter(q=>!['law','bird','gun'].includes(q.cat))).slice(0,2);
    return shuffle([...law,...bird,...gun,...rest]);
  } else {
    const law  = shuffle(qdb.filter(q=>q.cat==='law')).slice(0,25);
    const rest = shuffle(qdb.filter(q=>q.cat!=='law')).slice(0,25);
    return shuffle([...law,...rest]);
  }
}

function startMode(mode, catKey='') {
  const pool = getPool(mode, catKey);
  if (!pool) return;
  const examCount = appState.currentExam==='hunter' ? 30 : 50;
  const count = (mode==='exam') ? Math.min(examCount, pool.length) : Math.min(20, pool.length);
  session = {qs: pool.slice(0,count), idx:0, answers:[], mode, startTime: Date.now()};
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  const q = session.qs[session.idx];
  currentQ = q; answered = false;
  const cats = getCats();
  const ci = cats[q.cat] || {name:q.cat, color:'#888'};

  document.getElementById('qCatBadge').textContent = ci.name;
  document.getElementById('qCatBadge').style.cssText = `background:${ci.color}22;color:${ci.color};border:1px solid ${ci.color}44;`;
  document.getElementById('qNumber').textContent = `Q.${String(q.id).padStart(3,'0')}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qCounter').textContent = `${session.idx+1} / ${session.qs.length}`;
  document.getElementById('progBar').style.width = ((session.idx+1)/session.qs.length*100)+'%';

  // 三肢択一
  if (q.choices && Array.isArray(q.choices)) {
    const indexed = q.choices.map((text,i)=>({text, isCorrect: i===q.answer}));
    for (let i=indexed.length-1;i>0;i--) {
      const j=Math.floor(Math.random()*(i+1));
      [indexed[i],indexed[j]]=[indexed[j],indexed[i]];
    }
    shuffledAnswerIdx = indexed.findIndex(c=>c.isCorrect);
    document.getElementById('choicesEl').innerHTML = indexed.map((c,i)=>`
      <button class="choice" onclick="answerQ(${i})">
        <span class="choice-label">${['A','B','C','D'][i]}</span>
        <span class="choice-text">${c.text}</span>
      </button>`).join('');
  } else {
    // ○×式（gun-quiz等）
    shuffledAnswerIdx = q.answer ? 0 : 1; // true=○=0, false=×=1
    document.getElementById('choicesEl').innerHTML = `
      <button class="choice" style="justify-content:center;min-height:80px;" onclick="answerQ(0)">
        <span style="font-size:3rem;">○</span>
      </button>
      <button class="choice" style="justify-content:center;min-height:80px;" onclick="answerQ(1)">
        <span style="font-size:3rem;">×</span>
      </button>`;
  }

  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  updateMarkBtn();
}

function answerQ(idx) {
  if (answered) return;
  answered = true;
  const q = currentQ;
  const correct = (idx === shuffledAnswerIdx);
  session.answers.push({id:q.id, correct});

  const st = getExamState();
  st.totalAnswered++;
  if (correct) st.totalCorrect++;
  if (!st.catStats[q.cat]) st.catStats[q.cat] = {a:0,c:0};
  st.catStats[q.cat].a++;
  if (correct) st.catStats[q.cat].c++;
  if (!correct) { if (!st.wrongIds.includes(q.id)) st.wrongIds.push(q.id); }
  else { st.wrongIds = st.wrongIds.filter(id=>id!==q.id); }
  saveLocal();

  const choices = document.querySelectorAll('.choice');
  choices.forEach((el,i) => {
    el.style.pointerEvents = 'none';
    if (i===shuffledAnswerIdx) el.classList.add(correct&&i===idx ? 'correct' : 'show-correct');
    else if (i===idx) el.classList.add('wrong');
  });

  const rb = document.getElementById('resultBox');
  rb.style.display = 'block';
  rb.className = 'result-box ' + (correct ? 'correct-box' : 'wrong-box');
  document.getElementById('resultIcon').textContent = correct ? '✅' : '❌';
  document.getElementById('resultVerdict').textContent = correct ? '正解！' : '不正解';
  document.getElementById('resultExplain').textContent = q.explain || '';
  document.getElementById('resultRef').textContent = q.ref ? '📖 '+q.ref : '';
  document.getElementById('nextBtn').style.display = 'block';
  updateMarkBtn();
}

function nextQ() {
  session.idx++;
  if (session.idx >= session.qs.length) { showResult(); return; }
  renderQ();
}

function exitQuiz() {
  if (confirm('終了しますか？')) { showScreen('home'); updateAllUI(); }
}

function toggleMark() {
  if (!currentQ) return;
  const st = getExamState();
  const id = currentQ.id;
  if (st.markedIds.includes(id)) st.markedIds = st.markedIds.filter(x=>x!==id);
  else st.markedIds.push(id);
  saveLocal(); updateMarkBtn();
}
function updateMarkBtn() {
  if (!currentQ) return;
  const st = getExamState();
  const marked = st.markedIds.includes(currentQ.id);
  const btn = document.getElementById('markBtn');
  btn.textContent = marked ? '★ マーク済み' : '☆ 重要マーク';
  btn.style.color = marked ? 'var(--yellow)' : 'var(--muted)';
}

function showResult() {
  showScreen('result');
  const total = session.qs.length;
  const correct = session.answers.filter(a=>a.correct).length;
  const rate = Math.round(correct/total*100);
  const elapsed = Math.round((Date.now()-session.startTime)/1000);

  document.getElementById('resScore').textContent = `${correct}/${total}`;
  document.getElementById('resRate').textContent = rate+'%';
  document.getElementById('resRate').style.color = rate>=90?'var(--green)':rate>=70?'var(--yellow)':'var(--red)';
  document.getElementById('resTime').textContent = `${Math.floor(elapsed/60)}分${elapsed%60}秒`;

  const passEl = document.getElementById('resPass');
  const threshold = appState.currentExam==='hunter' ? 70 : 90;
  if (session.mode==='exam') {
    passEl.textContent = rate>=threshold ? '🎉 合格ライン達成！' : `⚠️ 要復習 (${threshold}%以上で合格)`;
    passEl.className = 'result-pass ' + (rate>=threshold ? 'pass-ok' : 'pass-ng');
  } else { passEl.textContent=''; passEl.className='result-pass'; }

  const cats = getCats();
  const catR = {};
  session.answers.forEach(a=>{
    const q = getQDB().find(x=>x.id===a.id); if(!q) return;
    if(!catR[q.cat]) catR[q.cat]={c:0,t:0};
    catR[q.cat].t++; if(a.correct) catR[q.cat].c++;
  });
  document.getElementById('catResults').innerHTML = Object.entries(catR).map(([k,v])=>{
    const r=Math.round(v.c/v.t*100);
    const col=r>=80?'var(--green)':r>=60?'var(--yellow)':'var(--red)';
    return `<div class="cat-result-row">
      <div class="cat-result-top"><span>${(cats[k]||{icon:'',name:k}).icon} ${(cats[k]||{name:k}).name}</span><span style="color:${col};font-family:var(--mono)">${v.c}/${v.t} (${r}%)</span></div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${r}%;background:${col}"></div></div>
    </div>`;
  }).join('');

  // 終了後に自動保存
  autoSave();
}

  document.getElementById('dashMarked').textContent = st.markedIds.length;
  renderWeakSection();
}

function renderWeakSection() {
  const st = getExamState();
  const cats = getCats();
  const entries = Object.entries(st.catStats||{}).filter(([,v])=>v.a>0).sort(([,a],[,b])=>{
    const ra=Math.round(a.c/a.a*100), rb=Math.round(b.c/b.a*100); return ra-rb;
  });
  if (!entries.length) { document.getElementById('weakCard').style.display='none'; return; }
  document.getElementById('weakCard').style.display='block';
  document.getElementById('weakSection').innerHTML = entries.map(([k,v])=>{
    const pct = Math.round(v.c/v.a*100);
    const col = pct<50?'var(--red)':pct<80?'var(--yellow)':'var(--green)';
    return `<div class="weak-cat-row">
      <span class="weak-pct" style="color:${col}">${pct}%</span>
      <span style="flex:1;font-size:13px;">${(cats[k]||{icon:'',name:k}).icon} ${(cats[k]||{name:k}).name}</span>
      <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${v.c}/${v.a}</span>
    </div>`;
  }).join('');
}

function updateCatDisplay() {
  const cats = getCats();
  const qdb = getQDB();
  const st = getExamState();
  document.getElementById('catList').innerHTML = Object.entries(cats).map(([k,v])=>{
    const qs = qdb.filter(q=>q.cat===k);
    const cs = st.catStats[k]||{a:0,c:0};
    const rate = cs.a>0 ? Math.round(cs.c/cs.a*100) : null;
    const col = rate===null?'var(--muted)':rate===100?'var(--green)':rate>=70?'var(--yellow)':'var(--red)';
    return `<button class="mode-btn" onclick="startMode('cat','${k}')">
      <span class="mic">${v.icon}</span>
      <div class="mtx"><div class="mn">${v.name}</div><div class="ms">${qs.length}問</div></div>
      <span style="font-family:var(--mono);font-size:13px;color:${col}">${rate!==null?rate+'%':'--'}</span>
    </button>`;
  }).join('');
}

function renderCountdown() {

// ════════════════════════════════════════════
// メモ
// ════════════════════════════════════════════
function addNote() {
  const tag = document.getElementById('noteExam').value;
  const title = document.getElementById('noteTitle').value.trim();
  const body = document.getElementById('noteBody').value.trim();
  const imp = parseInt(document.getElementById('noteImp').value);
  if (!title||!body) { toast('タイトルと内容を入力してください'); return; }
  appState.notes.unshift({id:Date.now(),tag,title,body,imp,date:new Date().toISOString().slice(0,10)});
  saveLocal(); renderNotes(); autoSave();
  document.getElementById('noteTitle').value='';
  document.getElementById('noteBody').value='';
  toast('メモを保存しました');
}

function renderNotes() {
  const fe = document.getElementById('filterExam').value;
  const fs = document.getElementById('filterSort').value;
  let notes = [...appState.notes];
  if (fe!=='all') notes = notes.filter(n=>n.tag===fe);
  if (fs==='imp') notes.sort((a,b)=>b.imp-a.imp);
  const tagMap = {h:'tag-h',g:'tag-g',b:'tag-b'};
  const tagLabel = {h:'狩猟免許',g:'猟銃講習会',b:'共通'};
  const el = document.getElementById('notesList');
  if (!notes.length) { el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">まだメモがありません</div>'; return; }
  el.innerHTML = notes.map(n=>`<div class="note-card">
    <button class="note-del" onclick="deleteNote(${n.id})">✕</button>
    <span class="note-tag ${tagMap[n.tag]}">${tagLabel[n.tag]}</span>
    <span style="font-size:11px;color:var(--yellow);margin-left:4px">${'⭐'.repeat(n.imp||1)}</span>
    <div class="note-title">${n.title}</div>
    <div class="note-body">${n.body}</div>
    <div class="note-meta">${n.date}</div>
  </div>`).join('');
}

function deleteNote(id) {
  appState.notes = appState.notes.filter(n=>n.id!==id);
  saveLocal(); renderNotes(); autoSave();
}

// 問題追加
// ════════════════════════════════════════════
function updateAqCat() {
  const exam = document.getElementById('aqExam').value;
  const cats = exam==='hunter' ? HUNTER_CATS : GUN_CATS;
  document.getElementById('aqCat').innerHTML = Object.entries(cats).map(([k,v])=>`<option value="${k}">${v.icon} ${v.name}</option>`).join('');
}

function addQuestion() {
  const exam = document.getElementById('aqExam').value;
  const cat  = document.getElementById('aqCat').value;
  const q    = document.getElementById('aqQ').value.trim();
  const c0   = document.getElementById('aqC0').value.trim();
  const c1   = document.getElementById('aqC1').value.trim();
  const c2   = document.getElementById('aqC2').value.trim();
  const exp  = document.getElementById('aqExplain').value.trim();
  const ref  = document.getElementById('aqRef').value.trim();
  if (!q||!c0||!c1||!c2) { toast('問題文と選択肢3つを入力してください'); return; }
  if (!appState.customQ) appState.customQ = {hunter:[],gun:[]};
  if (!appState.customQ[exam]) appState.customQ[exam] = [];
  const newId = 90000 + Date.now() % 100000;
  appState.customQ[exam].push({id:newId, cat, q, choices:[c0,c1,c2], answer:0, explain:exp, ref});
  saveLocal(); autoSave();
  document.getElementById('aqQ').value='';
  document.getElementById('aqC0').value='';
  document.getElementById('aqC1').value='';
  document.getElementById('aqC2').value='';
  document.getElementById('aqExplain').value='';
  document.getElementById('aqRef').value='';
  toast(`問題を追加しました（${exam==='hunter'?'狩猟':'銃'}）`);
  updateCustomQCount();
}

function updateCustomQCount() {
  const hc = (appState.customQ?.hunter||[]).length;
  const gc = (appState.customQ?.gun||[]).length;
  const el = document.getElementById('customQCount');
  if (el) el.textContent = `狩猟${hc}問 / 銃${gc}問`;
}

// ════════════════════════════════════════════
// AI問題生成
// ════════════════════════════════════════════
function switchAddTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['manual','ai'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

async function generateAI() {
  const claudeKey = localStorage.getItem(CLAUDE_KEY)||'';
  if (!claudeKey) { toast('設定タブでClaude API Keyを入力してください'); gotoTab('settings'); return; }
  const text = document.getElementById('aiText').value.trim();
  if (!text) { toast('テキストを入力してください'); return; }
  const exam = document.getElementById('aiExam').value;
  const count = document.getElementById('aiCount').value;
  const cats = exam==='hunter' ? HUNTER_CATS : GUN_CATS;
  const catNames = Object.entries(cats).map(([k,v])=>`${k}: ${v.name}`).join(', ');

  const btn = document.getElementById('aiGenBtn');
  btn.textContent = '生成中…'; btn.disabled = true;
  document.getElementById('aiResult').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">AIが問題を生成しています...</div>';

  try {
    const prompt = `以下のテキストから、${exam==='hunter'?'狩猟免許試験':'猟銃等講習会考査'}の練習問題を${count}問生成してください。

テキスト:
${text}

カテゴリ一覧: ${catNames}

以下のJSON配列形式のみで返答してください（説明文・コードブロック不要）:
[{"cat":"カテゴリキー","q":"問題文","choices":["正解","不正解1","不正解2"],"answer":0,"explain":"解説文","ref":"参照条文（任意）"}]

条件:
- answer は必ず 0（choices[0]が正解）
- 選択肢は3つ（三肢択一）
- 本番試験のひっかけ問題スタイルで難しく
- 日本語で出力`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role:'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message||'API Error');
    const txt = data.content.map(b=>b.text||'').join('');
    const jsonMatch = txt.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('JSONが見つかりません');
    const questions = JSON.parse(jsonMatch[0]);

    if (!appState.customQ) appState.customQ = {hunter:[],gun:[]};
    if (!appState.customQ[exam]) appState.customQ[exam] = [];
    const added = [];
    questions.forEach(q=>{
      const newId = 90000 + Date.now()%100000 + Math.floor(Math.random()*1000);
      const newQ = {id:newId, cat:q.cat||Object.keys(cats)[0], q:q.q, choices:q.choices, answer:0, explain:q.explain, ref:q.ref||''};
      appState.customQ[exam].push(newQ);
      added.push(newQ);
    });
    saveLocal(); autoSave(); updateCustomQCount();

    document.getElementById('aiResult').innerHTML = `
      <div style="color:var(--green);font-size:13px;font-weight:700;margin-bottom:10px;">✅ ${added.length}問を生成しました</div>
      ${added.map(q=>`<div class="card" style="margin-bottom:8px;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">${(cats[q.cat]||{icon:'',name:q.cat}).icon} ${(cats[q.cat]||{name:q.cat}).name}</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${q.q}</div>
        ${q.choices.map((c,i)=>`<div style="font-size:12px;padding:4px 0;color:${i===0?'var(--green)':'var(--muted)'};">${['A','B','C'][i]}. ${c}</div>`).join('')}
      </div>`).join('')}`;
    toast(`${added.length}問を追加しました`);
  } catch(e) {
    document.getElementById('aiResult').innerHTML = `<div style="color:var(--red);font-size:13px;">❌ エラー: ${e.message}</div>`;
    toast('❌ 生成エラー: '+e.message);
  }
  btn.textContent = '🤖 AIで問題を生成'; btn.disabled = false;
}

// ════════════════════════════════════════════
// 設定
// ════════════════════════════════════════════
function saveCfg() {
  const apiKey = document.getElementById('cfgApiKey').value.trim();
  const binId  = document.getElementById('cfgBinId').value.trim();
  if (!apiKey||!binId) { toast('API KeyとBin IDを入力してください'); return; }
  setSyncCfg({apiKey,binId});
  setCfgStatus('ok','設定を保存しました');
  toast('設定を保存しました');
  doPush();
}

function saveClaudeKey() {
  const key = document.getElementById('cfgClaudeKey').value.trim();
  if (!key) { toast('API Keyを入力してください'); return; }
  localStorage.setItem(CLAUDE_KEY, key);
  toast('Claude API Keyを保存しました');
}

function setCfgStatus(s, msg) {
  const map = {ok:['dot-ok','同期済み'],err:['dot-err','エラー'],saving:['dot-idle','保存中…'],loading:['dot-idle','取得中…']};
  const [cls,label] = map[s]||['dot-idle','未設定'];
  const dot = document.getElementById('cfgDot');
  const st  = document.getElementById('cfgStatus');
  if (dot) { dot.className='sync-dot '+cls; }
  if (st)  { st.textContent=label; }
  const log = document.getElementById('cfgLog');
  if (log && msg) log.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  const topStatus = document.getElementById('syncStatus');
  if (topStatus) topStatus.textContent = s==='ok'?'同期済み':s==='err'?'エラー':'';
}

function resetProgress() {
  if (!confirm('進捗データをリセットしますか？（問題・メモは残ります）')) return;
  appState.hunter = {totalAnswered:0,totalCorrect:0,wrongIds:[],markedIds:[],catStats:{}};
  appState.gun    = {totalAnswered:0,totalCorrect:0,wrongIds:[],markedIds:[],catStats:{}};
  saveLocal(); updateAllUI(); toast('進捗をリセットしました');
}

function resetCustomQ() {
  if (!confirm('追加した問題をすべて削除しますか？')) return;
  appState.customQ = {hunter:[],gun:[]};
  saveLocal(); updateCustomQCount(); toast('追加問題を削除しました');
}

// ════════════════════════════════════════════
// 自動保存
// ════════════════════════════════════════════
async function autoSave() {
  if (!hasSyncCfg()) return;
  try {
    const existing = await _fetchBin().catch(()=>({}));
    await _putBin({...existing, huntingHQ_v1: appState, _updated: Date.now()});
  } catch(e) {}
}

// ════════════════════════════════════════════
// 画面遷移
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function showCatScreen() {
  updateCatDisplay();
  showScreen('cat');
}

function gotoTab(tab) {
  showScreen(tab);
  if (tab==='dash') updateDashUI();
  if (tab==='add') { updateAqCat(); updateCustomQCount(); }
  if (tab==='settings') {
    const cfg = getSyncCfg();
    if (cfg.apiKey) {
      document.getElementById('cfgApiKey').value = cfg.apiKey;
      document.getElementById('cfgBinId').value  = cfg.binId;
      setCfgStatus('ok','設定済み');
    }
    const ck = localStorage.getItem(CLAUDE_KEY)||'';
    if (ck) document.getElementById('cfgClaudeKey').value = ck;
    updateCustomQCount();
  }
}

// ════════════════════════════════════════════
// ユーティリティ
// ════════════════════════════════════════════
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
