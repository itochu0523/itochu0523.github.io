<title>🔫 猟銃等講習会 完全攻略</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root{
  --bg:#0a0c14;--bg2:#111520;--bg3:#1a1f35;
  --blue:#60a5fa;--blue2:#1d4ed8;--blue3:#0a1020;
  --red:#f87171;--red2:#dc2626;--red3:#2d0a0a;
  --yellow:#fbbf24;--green:#4ade80;
  --text:#e8eeff;--muted:#6b7280;--card:#0d1020;
  --border:rgba(96,165,250,0.15);
  --font:'Zen Kaku Gothic New',sans-serif;
  --mono:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:var(--bg);min-height:100vh;font-family:var(--font);color:var(--text);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}

/* HOME */
#home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.home-icon{font-size:72px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(96,165,250,0.5));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 20px rgba(96,165,250,0.5))}50%{filter:drop-shadow(0 0 40px rgba(96,165,250,0.9))}}
.home-title{font-size:26px;font-weight:900;color:var(--blue);letter-spacing:-1px;line-height:1.1;margin-bottom:6px;text-shadow:0 0 30px rgba(96,165,250,0.4)}
.home-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;line-height:1.6}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:380px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.stat-num{font-family:var(--mono);font-size:22px;color:var(--blue);font-weight:700}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px}

.mode-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px}
.mode-btn{padding:16px;border-radius:14px;border:none;cursor:pointer;font-family:var(--font);font-size:15px;font-weight:700;display:flex;align-items:center;gap:12px;text-align:left;transition:all .15s;position:relative;overflow:hidden}
.mode-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05),transparent);pointer-events:none}
.btn-main{background:linear-gradient(135deg,#1d4ed8,#0a1020);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.btn-main:active{transform:scale(.98)}
.btn-weak{background:linear-gradient(135deg,#7c2d12,#1c0a00);color:#fb923c;border:1px solid rgba(251,146,60,.3)}
.btn-wrong{background:linear-gradient(135deg,#7f1d1d,#1a0000);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-cat{background:linear-gradient(135deg,#164e63,#0a1a1a);color:#22d3ee;border:1px solid rgba(34,211,238,.3)}
.btn-exam{background:linear-gradient(135deg,#4c1d95,#0a0010);color:#c084fc;border:2px solid rgba(192,132,252,.5)}
.mode-btn .icon{font-size:24px;flex-shrink:0}
.mode-btn .desc{font-size:10px;opacity:.7;font-weight:400;margin-top:2px}
.btn-badge{background:rgba(248,113,113,.2);color:var(--red);border-radius:20px;padding:2px 8px;font-size:10px;margin-left:auto;font-family:var(--mono);flex-shrink:0}
.btn-badge.yellow{background:rgba(251,191,36,.2);color:var(--yellow)}

/* CATEGORY SELECT */
#catscreen{display:none;flex-direction:column;min-height:100vh;padding:20px}
.screen-hd{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.back-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer}
.screen-ttl{font-size:18px;font-weight:900;color:var(--blue)}
.cat-grid{display:flex;flex-direction:column;gap:10px}
.cat-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left;transition:all .15s}
.cat-btn:active{transform:scale(.98);background:var(--bg3)}
.cat-icon{font-size:28px;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-size:15px;font-weight:700;color:var(--text)}
.cat-count{font-size:11px;color:var(--muted);margin-top:2px}
.cat-rate{font-family:var(--mono);font-size:14px;font-weight:700;flex-shrink:0}

/* QUIZ */
#quiz{display:none;flex-direction:column;min-height:100vh}
.quiz-header{padding:14px 16px 10px;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.q-exit{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 10px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font)}
.q-info{font-family:var(--mono);font-size:12px;color:var(--muted)}
.q-cat-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:1px}
.prog-wrap{background:rgba(255,255,255,.05);border-radius:4px;height:4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue2),var(--blue));border-radius:4px;transition:width .4s ease}

.quiz-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px}
.q-number{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px}
.q-text{font-size:17px;font-weight:700;line-height:1.6;color:var(--text)}

.choices{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.choice{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;text-align:left;font-family:var(--font)}
.choice:active{transform:scale(.99)}
.choice-label{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.choice-text{font-size:14px;line-height:1.5;color:var(--text)}

.choice.correct{background:rgba(74,222,128,.1);border-color:#4ade80;animation:correctPop .3s ease}
.choice.wrong{background:rgba(248,113,113,.1);border-color:var(--red)}
.choice-ox{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 10px;min-height:90px;font-size:1rem;gap:4px;}
.choice.show-correct{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.4)}
.choice.correct .choice-label{background:#4ade80;color:#000}
.choice.wrong .choice-label{background:var(--red);color:#fff}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}

.result-box{border-radius:14px;padding:14px 16px;display:none;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-box.correct-box{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3)}
.result-box.wrong-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3)}
.result-label{font-size:13px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.result-explain{font-size:13px;color:#cbd5e1;line-height:1.7}
.result-ref{font-size:10px;color:var(--muted);margin-top:6px;font-family:var(--mono)}

.mark-btn{background:transparent;border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:6px 12px;color:var(--yellow);font-size:12px;cursor:pointer;font-family:var(--font);margin-top:8px}
.mark-btn.marked{background:rgba(251,191,36,.15);border-color:var(--yellow)}

.next-btn{background:linear-gradient(135deg,var(--blue2),#0a1020);border:1px solid rgba(96,165,250,.3);border-radius:14px;padding:16px;color:var(--blue);font-size:16px;font-weight:900;cursor:pointer;font-family:var(--font);width:100%;margin-top:4px;transition:all .15s;display:none}
.next-btn:active{transform:scale(.98)}
.next-btn.finish{background:linear-gradient(135deg,#065f46,#022c22);border-color:rgba(74,222,128,.3);color:#4ade80}

/* RESULT */
#result{display:none;flex-direction:column;min-height:100vh;padding:24px;align-items:center}
.result-title{font-size:28px;font-weight:900;margin:16px 0 4px;text-align:center}
.result-score{font-family:var(--mono);font-size:72px;font-weight:700;text-align:center;line-height:1;margin:16px 0}
.score-perfect{color:#4ade80;text-shadow:0 0 40px rgba(74,222,128,.6)}
.score-good{color:var(--yellow)}
.score-bad{color:var(--red)}
.result-msg{font-size:14px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.7}

.result-cats{width:100%;max-width:400px;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.cat-result{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.cat-result-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cat-result-name{font-size:13px;font-weight:700}
.cat-result-score{font-family:var(--mono);font-size:13px}
.cat-bar-bg{background:rgba(255,255,255,.06);border-radius:4px;height:5px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}

.result-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px}
.res-btn{padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:700;transition:all .15s}
.res-btn:active{transform:scale(.98)}
.res-btn.primary{background:linear-gradient(135deg,var(--blue2),#0a1020);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.res-btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}

/* TOAST */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#0d1a35;border:1px solid var(--blue);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--blue);z-index:1000;transition:transform .3s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="home-icon">🔫</div>
  <div class="home-title">猟銃等講習会<br>完全攻略</div>
  <div class="home-sub">初心者講習 考査対策 · 100点主義<br>銃砲刀剣類所持等取締法 · 火薬類取締法</div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="st-total">0</div>
      <div class="stat-lbl">累計回答</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="st-rate" style="color:var(--yellow)">-%</div>
      <div class="stat-lbl">正答率</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="st-wrong" style="color:var(--red)">0</div>
      <div class="stat-lbl">要復習</div>
    </div>
  </div>

  <div style="display:flex;gap:8px;width:100%;max-width:380px;margin-bottom:4px;">
    <button onclick="showSyncModal()" style="flex:1;padding:9px;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);border-radius:10px;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;">⚙️ 同期設定</button>
    <button onclick="autoSaveAll()" style="flex:1;padding:9px;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);border-radius:10px;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;" id="sync-btn">☁️ クラウドに保存</button>
  </div>

  <div class="mode-btns">
    <button class="mode-btn btn-main" onclick="startMode('random')">
      <span class="icon">🎯</span>
      <div><div>ランダム出題 20問</div><div class="desc">全分野から網羅的に出題・100点主義</div></div>
    </button>
    <button class="mode-btn btn-wrong" onclick="startMode('wrong')">
      <span class="icon">❌</span>
      <div><div>間違えた問題だけ</div><div class="desc">苦手を徹底的に潰す</div></div>
      <span class="btn-badge" id="wrong-count-badge">0問</span>
    </button>
    <button class="mode-btn btn-weak" onclick="startMode('weak')">
      <span class="icon">⭐</span>
      <div><div>マーク済み問題</div><div class="desc">自分でマークした重要問題</div></div>
      <span class="btn-badge yellow" id="mark-count-badge">0問</span>
    </button>
    <button class="mode-btn btn-exam" onclick="startMode('exam')" style="margin-bottom:4px;">
      <span class="icon">📝</span>
      <div><div>本番模擬試験（50問○×）</div><div class="desc">本番と同じ形式・90%以上で合格ライン</div></div>
    </button>
    <button class="mode-btn btn-cat" onclick="showCatScreen()">
      <span class="icon">📚</span>
      <div><div>分野別に攻める</div><div class="desc">法令・取扱・保管・安全・火薬</div></div>
    </button>
  </div>
</div>

<!-- CATEGORY SELECT -->
<div id="catscreen">
  <div class="screen-hd">
    <button class="back-btn" onclick="showHome()">← 戻る</button>
    <div class="screen-ttl">分野を選ぶ</div>
  </div>
  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <div class="quiz-top">
      <button class="q-exit" onclick="exitQuiz()">✕ 終了</button>
      <span class="q-info" id="q-counter">1 / 20</span>
      <span class="q-cat-badge" id="q-cat-badge"></span>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:5%"></div></div>
  </div>
  <div class="quiz-body">
    <div class="q-number" id="q-number">Q.001</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="result-box" id="result-box">
      <div class="result-label" id="result-label"></div>
      <div class="result-explain" id="result-explain"></div>
      <div class="result-ref" id="result-ref"></div>
      <button class="mark-btn" id="mark-btn" onclick="toggleMark()">☆ 重要マーク</button>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">次の問題 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div style="font-size:48px;margin-top:20px" id="result-emoji">🎯</div>
  <div class="result-title" id="result-title">セッション結果</div>
  <div class="result-score" id="result-score">0%</div>
  <div class="result-msg" id="result-msg"></div>
  <div class="result-cats" id="result-cats"></div>
  <div class="result-btns">
    <div id="res-pass" style="display:none;text-align:center;font-size:14px;font-weight:700;margin-bottom:12px;"></div>
    <div id="res-time" style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:12px;"></div>
    <button class="res-btn primary" onclick="startMode('random')">🎯 もう一度20問</button>
    <button class="res-btn secondary" onclick="startMode('wrong')">❌ 間違えた問題を復習</button>
    <button class="res-btn secondary" onclick="showHome()">🏠 ホームへ</button>
  </div>
</div>

<script>
const CATS = {
  law:  {name:'銃砲関連法令',     icon:'⚖️',  color:'#60a5fa'},
  safe: {name:'安全な取扱い',     icon:'🛡️',  color:'#4ade80'},
  keep: {name:'保管・携帯・運搬', icon:'🔒',  color:'#f97316'},
  mech: {name:'銃の構造・機能',   icon:'⚙️',  color:'#a78bfa'},
  exp:  {name:'火薬類・実包',     icon:'💥',  color:'#f43f5e'},
  acc:  {name:'事故・応急処置',   icon:'🚨',  color:'#fbbf24'},
};
const QDB = [
{id:1,cat:'law',
q:'猟銃の所持許可を与える権限は、都道府県公安委員会にある。',
answer:true,
explain:'正しい。猟銃所持許可の権限者は都道府県公安委員会。申請窓口は住所地の警察署だが、許可主体は公安委員会である。市区町村長や警察署長には許可権限がない。',
ref:'銃刀法第4条'},

{id:2,cat:'law',
q:'猟銃の所持許可の有効期間は、許可を受けた日から3年間である。',
answer:false,
explain:'誤り。有効期間は「許可を受けた日から起算して3回目の誕生日が経過するまで」。「3年間」という表現は誤りで、誕生日基準である点が重要。誕生日によっては3年を超える場合もある。',
ref:'銃刀法第9条の5'},

{id:3,cat:'law',
q:'猟銃の所持許可の有効期間は、許可を受けた日から起算して3回目の誕生日が経過するまでである。',
answer:true,
explain:'正しい。「3回目の誕生日が経過するまで」が正確な表現。「3年間」「5回目の誕生日」などと書かれていたら誤り。',
ref:'銃刀法第9条の5'},

{id:4,cat:'law',
q:'猟銃等講習会（初心者）の考査合格証明書の有効期間は3年である。',
answer:false,
explain:'誤り。考査合格証明書の有効期間は1年。3年は所持許可の有効期間と混同しやすいが別物。1年以内に所持許可申請しなければ再受講が必要。',
ref:'銃刀法施行規則第10条の2'},

{id:5,cat:'law',
q:'猟銃等講習会（初心者）の考査合格証明書の有効期間は1年であり、1年以内に所持許可申請をしなければ再受講が必要になる。',
answer:true,
explain:'正しい。考査合格証明書は交付日から1年が有効期限。1年を過ぎると失効し、再度講習・考査を受ける必要がある。',
ref:'銃刀法施行規則第10条の2'},

{id:6,cat:'law',
q:'教習修了証明書・技能検定合格証明書は、交付日から3年以内に所持許可申請をしなければならない。',
answer:false,
explain:'誤り。教習修了証明書・技能検定合格証明書の有効期間は1年（交付日から1年を経過していないこと）。技能講習修了証明書は3年。「3年」は技能講習修了証明書の有効期間と混同しやすい。',
ref:'銃刀法施行規則'},

{id:7,cat:'law',
q:'猟銃の所持許可更新申請は、有効期間満了日の2か月前から1か月前までの間に行わなければならない。',
answer:true,
explain:'正しい。更新申請期間は満了日の「2か月前から1か月前まで」。「5か月前から」「3か月前から」等は誤り。この期間を外すと更新できず失効する。',
ref:'銃刀法第9条の5'},

{id:8,cat:'law',
q:'猟銃の所持許可更新申請は、有効期間満了日の3か月前から行うことができる。',
answer:false,
explain:'誤り。更新申請は有効期間満了日の「2か月前から1か月前まで」の1か月間のみ。3か月前は早すぎる。この期間を逃すと更新できず許可が失効する。',
ref:'銃刀法第9条の5'},

{id:9,cat:'law',
q:'猟銃を譲り受けた場合は、14日以内に居住地を管轄する警察署で銃と許可証の確認を受けなければならない。',
answer:true,
explain:'正しい。譲受後14日以内に確認を受ける義務がある。「10日以内」「30日以内」と書かれていたら誤り。',
ref:'銃刀法第9条の6'},

{id:10,cat:'law',
q:'猟銃を譲り受けた場合は、30日以内に警察署で確認を受けなければならない。',
answer:false,
explain:'誤り。譲受け後の確認期限は14日以内。30日は住所変更届の期限と混同しやすい。14日という数値を確実に覚えること。',
ref:'銃刀法第9条の6'},

{id:11,cat:'law',
q:'禁錮以上の刑に処せられ、その刑の執行を終わった日から起算して5年を経過していない者は、猟銃の所持許可を受けることができない。',
answer:true,
explain:'正しい。禁錮以上の刑の執行終了から5年間は欠格事由に該当し許可不可。「3年」「10年」と書かれていれば誤り。',
ref:'銃刀法第5条'},

{id:12,cat:'law',
q:'強盗・傷害等の凶悪な違法行為をした者は、その行為の日から起算して5年間、猟銃の所持許可を受けることができない。',
answer:false,
explain:'誤り。強盗・傷害等の凶悪な違法行為は行為日から「10年間」許可不可。5年ではなく10年が正しい。「5年と書けば×」の代表的ひっかけ問題。',
ref:'銃刀法第5条'},

{id:13,cat:'law',
q:'DV（配偶者暴力）防止法の禁止命令を受けた者は、その後3年間、猟銃の所持許可を受けることができない。',
answer:true,
explain:'正しい。DV禁止命令を受けた者はその後3年間が欠格事由。「5年間」「1年間」と書かれていれば誤り。',
ref:'銃刀法第5条'},

{id:14,cat:'law',
q:'精神障害者、知的障害者に対しては、障害の程度が軽微であれば医師の診断書があれば猟銃の所持許可を与えることができる。',
answer:false,
explain:'誤り。精神障害・知的障害は欠格事由であり、「障害の程度が軽微」「医師の診断書があれば」等の条件付きでも許可されない。「家族の同意」「診断書」などの但し書きがついている選択肢はすべて誤り。',
ref:'銃刀法第5条'},

{id:15,cat:'law',
q:'暴力団員は、猟銃の所持許可を受けることができない。',
answer:true,
explain:'正しい。暴力団員（及び暴力団員でなくなった日から5年を経過しない者）は欠格事由に該当し、猟銃所持許可を受けることができない。',
ref:'銃刀法第5条'},

{id:16,cat:'law',
q:'住居が定まらない者（住居不定者）であっても、猟友会の推薦があれば猟銃の所持許可を受けることができる。',
answer:false,
explain:'誤り。住居不定は欠格事由であり、猟友会の推薦があっても許可は与えられない。欠格事由に「猟友会推薦」等の例外は存在しない。',
ref:'銃刀法第5条'},

{id:17,cat:'law',
q:'猟銃の所持許可を受けた者が許可を受けた日から3か月以内に銃を所持しなかった場合、その許可は失効する。',
answer:true,
explain:'正しい。許可後3か月以内に実際に銃を所持しなかった場合は許可が失効する規定がある。許可を取ったからといって何もしなければ失効する。',
ref:'銃刀法第9条の5'},

{id:18,cat:'law',
q:'猟銃の所持許可が失効した場合、失効した日から50日以内に譲渡・廃棄等の措置をとらなければ、不法所持となる。',
answer:true,
explain:'正しい。許可失効後50日以内に措置（譲渡・廃棄・警察への引渡し等）をとる義務がある。50日を超えると不法所持として銃刀法違反になる。「30日以内」「60日以内」は誤り。',
ref:'銃刀法第10条の3'},

{id:19,cat:'law',
q:'猟銃の所持許可が失効した場合、失効した日から30日以内に措置をとれば不法所持とならない。',
answer:false,
explain:'誤り。失効後の措置期限は「50日以内」。30日ではなく50日が正しい。この数値のひっかけは頻出。',
ref:'銃刀法第10条の3'},

{id:20,cat:'law',
q:'許可の有効期間が満了した場合は「失効」であり、「取消し」とは異なる。',
answer:true,
explain:'正しい。「失効」は有効期間満了・所持しないことによる自動的な効力消滅。「取消し」は違反行為等を理由とした行政処分による効力消滅。両者は法的に異なる概念。',
ref:'銃刀法'},

{id:21,cat:'law',
q:'猟銃の許可は1銃1許可であり、2人以上が共同して1丁の銃を所持することはできない。',
answer:true,
explain:'正しい。許可は1銃1許可制。1丁の銃を複数人で共有することは認められない。また、許可を持たない人に銃を預けることも違反となる（預けた側・預かった側双方が違反）。',
ref:'銃刀法第4条'},

{id:22,cat:'law',
q:'猟銃の所持許可証を他人に短期間貸すことは、その人が猟友会員であれば認められる。',
answer:false,
explain:'誤り。所持許可証は本人専用。猟友会員であっても他人への貸与は禁止。許可証は個人に対して発行されるものであり譲渡・貸与は一切できない。',
ref:'銃刀法'},

{id:23,cat:'law',
q:'猟銃の所持許可を受けた者が死亡した場合、その相続人は猟銃を相続財産として引き続き所持することができる。',
answer:false,
explain:'誤り。所持許可は一身専属（本人のみ有効）。所持者が死亡すると許可は失効し、遺族は直ちに公安委員会に届け出て警察に提出するか許可取得者に譲渡する必要がある。相続による所持継続は認められない。',
ref:'銃刀法'},

{id:24,cat:'law',
q:'空気銃の所持許可は、18歳未満の者には与えることができない。',
answer:true,
explain:'正しい。空気銃は18歳未満が欠格事由。猟銃（火薬式）は20歳未満が欠格事由。空気銃と猟銃で年齢要件が異なる点に注意。',
ref:'銃刀法第5条'},

{id:25,cat:'law',
q:'猟銃の所持許可は20歳未満の者には与えることができないが、空気銃は18歳以上であれば許可を受けられる。',
answer:true,
explain:'正しい。猟銃（火薬式）は20歳以上、空気銃は18歳以上が年齢要件。この区別は頻出。',
ref:'銃刀法第5条'},

{id:26,cat:'law',
q:'75歳以上の猟銃所持者は、許可更新の際に認知機能検査を受けなければならない。',
answer:true,
explain:'正しい。75歳以上の者は許可更新の際に認知機能検査が義務付けられている。「65歳以上」「80歳以上」と書かれていれば誤り。',
ref:'銃刀法第9条の5'},

{id:27,cat:'law',
q:'令和7年（2025年）3月の法改正により、3年以上用途に使用しない「眠り銃」は許可が取り消されることになった。',
answer:false,
explain:'誤り。令和7年3月1日施行の改正により、眠り銃の取消し要件は「3年以上不使用」から「2年以上不使用」に短縮された。改正後は2年が正しい。',
ref:'令和7年改正銃刀法'},

{id:28,cat:'law',
q:'令和7年（2025年）3月の法改正により、2年以上用途に使用しない「眠り銃」は許可が取り消されることになった。',
answer:true,
explain:'正しい。令和7年3月1日施行の改正で眠り銃の取消し要件が「3年以上→2年以上」に短縮。改正前の3年という数値との混同に注意。',
ref:'令和7年改正銃刀法'},

{id:29,cat:'law',
q:'ハーフライフル銃は、令和7年3月の法改正により「特定ライフル銃」となり、ライフル銃と同等の厳格な許可基準が適用されるようになった。',
answer:true,
explain:'正しい。令和7年3月改正でハーフライフル銃（腔旋部分が銃腔長の1/5以上1/2以下）は「特定ライフル銃」として分類され、ライフル銃と同等の許可基準（原則10年以上の猟銃所持歴）が適用された。',
ref:'令和7年改正銃刀法'},

{id:30,cat:'law',
q:'ライフル銃の所持許可を受けるためには、原則として継続して10年以上猟銃所持許可を受けていることが必要である。',
answer:true,
explain:'正しい。ライフル銃の所持には原則として継続して10年以上の猟銃所持実績が必要。ただし職業的捕獲者・事業被害防止目的等は例外がある。',
ref:'銃刀法第5条の2'},

{id:31,cat:'law',
q:'猟銃を携帯・運搬するときは、装填の有無にかかわらず、必ず覆いをかけるか容器に入れなければならない。',
answer:true,
explain:'正しい。「実包を装填している場合に限り覆い・容器が必要」は誤り。装填の有無にかかわらず、常に覆い・容器が必要。',
ref:'銃刀法第10条の2'},

{id:32,cat:'law',
q:'猟銃を携帯・運搬するときは、実包を装填している場合に限り覆いをかけるか容器に入れる必要がある。',
answer:false,
explain:'誤り。覆い・容器は装填の有無にかかわらず常に必要。「装填している場合に限り」は代表的なひっかけ表現。',
ref:'銃刀法第10条の2'},

{id:33,cat:'law',
q:'猟銃を携帯・運搬するときは、所持許可証を必ず携帯し、警察官から提示を求められた場合は提示しなければならない。',
answer:true,
explain:'正しい。携帯・運搬・使用時は所持許可証の携帯が義務。警察官の提示要求には応じる義務がある。',
ref:'銃刀法第10条の2'},

{id:34,cat:'law',
q:'猟銃を携帯・運搬する正当な理由には、修理・検査・狩猟・標的射撃などが含まれ、正当な理由なく携帯・運搬することは禁止されている。',
answer:true,
explain:'正しい。携帯・運搬は用途使用・修理等の「正当な理由」がある場合のみ認められる。正当な理由のない携帯・運搬は銃刀法違反。',
ref:'銃刀法第10条の2'},

{id:35,cat:'law',
q:'車のトランクに施錠して猟銃を保管すれば、それは法令上の「保管設備」として認められる。',
answer:false,
explain:'誤り。車のトランクは法令上の保管設備（ガンロッカー）ではない。猟銃は届け出た保管設備（ガンロッカー）にのみ保管できる。トランクへの保管は運搬中の一時的措置にすぎない。',
ref:'銃刀法第10条の6'},

{id:36,cat:'law',
q:'猟銃の盗難・紛失が発生した場合は、まず自分で探してから、見つからない場合に警察に届け出ればよい。',
answer:false,
explain:'誤り。盗難・紛失に気づいた時点で「直ちに」警察官に届け出る義務がある。「まず自分で探す」は誤り。盗難銃が犯罪に使われる危険があるため速報性が最重要。',
ref:'銃刀法第8条の4'},

{id:37,cat:'law',
q:'猟銃の盗難・紛失を発見したときは、直ちに警察官に届け出なければならない。',
answer:true,
explain:'正しい。発見（気づいた）時点で直ちに届け出る義務がある。「直ちに」という表現が重要で、猶予はない。',
ref:'銃刀法第8条の4'},

{id:38,cat:'law',
q:'猟銃を発射できる場所は、狩猟場・鳥獣被害防除・標的射撃などの正当な理由がある場所に限られ、みだりに発射してはならない。',
answer:true,
explain:'正しい。猟銃の発射は正当な理由（狩猟・有害鳥獣駆除・標的射撃等）がある場所のみ許可される。注意義務を怠ったが実害が発生しなかった場合でも違反となりうる。',
ref:'銃刀法第10条の2'},

{id:39,cat:'law',
q:'注意義務を怠って猟銃を発射したとしても、実際に被害が発生しなければ違反にはならない。',
answer:false,
explain:'誤り。注意義務違反は実害発生の有無にかかわらず違反となる。「実害がなければ違反にならない」は代表的なひっかけ。',
ref:'銃刀法第10条の2'},

{id:40,cat:'law',
q:'遺品として故人の猟銃を保存・展示する目的であっても、所持許可なしに所持することはできない。',
answer:true,
explain:'正しい。猟銃の所持は狩猟・有害鳥獣駆除・標的射撃等の用途に限られ、「遺品として」「コレクションとして」という目的では所持許可が与えられない。',
ref:'銃刀法第4条'},

{id:41,cat:'law',
q:'公安委員会は、所持許可の更新申請が許可基準に適合していれば、許可を与えないことができる。',
answer:false,
explain:'誤り。公安委員会は更新申請が許可基準に適合していれば「許可しなければならない」（羈束行為）。適合しているにもかかわらず許可しないことはできない。',
ref:'銃刀法第7条の3第2項'},

{id:42,cat:'law',
q:'猟銃の所持許可証を紛失した場合は、速やかに警察署に届け出て再交付申請をしなければならない。',
answer:true,
explain:'正しい。許可証紛失は届出義務がある。再交付申請も可能。許可証なしに銃を携帯・使用することは義務違反となる。',
ref:'銃刀法'},

{id:43,cat:'law',
q:'住所を変更した場合は、変更後30日以内に新住所地を管轄する公安委員会（警察署）に変更届を提出しなければならない。',
answer:true,
explain:'正しい。住所変更は変更後30日以内に届出義務がある。届出先は「新住所地」を管轄する公安委員会（警察署経由）。',
ref:'銃刀法第8条'},

{id:44,cat:'law',
q:'猟銃の所持許可を受けた者が他人（所持許可を持たない家族を含む）に銃を使用させることは原則として禁止されている。',
answer:true,
explain:'正しい。所持許可を持たない者（家族含む）への使用は原則禁止。射撃場での射撃教習等特定の例外はあるが、原則禁止が答え。',
ref:'銃刀法第4条の4'},

{id:45,cat:'law',
q:'猟銃の所持許可証は他人に貸すことができる。',
answer:false,
explain:'誤り。所持許可証は本人専用で他人への貸与は絶対禁止。許可証は個人と銃の組み合わせに対して発行されるもの。',
ref:'銃刀法'},

{id:101,cat:'safe',
q:'すべての銃は、実包が装填されていなくても常に装填されているものとして取り扱わなければならない。',
answer:true,
explain:'正しい。「すべての銃は常に装填されている」という意識が安全取扱いの大前提。薬室が空であることを自分で確認した後でも、他者に対してはこの原則を守る。',
ref:'猟銃等取扱読本 安全編'},

{id:102,cat:'safe',
q:'安全装置（安全子）をかけていれば、振動や衝撃を与えても暴発することはない。',
answer:false,
explain:'誤り。安全装置は引き金の動きを止めるだけの補助的機械装置であり、振動・衝撃による逆鉤の外れを完全に防ぐ機構ではない。「安全子を引けば振動を与えても作用しない」は×の代表例。',
ref:'猟銃等取扱読本 構造編'},

{id:103,cat:'safe',
q:'安全装置は補助的な機械装置であり、衝撃や故障によって意図せず解除される可能性がある。',
answer:true,
explain:'正しい。安全装置に過信は禁物。補助的安全措置として有効だが、機械的故障・衝撃・摩耗等で誤作動することがある。安全装置に頼り他の安全ルールを省略してはならない。',
ref:'猟銃等取扱読本 安全編'},

{id:104,cat:'safe',
q:'銃口は発射する直前まで、常に人のいない安全な方向に向けておかなければならない。',
answer:true,
explain:'正しい。「銃口は常に安全な方向へ」は安全取扱いの最重要原則。発射するしないに関わらず、安全装置の状態に関わらず、銃口を人に向けることは絶対禁止。',
ref:'猟銃等取扱読本 安全編'},

{id:105,cat:'safe',
q:'銃の分解・点検で銃身のみの状態になっていれば、その銃口を人に向けても構わない。',
answer:false,
explain:'誤り。「分解して銃身のみになっている」「脱包が確認できている」等いかなる状態でも、銃口を人に向けることは禁止。例外なしが原則。',
ref:'猟銃等取扱読本 安全編'},

{id:106,cat:'safe',
q:'発射する直前まで、引き金（トリガー）には指をかけずトリガーガードの外に指を置く。',
answer:true,
explain:'正しい。「撃つまで引き金に触れない」は安全の絶対原則。意図しない引き金操作による暴発を防ぐ。安全装置の状態・手袋の有無に関係なく常に守る。',
ref:'猟銃等取扱読本 安全編'},

{id:107,cat:'safe',
q:'安全装置をかけていれば、引き金に指をかけて歩いても安全である。',
answer:false,
explain:'誤り。安全装置をかけていても引き金への指かけは禁止。安全装置は補助装置であり、引き金に触れないことが絶対原則。',
ref:'猟銃等取扱読本 安全編'},

{id:108,cat:'safe',
q:'用心金（トリガーガード）の中に指を入れてよいのは、射撃の直前または空撃ちをする等の特別の場合に限られる。',
answer:true,
explain:'正しい。原則として指はトリガーガードの外に置くが、発射直前・空撃ち点検等の特別な場面では指を入れることが認められる。',
ref:'猟銃等取扱読本 安全編'},

{id:109,cat:'safe',
q:'狩猟中に休憩する場合や移動する場合は、安全装置をかけるだけでよく、実包を抜く必要はない。',
answer:false,
explain:'誤り。休憩・移動時は必ず薬室を開放し実包を取り出す。安全装置のみでは不十分。薬室開放が最も確実な安全措置。',
ref:'猟銃等取扱読本 安全編'},

{id:110,cat:'safe',
q:'射撃しない場面（移動・休憩・人に近づくとき・藪の通過時など）では、常に薬室を開放して実包を抜いておかなければならない。',
answer:true,
explain:'正しい。射撃しないあらゆる場面で薬室開放が原則。散弾銃の場合は銃を折り畳む（開放する）。この「常に開放する」習慣が事故を防ぐ。',
ref:'猟銃等取扱読本 安全編'},

{id:111,cat:'safe',
q:'引き金の「遊び」は小さければ小さいほど良く、遊びがない状態が最も安全である。',
answer:false,
explain:'誤り。引き金の遊びは適度にあることが必要。遊びがないと少しの接触で引き金が引かれ暴発しやすくなる。「遊びはあってはならない」は誤り。適度な遊びが安全のために必要。',
ref:'猟銃等取扱読本 構造編'},

{id:112,cat:'safe',
q:'狩猟用猟銃の引き金の重さの目安は2kg以上とされており、軽すぎると暴発しやすくなる。',
answer:true,
explain:'正しい。引き金の重さの目安：狩猟用2kg以上、射撃用1.5kg以上。軽すぎると意図しない操作で暴発しやすくなる。',
ref:'猟銃等取扱読本 構造編'},

{id:113,cat:'safe',
q:'撃発機構の構成要素を発火の順に並べると「引き金→逆鉤→撃鉄→撃針」となる。',
answer:true,
explain:'正しい。発火の連鎖：引き金を引く→逆鉤（シアー）が解放→撃鉄（ハンマー）が落下→撃針（ファイアリングピン）を打撃→雷管に点火→火薬着火→発射。この順序は正確に覚える。',
ref:'猟銃等取扱読本 構造編'},

{id:114,cat:'safe',
q:'引き金は、射手の意思により「撃鉄」を直接作動させる部品である。',
answer:false,
explain:'誤り。引き金は「逆鉤（シアー）」を作動させる部品。逆鉤が撃鉄を解放し、撃鉄が撃針を打撃する。「引き金→撃鉄を直接作動」は誤り。「引き金→逆鉤→撃鉄→撃針」の順序が正しい。',
ref:'猟銃等取扱読本 構造編'},

{id:115,cat:'safe',
q:'逆鉤（シアー）は、引き金の操作によって撃鉄を拘束または開放する部品である。',
answer:true,
explain:'正しい。逆鉤（シアー）の役割：撃鉄を拘束（コック状態を保持）し、引き金操作により撃鉄を開放する。この定義は頻出で正確に覚える。',
ref:'猟銃等取扱読本 構造編'},

{id:116,cat:'safe',
q:'不発（ミスファイア）が発生した場合は、直ちに薬室を開放して不発弾を取り出すべきである。',
answer:false,
explain:'誤り。不発時は遅発（スローファイア）の危険がある。薬室を開けた瞬間に点火（遅発）することがある。銃口を安全な方向に向けたまま「少なくとも10秒（一般的には30秒）」待ってからゆっくり薬室を開放する。',
ref:'猟銃等取扱読本 安全編'},

{id:117,cat:'safe',
q:'「遅発（スローファイア）」とは、引き金を引いて撃鉄が落ちた後、時間を置いて発射される現象であり、不発とは区別される。',
answer:true,
explain:'正しい。遅発は引き金操作後に時間をおいて発射される現象。不発（全く発射されない）とは異なる。遅発を不発と勘違いして薬室を開けた瞬間に発射される事故がある。10秒以上銃口を安全方向に保持する。',
ref:'猟銃等取扱読本 構造編'},

{id:118,cat:'safe',
q:'銃身内に木の葉・雪・泥などの異物が詰まったまま射撃すると、銃身が破裂する危険がある。',
answer:true,
explain:'正しい。銃身内閉塞（木の葉・雪・泥・先発弾の残留等）がある状態で発射すると、弾の逃げ場がなく銃身が破裂し射手に重大な傷害を与える。使用前・倒伏後は必ず銃腔を確認する。',
ref:'猟銃等取扱読本 安全編'},

{id:119,cat:'safe',
q:'銃身内の異物確認は、薬室を開放した状態で銃口から光を当てて目視確認する。',
answer:true,
explain:'正しい。銃腔内の確認は必ず薬室を開放（弾を抜いた状態）にしてから、銃口より光を当てて目視。薬室が閉じた状態や弾が入ったままの確認は絶対に行ってはならない。',
ref:'猟銃等取扱読本 安全編'},

{id:120,cat:'safe',
q:'発射前に目標を確認する際、茂みや藪の中で動くものは獲物である可能性が高いため、素早く発射するべきである。',
answer:false,
explain:'誤り。「疑わしきは撃たず」が絶対原則。動くもの・音がするものが確実に獲物であることを視覚で確認し、目標の背景・射線の先の安全も確認してから発射。確認できない場合は絶対に撃たない。',
ref:'猟銃等取扱読本 安全編'},

{id:121,cat:'safe',
q:'散弾は竹やぶや水面では跳弾（はねだん）が発生しないため、それらの方向に向けて発射しても安全である。',
answer:false,
explain:'誤り。跳弾はコンクリート・岩のみならず、竹やぶ・水面・地面でも発生しうる。「竹やぶ・水面なら跳弾しない」は誤り。どんな方向も安全でない場合は発射しない。',
ref:'猟銃等取扱読本 安全編'},

{id:122,cat:'safe',
q:'12番散弾（スラッグ弾）の最大到達距離は、約700mとされている。',
answer:true,
explain:'正しい。12番スラッグ弾の最大到達距離は約700m。「有効射程（約50〜100m）」と「最大到達距離」は別物。有効射程外でも致命的な危険がある距離まで弾は届く。',
ref:'猟銃等取扱読本 安全編'},

{id:123,cat:'safe',
q:'空気銃の弾の最大到達距離は約300mとされており、有効射程を超えても危険範囲は存在する。',
answer:true,
explain:'正しい。空気銃の最大到達距離は約300m。有効射程（約30〜50m程度）をはるかに超えた距離でも弾は届き危険。「空気銃は危険距離が短い」という過信は禁物。',
ref:'猟銃等取扱読本 安全編'},

{id:124,cat:'safe',
q:'ライフル銃（30口径）の弾の最大到達距離は約4,000mとされており、有効射程外でも非常に遠くまで危険である。',
answer:true,
explain:'正しい。30口径ライフル弾の最大到達距離は約3,200〜4,000m。約4kmもの距離まで弾が届く可能性があるため、ライフルの射撃前の背景確認は極めて重要。',
ref:'猟銃等取扱読本 安全編'},

{id:125,cat:'safe',
q:'散弾は発射角度が45度のとき最も遠くまで届く。',
answer:false,
explain:'誤り。物理の理想では45度だが、実弾は空気抵抗があるため、猟銃等取扱読本では散弾は約20〜35度、ライフルは約32〜35度の発射角で最大飛距離となるとされている。「45度で最大射程」は誤り。',
ref:'猟銃等取扱読本 安全編'},

{id:126,cat:'safe',
q:'散弾銃の有効射程は約40〜50mであり、スラッグ弾の有効射程は約50〜100mである。',
answer:true,
explain:'正しい。散弾の有効射程は約40〜50m、スラッグ弾は約50〜100m。ただし最大到達距離（散弾約200〜500m以上、スラッグ約700m）はこれをはるかに超えるため注意。',
ref:'猟銃等取扱読本 安全編'},

{id:127,cat:'safe',
q:'人に銃を渡すときは、薬室を開放して弾がないことを自分で確認し、相手にも確認させてから渡す。',
answer:true,
explain:'正しい。銃の受け渡し手順：①薬室開放②弾なしを自分が確認③相手にも確認させる④その状態で渡す。安全装置をかけるだけでは不十分。',
ref:'猟銃等取扱読本 安全編'},

{id:128,cat:'safe',
q:'猟銃の清掃作業を始める前に、まず全ての実包を取り出し薬室が空であることを確認する。',
answer:true,
explain:'正しい。清掃前の最初の手順は必ず全実包除去・薬室開放の確認。清掃中に暴発する事故が多い。引き金を引いて確認する行為は絶対禁止（残弾があれば発射される）。',
ref:'猟銃等取扱読本 取扱編'},

{id:129,cat:'safe',
q:'複数人での巻き狩りでは、全員の位置を事前に確認・共有し、発射前に射線の安全を確認することが最重要である。',
answer:true,
explain:'正しい。巻き狩りは勢子が獲物の後方にいるため射線の安全確認が特に重要。全員の位置把握なしの発射は人身事故に直結する。',
ref:'猟銃等取扱読本 安全編'},

{id:130,cat:'safe',
q:'猟銃清掃に使用するガンオイル・クリーナーは引火性のある製品が多いため、使用中は火気厳禁・十分な換気が必要である。',
answer:true,
explain:'正しい。多くのガンオイル・クリーナーは引火性有機溶剤を含む。火気厳禁の場所で十分換気して使用する。皮膚・目への接触も有害なものがある。',
ref:'猟銃等取扱読本 取扱編'},

{id:201,cat:'keep',
q:'自宅で保管できる実包や空包の数量は、合計800個以内である。',
answer:true,
explain:'正しい。自宅保管の実包・空包の上限は合計800個以内。「各々800個ずつ（合計1,600個）」は誤り。「1,500個以内」という数値が出たら誤り。800という数値を確実に覚える。',
ref:'火薬類取締法施行規則・猟銃等取扱読本'},

{id:202,cat:'keep',
q:'自宅で保管できる実包は狩猟用と標的射撃用それぞれ800個ずつ、合計1,600個まで保管できる。',
answer:false,
explain:'誤り。合計800個以内が正しい制限。「各々800個ずつ（合計1,600個）」は代表的なひっかけ問題。800個は個別ではなく合計の上限。',
ref:'火薬類取締法施行規則'},

{id:203,cat:'keep',
q:'自宅で保管できる無煙火薬と黒色猟用火薬の合計は、5kg以内である。',
answer:true,
explain:'正しい。無煙火薬と黒色猟用火薬の自宅保管上限は合計5kg（5,000g）以内。銃用雷管は2,000個以内。これらの数値は正確に覚えること。',
ref:'火薬類取締法施行規則'},

{id:204,cat:'keep',
q:'自宅で保管できる銃用雷管は2,000個以内である。',
answer:true,
explain:'正しい。銃用雷管の自宅保管上限は2,000個以内。実包800個・火薬5kg・雷管2,000個の3つの数値をセットで覚える。',
ref:'火薬類取締法施行規則'},

{id:205,cat:'keep',
q:'標的射撃の目的で、1日に実包・空包を合わせて400個を超えて消費する場合は火薬類の消費許可が必要である。',
answer:true,
explain:'正しい。無許可消費（消費許可不要）の上限：標的射撃は1日400個以下。400個を超えると消費許可が必要。「200個以下なら許可不要」は誤り（正解は400個）。',
ref:'火薬類取締法'},

{id:206,cat:'keep',
q:'標的射撃で1日に消費できる実包・空包の無許可消費上限は200個以下である。',
answer:false,
explain:'誤り。標的射撃の無許可消費上限は1日400個以下。「200個以下」は誤り。狩猟・有害鳥獣駆除は1日100個以下（こちらが200個以下と混同しやすい）。',
ref:'火薬類取締法'},

{id:207,cat:'keep',
q:'狩猟・有害鳥獣駆除の目的で1日に消費できる実包の無許可消費上限は100個以下である。',
answer:true,
explain:'正しい。無許可消費上限：狩猟・有害鳥獣駆除は1日100個以下。標的射撃は400個以下。それぞれの数値を区別して覚える。',
ref:'火薬類取締法'},

{id:208,cat:'keep',
q:'ガンロッカーは床または壁にボルト等で固定し、容易に持ち去れない構造にしなければならない。',
answer:true,
explain:'正しい。ガンロッカーは盗難防止のため固定が義務。固定されていないガンロッカーは丸ごと持ち去られる危険がある。鉄板厚1.0mm以上・施錠等の基準もある。',
ref:'銃刀法第10条の6'},

{id:209,cat:'keep',
q:'実包は銃と同じガンロッカーに保管すれば、銃と実包を分離して保管したことになる。',
answer:false,
explain:'誤り。同一ロッカーの別引き出しに分けても「共に保管」とみなされる。銃（ガンロッカー）と実包（装弾ロッカー）は別々の保管庫に入れることが原則。同一建物内でも可能な限り別保管が望ましい。',
ref:'銃刀法第10条の6'},

{id:210,cat:'keep',
q:'ガンロッカーの鍵を家族（所持許可を持たない）が使えるよう共有しておくことは、「自ら保管」したことにならない。',
answer:true,
explain:'正しい。家族に鍵を渡す・鍵を分かる場所に置くなど、他者がガンロッカーにアクセスできる状態は「自ら保管」の義務を果たしていない。ガンロッカーの鍵は本人が管理する義務がある。',
ref:'銃刀法第10条の6'},

{id:211,cat:'keep',
q:'帳簿（実包の消費記録）は最終記載日から3年間保存しなければならない。',
answer:true,
explain:'正しい。帳簿の保存期間は最終記載日から3年間。「1年間」「5年間」は誤り。令和7年改正で帳簿の記載事項（散弾/単弾の別・銃番号等）も拡大されている。',
ref:'火薬類取締法'},

{id:212,cat:'keep',
q:'帳簿（実包の消費記録）は最終記載日から1年間保存すれば足りる。',
answer:false,
explain:'誤り。保存期間は3年間。1年は誤り。「1年と書けば×」の代表的な数値ひっかけ問題。',
ref:'火薬類取締法'},

{id:213,cat:'keep',
q:'猟銃を携帯・運搬する際、複数丁の銃を一度に運ぶ場合でも家族に手伝わせることは認められていない。',
answer:true,
explain:'正しい。複数丁の運搬でも所持許可を持たない者（家族含む）が銃を持つことは所持許可違反。許可を持つ者本人のみが銃を持てる。',
ref:'銃刀法'},

{id:214,cat:'keep',
q:'長期入院等で自宅保管が困難な場合は、猟銃等保管業者に委託保管することができる。',
answer:true,
explain:'正しい。長期入院・長期旅行・住居建替え等の場合は猟銃等保管業者への委託保管が認められている。ただし短期留守では委託義務はない。',
ref:'銃刀法'},

{id:215,cat:'keep',
q:'実包の購入には都道府県公安委員会が発行する火薬類譲受許可証が必要であり、許可証に記載された数量の範囲内でのみ購入できる。',
answer:true,
explain:'正しい。実包（火薬類）の購入には火薬類譲受許可証が必要。許可証記載の数量を超えて購入することはできない。猟銃所持許可証だけでは実包の購入はできない。',
ref:'火薬類取締法第17条'},

{id:301,cat:'mech',
q:'散弾銃で弾倉に装填できる実包の数は、薬室の1発を含めて最大3発（弾倉2発＋薬室1発）に制限されている。',
answer:true,
explain:'正しい。猟銃として許可される散弾銃の装弾数は弾倉2発＋薬室1発の計3発まで。弾倉に3発以上装填できる構造の銃は猟銃としての所持許可を受けられない。',
ref:'銃刀法第4条'},

{id:302,cat:'mech',
q:'ライフル銃・空気銃で弾倉に6発以上装填できる構造のものは、猟銃としての所持許可を受けることができない。',
answer:true,
explain:'正しい。ライフル銃・空気銃は弾倉6発以上装填可能な構造のものは不許可。散弾銃は弾倉3発以上が不許可。それぞれ数値が異なる点に注意。',
ref:'銃刀法第4条'},

{id:303,cat:'mech',
q:'消音装置（サプレッサー・サイレンサー）を取り付けた猟銃は所持許可を受けることができない。',
answer:true,
explain:'正しい。消音装置付きの銃は猟銃としての許可が受けられない構造的不許可事由に該当する。',
ref:'銃刀法第4条'},

{id:304,cat:'mech',
q:'チョーク（絞り）のうち、フルチョークは弾が広がりやすいため近距離の鳥類に適している。',
answer:false,
explain:'誤り。フルチョークは最も強い絞りで散弾を集束させ遠距離向き。シリンダー（無絞り）が弾を広げ近距離向き。「フルチョーク=広がる=近距離」は逆。',
ref:'猟銃等取扱読本 構造編'},

{id:305,cat:'mech',
q:'薬室（チェンバー）長より長い実包を使用すると、薬室の完全閉鎖ができず高圧ガス漏れ・銃身破裂等の重大事故につながる。',
answer:true,
explain:'正しい。薬室長は使用できる実包の最大長を決める。規格外（長すぎる）実包は閉鎖不完全→高圧ガス漏れ→機関部破損・銃身破裂の原因となる。必ず銃の規格に合った実包を使用する。',
ref:'猟銃等取扱読本 実包編'},

{id:306,cat:'mech',
q:'半自動式（セミオートマチック）散弾銃は、引き金を引き続けると連続発射される。',
answer:false,
explain:'誤り。セミオートマチックは1回の引き金操作で1発のみ発射される。引き続けても1発しか出ない。連続発射（フルオート）は機関銃であり猟銃としての所持許可は受けられない。',
ref:'猟銃等取扱読本 構造編'},

{id:307,cat:'mech',
q:'自動装填式（セミオート）銃は、発射時の火薬ガス圧や反動を利用して自動的に排莢・次弾装填を行う。',
answer:true,
explain:'正しい。セミオートの作動原理：①ガス作動式（銃身のガスポートから発射ガスを取り出しピストンを動かす）②リコイル（反動）作動式の二種類が主流。',
ref:'猟銃等取扱読本 構造編'},

{id:308,cat:'mech',
q:'散弾銃の口径はゲージ（番）で表し、数字が小さいほど口径が大きい。',
answer:true,
explain:'正しい。ゲージ数が小さいほど口径大。12番（約18.5mm）>16番>20番>28番>.410の順で口径が小さくなる。「大きい数字=大口径」という逆の誤解が多い。',
ref:'猟銃等取扱読本 構造編'},

{id:309,cat:'mech',
q:'猟銃の全長は、おおむね94cm以上（銃身長は48.8cm以上）のものが猟銃として認められる。',
answer:true,
explain:'正しい。猟銃の全長・銃身長の基準：全長おおむね94cm以上、銃身長48.8cm（19インチ）以上が必要。これより短いものは猟銃として所持許可を受けられない。',
ref:'銃刀法第4条'},

{id:310,cat:'mech',
q:'ライフリング（腔線）のない銃（散弾銃等）でも、スラグ弾（一粒弾）を使用することができる。',
answer:true,
explain:'正しい。スラグ弾はライフリングのない散弾銃でも使用できる特殊弾頭。散弾銃のスラグ弾はイノシシ等大型獣向きで有効。ただし適切なチョーク（シリンダー等）を使用すること。',
ref:'猟銃等取扱読本 実包編'},

{id:401,cat:'exp',
q:'散弾実包のゲージ（番）表示で、12番は20番より口径が大きい。',
answer:true,
explain:'正しい。ゲージ数が小さいほど口径が大きい。12番（約18.5mm）は20番（約15.6mm）より大きい。',
ref:'猟銃等取扱読本 実包編'},

{id:402,cat:'exp',
q:'散弾実包のワッズ（Wad）は、推進薬と散弾の間を分離し、燃焼ガスの漏れを防ぎ、散弾を束ねて銃身内を運ぶ役割を持つ。',
answer:true,
explain:'正しい。ワッズの3機能：①推進薬と散弾の分離②ガス漏れ防止（オブチュレーション）③散弾を束ねて銃身内を運ぶ。プラスチック製が主流。',
ref:'猟銃等取扱読本 実包編'},

{id:403,cat:'exp',
q:'水で濡れた実包は、乾燥させれば問題なく使用できる。',
answer:false,
explain:'誤り。水に濡れた実包は雷管・推進薬が変質している可能性があり、乾燥させても使用してはならない。不発・遅発・過圧等の危険がある。銃砲火薬店に持ち込んで処分する。',
ref:'猟銃等取扱読本 実包編'},

{id:404,cat:'exp',
q:'不発弾（実包）は、燃えるゴミとして廃棄することができる。',
answer:false,
explain:'誤り。実包は火薬類であり一般廃棄物として処分することは火薬類取締法違反。銃砲火薬店または警察署に持ち込んで適切に処分する。土に埋める・水に浸けるなども不可。',
ref:'火薬類取締法'},

{id:405,cat:'exp',
q:'実包の自家製造（リロード）は、所持許可取得者であれば自己消費目的で行うことができる。',
answer:false,
explain:'誤り。火薬類の製造（リロードを含む）は火薬類取締法で規制される。所持許可の有無に関わらず、無許可製造は違法。市販の正規実包のみ使用すること。',
ref:'火薬類取締法'},

{id:406,cat:'exp',
q:'鉛製散弾による水鳥類の鉛中毒問題から、水鳥猟では非鉛弾（スチール弾等）の使用が義務付けられている地域・条件がある。',
answer:true,
explain:'正しい。水鳥（カモ等）猟では水辺に落ちた鉛散弾を水鳥が誤飲する鉛中毒問題があり、環境省の規制により多くの地域・条件で非鉛弾使用が義務化されている。',
ref:'鳥獣保護管理法・環境省通知'},

{id:407,cat:'exp',
q:'無許可で実包を自家製造できる上限は、1日に実包・空包合わせて100個以下である。',
answer:true,
explain:'正しい。無許可製造の上限は1日100個以下。標的射撃の無許可消費400個・狩猟の無許可消費100個と区別して覚える。',
ref:'火薬類取締法'},

{id:408,cat:'exp',
q:'無許可で実包を譲り受けられる上限は、実包（ライフル用を除く）300個以下である。',
answer:true,
explain:'正しい。無許可譲受票による譲受上限：実包300個以下（うちライフル用50個以下）。銃用雷管300個以下（うちライフル用50個以下）。無煙火薬等は600g以下。',
ref:'火薬類取締法（経産省通達）'},

{id:409,cat:'exp',
q:'薬室長76mmの散弾銃に、薬室長70mmの実包を使用することは問題ない。',
answer:true,
explain:'正しい。薬室長の短い実包は長い薬室の銃で使用可能（76mm薬室に70mm・65mm実包は使用できる）。問題なのは「薬室長より長い実包の使用」で、これは厳禁。',
ref:'猟銃等取扱読本 実包編'},

{id:410,cat:'exp',
q:'実包の保管には直射日光・高温多湿を避け、施錠できる実包等保管庫（銃とは別の保管庫）に保管する義務がある。',
answer:true,
explain:'正しい。実包の保管条件：①直射日光・高温多湿を避ける②施錠できる実包等保管庫に保管③銃とは必ず別の保管庫。冷蔵庫は結露の危険があり不適。',
ref:'銃刀法第10条の6・火薬類取締法'},

{id:501,cat:'acc',
q:'猟銃事故の大多数は銃の機械的故障が原因であり、人為的ミスが原因の事故は少ない。',
answer:false,
explain:'誤り。猟銃事故の約9割以上は人為的ミス（確認不足・取扱不注意・射線上への侵入等）が原因。機械的故障が原因のものは少数。正しい知識と習慣の積み重ねが事故を防ぐ。',
ref:'猟銃事故統計'},

{id:502,cat:'acc',
q:'銃創（銃による外傷）への応急処置では、まず傷口に刺さっている弾を取り出してから救急車を呼ぶ。',
answer:false,
explain:'誤り。弾の取り出しは医療機関で行う。応急処置の優先順位：①直ちに119番・110番通報②清潔な布で傷口を強く圧迫止血③体を動かさず救急を待つ。弾を自分で取り出そうとしてはならない。',
ref:'応急処置テキスト'},

{id:503,cat:'acc',
q:'銃創の応急処置で最も重要なのは、清潔な布で傷口を強く圧迫し止血することである。',
answer:true,
explain:'正しい。直接圧迫止血法が基本。清潔なガーゼ・ハンカチ等を傷口に当て、強く押さえ続ける。同時に119番・110番に通報する。',
ref:'応急処置テキスト'},

{id:504,cat:'acc',
q:'猟銃事故発生時は、負傷者の救護より先に警察・猟友会へ連絡することを優先すべきである。',
answer:false,
explain:'誤り。人命（負傷者の救護）が最優先。①負傷者の救護確認②119番・110番通報③応急処置④現場保存の順。「まず警察・猟友会に連絡」は誤りで、人命優先が原則。',
ref:'猟銃等取扱読本 安全編'},

{id:505,cat:'acc',
q:'心肺停止（意識なし・呼吸なし）の場合は、直ちに胸骨圧迫（心臓マッサージ）を開始し、119番通報・AED手配を並行して行う。',
answer:true,
explain:'正しい。心肺停止時の対応：①大声で助けを呼びながら119番通報とAED手配を依頼②直ちに胸骨圧迫開始（1分間100〜120回、胸が5cm沈む強さ）③AEDが届いたら使用④救急到着まで継続。',
ref:'救急蘇生法テキスト'},

{id:506,cat:'acc',
q:'猟銃事故を起こした場合、刑事責任・民事責任・行政責任（許可取消等）のすべてを問われる可能性がある。',
answer:true,
explain:'正しい。猟銃事故は三つの責任が並存：①刑事責任（業務上過失致死傷等）②民事責任（損害賠償）③行政責任（所持許可取消・欠格事由該当）。過失であっても刑事・民事責任は生じる。',
ref:'刑法・民法・銃刀法'},

{id:507,cat:'acc',
q:'ハンター保険（狩猟者賠償責任保険）は、狩猟中の事故で射手本人が負傷した場合の治療費を補償する。',
answer:false,

function loadState(){
  try{const s=localStorage.getItem('gun_quiz_v1');if(s)return JSON.parse(s);}catch(e){}
  return {totalAnswered:0,totalCorrect:0,wrongIds:[],markedIds:[],catStats:{}};
}
function saveState(){localStorage.setItem('gun_quiz_v1',JSON.stringify(state));}

function showHome(){
  hideAll();
  document.getElementById('home').style.display='flex';
  updateHomeStats();
}
function updateHomeStats(){
  const rate=state.totalAnswered>0?Math.round(state.totalCorrect/state.totalAnswered*100):null;
  document.getElementById('st-total').textContent=state.totalAnswered;
  document.getElementById('st-rate').textContent=rate!==null?rate+'%':'-%';
  document.getElementById('st-rate').style.color=rate===100?'#4ade80':rate>=80?'var(--yellow)':'var(--red)';
  document.getElementById('st-wrong').textContent=state.wrongIds.length;
  document.getElementById('wrong-count-badge').textContent=state.wrongIds.length+'問';
  document.getElementById('mark-count-badge').textContent=state.markedIds.length+'問';
}

function showCatScreen(){
  hideAll();
  document.getElementById('catscreen').style.display='flex';
  document.getElementById('cat-grid').innerHTML=Object.entries(CATS).map(([k,v])=>{
    const qs=QDB.filter(q=>q.cat===k);
    const cs=state.catStats[k]||{a:0,c:0};
    const rate=cs.a>0?Math.round(cs.c/cs.a*100):null;
    const rc=rate===null?'var(--muted)':rate===100?'#4ade80':rate>=80?'var(--yellow)':'var(--red)';
    return `<button class="cat-btn" onclick="startMode('cat','${k}')">
      <span class="cat-icon">${v.icon}</span>
      <div class="cat-info"><div class="cat-name">${v.name}</div><div class="cat-count">${qs.length}問収録</div></div>
      <div class="cat-rate" style="color:${rc}">${rate!==null?rate+'%':'--'}</div>
    </button>`;
  }).join('');
}

function startMode(mode,cat=''){
  let pool=[];
  if(mode==='random') pool=shuffle([...QDB]);
  else if(mode==='wrong'){
    pool=QDB.filter(q=>state.wrongIds.includes(q.id));
    if(!pool.length){showToast('間違えた問題がありません！完璧です！🎉');return;}
    pool=shuffle(pool);
  } else if(mode==='weak'){
    pool=QDB.filter(q=>state.markedIds.includes(q.id));
    if(!pool.length){showToast('マーク済み問題がありません');return;}
    pool=shuffle(pool);
  } else if(mode==='cat'){
    pool=shuffle(QDB.filter(q=>q.cat===cat));
  } else if(mode==='exam'){
    // 本番模擬：50問ランダム（カテゴリ比率を本番に近づける）
    const lawQ=shuffle(QDB.filter(q=>q.cat==='law')).slice(0,25);
    const othQ=shuffle(QDB.filter(q=>q.cat!=='law')).slice(0,25);
    pool=[...lawQ,...othQ];
    pool=shuffle(pool);
  }
  const count=mode==='exam'?Math.min(50,pool.length):Math.min(20,pool.length);
  session={qs:pool.slice(0,count),idx:0,answers:[],mode,cat,startTime:Date.now()};
  hideAll();
  document.getElementById('quiz').style.display='flex';
  renderQ();
}

function renderQ(){
  const q=session.qs[session.idx];
  currentQ=q;answered=false;
  const ci=CATS[q.cat];
  const badge=document.getElementById('q-cat-badge');
  badge.textContent=ci.name;
  badge.style.cssText=`background:${ci.color}22;color:${ci.color};border:1px solid ${ci.color}44;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:1px`;
  document.getElementById('q-number').textContent=`Q.${String(q.id).padStart(3,'0')}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-counter').textContent=`${session.idx+1} / ${session.qs.length}`;
  document.getElementById('prog-bar').style.width=((session.idx+1)/session.qs.length*100)+'%';

  // ○×ボタン
  document.getElementById('choices').innerHTML=`
    <button class="choice choice-ox" onclick="answer(true)" style="border-color:#4ade80;background:rgba(74,222,128,0.07);">
      <span style="font-size:2.8rem;line-height:1;">○</span>
      <span style="font-size:0.85rem;color:var(--muted);">正しい</span>
    </button>
    <button class="choice choice-ox" onclick="answer(false)" style="border-color:#f43f5e;background:rgba(244,63,94,0.07);">
      <span style="font-size:2.8rem;line-height:1;">×</span>
      <span style="font-size:0.85rem;color:var(--muted);">誤り</span>
    </button>`;

  document.getElementById('result-box').style.display='none';
  document.getElementById('next-btn').style.display='none';
  updateMarkBtn();
}

function answer(userAnswer){
  if(answered)return;
  answered=true;
  const q=currentQ;
  const correct=(userAnswer===q.answer);
  session.answers.push({id:q.id,correct,chosen:userAnswer});
  state.totalAnswered++;
  if(correct)state.totalCorrect++;
  if(!state.catStats[q.cat])state.catStats[q.cat]={a:0,c:0};
  state.catStats[q.cat].a++;
  if(correct)state.catStats[q.cat].c++;
  if(!correct){if(!state.wrongIds.includes(q.id))state.wrongIds.push(q.id);}
  else{state.wrongIds=state.wrongIds.filter(id=>id!==q.id);}
  saveState();

  // ボタンの色を更新
  const buttons=document.querySelectorAll('.choice-ox');
  buttons.forEach(btn=>{btn.style.pointerEvents='none';});
  // 正解ボタンをハイライト
  const correctBtn=q.answer?buttons[0]:buttons[1];
  const wrongBtn=q.answer?buttons[1]:buttons[0];
  correctBtn.style.background='rgba(74,222,128,0.25)';
  correctBtn.style.borderColor='#4ade80';
  if(!correct){
    wrongBtn.style.background='rgba(244,63,94,0.25)';
    wrongBtn.style.borderColor='#f43f5e';
  }

  const rb=document.getElementById('result-box');
  rb.style.display='block';
  rb.className='result-box '+(correct?'result-correct':'result-wrong');
  // 参照先表示
  const refHtml=q.ref?`<div style="font-size:10px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);">📖 ${q.ref}</div>`:'';
  rb.innerHTML=`<div class="result-icon">${correct?'✅':'❌'}</div>
    <div class="result-text">${correct?'正解！':'不正解'}</div>
    <div class="result-explain">${q.explain}</div>
    ${refHtml}`;
  document.getElementById('next-btn').style.display='block';
}

function nextQ(){
  session.idx++;
  if(session.idx>=session.qs.length){showResult();return;}
  renderQ();
}

function toggleMark(){
  const id=currentQ.id;
  if(state.markedIds.includes(id)){state.markedIds=state.markedIds.filter(x=>x!==id);}
  else{state.markedIds.push(id);}
  saveState();updateMarkBtn();
}
function updateMarkBtn(){
  const btn=document.getElementById('mark-btn');
  if(!btn||!currentQ)return;
  const marked=state.markedIds.includes(currentQ.id);
  btn.textContent=marked?'★ マーク済':'☆ マーク';
  btn.style.color=marked?'var(--yellow)':'var(--muted)';
}

function showResult(){
  hideAll();
  document.getElementById('result').style.display='flex';
  const total=session.qs.length;
  const correct=session.answers.filter(a=>a.correct).length;
  const rate=Math.round(correct/total*100);
  const elapsed=Math.round((Date.now()-session.startTime)/1000);
  const mins=Math.floor(elapsed/60);
  const secs=elapsed%60;
  document.getElementById('res-score').textContent=`${correct}/${total}`;
  document.getElementById('res-rate').textContent=rate+'%';
  document.getElementById('res-rate').style.color=rate===100?'#4ade80':rate>=90?'var(--yellow)':'var(--red)';
  document.getElementById('res-time').textContent=`${mins}分${secs}秒`;
  // 合格判定（模擬試験モードのみ）
  const passEl=document.getElementById('res-pass');
  if(session.mode==='exam'){
    passEl.style.display='block';
    passEl.textContent=rate>=90?'🎉 合格ライン達成！（90%以上）':'⚠️ 要復習（合格は90%以上）';
    passEl.style.color=rate>=90?'#4ade80':'var(--red)';
  } else { passEl.style.display='none'; }

  // カテゴリ別結果
  const catResults={};
  session.answers.forEach(a=>{
    const q=QDB.find(x=>x.id===a.id);
    if(!q)return;
    if(!catResults[q.cat])catResults[q.cat]={c:0,t:0};
    catResults[q.cat].t++;
    if(a.correct)catResults[q.cat].c++;
  });
  document.getElementById('cat-results').innerHTML=Object.entries(catResults).map(([k,v])=>{
    const r=Math.round(v.c/v.t*100);
    const col=r===100?'#4ade80':r>=80?'var(--yellow)':'var(--red)';
    return `<div class="cat-result-row">
      <div class="cat-result-top"><span class="cat-result-name">${CATS[k].icon} ${CATS[k].name}</span><span class="cat-result-score" style="color:${col}">${v.c}/${v.t}問 (${r}%)</span></div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${r}%;background:${col}"></div></div>
    </div>`;
  }).join('');
  autoSaveAll();
}

function hideAll(){['home','catscreen','quiz','result'].forEach(id=>document.getElementById(id).style.display='none');}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ══════════════════════════════════════════════

// 共通同期ライブラリ (全アプリ共通)
// 設定キー: hunting_sync_cfg → {apiKey, binId}
// ═══════════════════════════════════════════════════
const SYNC_CFG_KEY = 'hunting_sync_cfg';

function getSyncCfg(){
  try{ return JSON.parse(localStorage.getItem(SYNC_CFG_KEY)||'{}'); }catch(e){ return {}; }
}
function setSyncCfg(cfg){ localStorage.setItem(SYNC_CFG_KEY, JSON.stringify(cfg)); }
function hasSyncCfg(){ const c=getSyncCfg(); return !!(c.apiKey&&c.binId); }

// クラウドから全データ取得
async function cloudPull(){
  const cfg=getSyncCfg(); if(!cfg.apiKey||!cfg.binId) return null;
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`,{
      headers:{'X-Master-Key':cfg.apiKey}
    });
    if(!res.ok) return null;
    const j=await res.json(); return j.record||null;
  }catch(e){ return null; }
}

// クラウドへ全データ保存（マージ）
async function cloudPush(appKey, appData){
  const cfg=getSyncCfg(); if(!cfg.apiKey||!cfg.binId) return false;
  try{
    // 既存データ取得してマージ
    let existing={};
    const pulled = await cloudPull();
    if(pulled) existing=pulled;
    const merged={...existing, [appKey]:appData, updatedAt:new Date().toISOString()};
    const res=await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':cfg.apiKey},
      body:JSON.stringify(merged)
    });
    return res.ok;
  }catch(e){ return false; }
}

// 起動時自動ロード（クラウドのデータをLocalStorageに反映）
async function autoLoadFromCloud(appKey){
  if(!hasSyncCfg()) return false;
  try{
    const data=await cloudPull();
    if(!data||!data[appKey]) return false;
    const cloud=data[appKey];
    const localRaw=localStorage.getItem(appKey);
    const local=localRaw?JSON.parse(localRaw):{totalAnswered:0};
    // クラウドの方が多く解答していれば上書き
    if((cloud.totalAnswered||0)>=(local.totalAnswered||0)){
      localStorage.setItem(appKey, JSON.stringify(cloud));
      return true;
    }
    return false;
  }catch(e){ return false; }
}

// ── UI同期設定関数（共通ライブラリ利用）──
function showSyncModal(){
  const cfg=getSyncCfg();
  document.getElementById('sync-apikey').value=cfg.apiKey||'';
  document.getElementById('sync-binid').value=cfg.binId||'';
  document.getElementById('sync-modal').style.display='flex';
}
function hideSyncModal(){ document.getElementById('sync-modal').style.display='none'; }
function saveSyncSettings(){
  const apiKey=document.getElementById('sync-apikey').value.trim();
  const binId=document.getElementById('sync-binid').value.trim();
  if(!apiKey||!binId){showToast('API KeyとBin IDを入力してください');return;}
  setSyncCfg({apiKey,binId});
  hideSyncModal();
  showToast('設定を保存しました ✅');
  autoSaveAll();
}

// ── 自動保存（問題終了・結果画面で呼ぶ）──
async function autoSaveAll(){
  if(!hasSyncCfg()) return;
  const ok = await cloudPush('gun_quiz_v1', state);
  if(ok) document.getElementById('sync-btn').textContent='☁️ 同期済み';
  setTimeout(()=>{ document.getElementById('sync-btn').textContent='☁️ 同期'; },2000);
}
