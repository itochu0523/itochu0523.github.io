<title>🦌 狩猟免許 完全攻略</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root{
  --bg:#0a0e0a;--bg2:#111811;--bg3:#1a2e1a;
  --green:#4ade80;--green2:#16a34a;--green3:#052e16;
  --red:#f87171;--red2:#dc2626;--red3:#2d0a0a;
  --yellow:#fbbf24;--yellow3:#2d1a00;
  --text:#e8f5e9;--muted:#6b7280;--card:#0f1f0f;
  --border:rgba(74,222,128,0.15);
  --font:'Zen Kaku Gothic New',sans-serif;
  --mono:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:var(--bg);min-height:100vh;font-family:var(--font);color:var(--text);overflow-x:hidden}

/* ── SCANLINE EFFECT ── */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}

/* ── HOME SCREEN ── */
#home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.home-icon{font-size:72px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(74,222,128,0.5));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 20px rgba(74,222,128,0.5))}50%{filter:drop-shadow(0 0 40px rgba(74,222,128,0.9))}}
.home-title{font-size:28px;font-weight:900;color:var(--green);letter-spacing:-1px;line-height:1.1;margin-bottom:6px;text-shadow:0 0 30px rgba(74,222,128,0.4)}
.home-sub{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:380px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.stat-num{font-family:var(--mono);font-size:22px;color:var(--green);font-weight:700}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px}

.mode-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px}
.mode-btn{padding:16px;border-radius:14px;border:none;cursor:pointer;font-family:var(--font);font-size:15px;font-weight:700;display:flex;align-items:center;gap:12px;text-align:left;transition:all .15s;position:relative;overflow:hidden}
.mode-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05),transparent);pointer-events:none}
.btn-main{background:linear-gradient(135deg,#16a34a,#052e16);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.btn-main:active{transform:scale(.98)}
.btn-weak{background:linear-gradient(135deg,#7c2d12,#1c0a00);color:#fb923c;border:1px solid rgba(251,146,60,.3)}
.btn-wrong{background:linear-gradient(135deg,#7f1d1d,#1a0000);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-cat{background:linear-gradient(135deg,#1e3a5f,#0a1a2e);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
.mode-btn .icon{font-size:24px;flex-shrink:0}
.mode-btn .desc{font-size:10px;opacity:.7;font-weight:400;margin-top:2px}
.btn-exam{background:linear-gradient(135deg,#3b1a5a,#0a0010);color:#c084fc;border:2px solid rgba(192,132,252,.5)}
.btn-badge{background:rgba(248,113,113,.2);color:var(--red);border-radius:20px;padding:2px 8px;font-size:10px;margin-left:auto;font-family:var(--mono);flex-shrink:0}
.btn-badge.yellow{background:rgba(251,191,36,.2);color:var(--yellow)}

/* ── CATEGORY SELECT ── */
#catscreen{display:none;flex-direction:column;min-height:100vh;padding:20px}
.screen-hd{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.back-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer}
.screen-ttl{font-size:18px;font-weight:900;color:var(--green)}
.cat-grid{display:flex;flex-direction:column;gap:10px}
.cat-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left;transition:all .15s}
.cat-btn:active{transform:scale(.98);background:var(--bg3)}
.cat-icon{font-size:28px;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-size:15px;font-weight:700;color:var(--text)}
.cat-count{font-size:11px;color:var(--muted);margin-top:2px}
.cat-rate{font-family:var(--mono);font-size:14px;font-weight:700;flex-shrink:0}

/* ── QUIZ SCREEN ── */
#quiz{display:none;flex-direction:column;min-height:100vh}
.quiz-header{padding:14px 16px 10px;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.q-exit{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 10px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font)}
.q-info{font-family:var(--mono);font-size:12px;color:var(--muted)}
.q-cat-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:1px}
.prog-wrap{background:rgba(255,255,255,.05);border-radius:4px;height:4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--green2),var(--green));border-radius:4px;transition:width .4s ease}

.quiz-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px}
.q-number{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px}
.q-text{font-size:17px;font-weight:700;line-height:1.6;color:var(--text)}
.q-image{width:100%;border-radius:12px;border:1px solid var(--border);margin-top:4px;background:var(--bg3);padding:16px;text-align:center;font-size:32px}

.choices{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.choice{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;text-align:left;font-family:var(--font)}
.choice:active{transform:scale(.99)}
.choice-label{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.choice-text{font-size:14px;line-height:1.5;color:var(--text)}

.choice.correct{background:rgba(74,222,128,.1);border-color:var(--green);animation:correctPop .3s ease}
.choice.wrong{background:rgba(248,113,113,.1);border-color:var(--red)}
.choice.show-correct{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.4)}
.choice.correct .choice-label{background:var(--green);color:#000}
.choice.wrong .choice-label{background:var(--red);color:#fff}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}

.result-box{border-radius:14px;padding:14px 16px;display:none;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-box.correct-box{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3)}
.result-box.wrong-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3)}
.result-label{font-size:13px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.result-explain{font-size:13px;color:#cbd5e1;line-height:1.7}
.result-ref{font-size:10px;color:var(--muted);margin-top:6px;font-family:var(--mono)}

.mark-btn{background:transparent;border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:6px 12px;color:var(--yellow);font-size:12px;cursor:pointer;font-family:var(--font);margin-top:8px}
.mark-btn.marked{background:rgba(251,191,36,.15);border-color:var(--yellow)}

.next-btn{background:linear-gradient(135deg,var(--green2),#052e16);border:1px solid rgba(74,222,128,.3);border-radius:14px;padding:16px;color:var(--green);font-size:16px;font-weight:900;cursor:pointer;font-family:var(--font);width:100%;margin-top:4px;transition:all .15s;display:none}
.next-btn:active{transform:scale(.98)}
.next-btn.finish{background:linear-gradient(135deg,#1d4ed8,#0a1a3e);border-color:rgba(96,165,250,.3);color:#93c5fd}

/* ── RESULT SCREEN ── */
#result{display:none;flex-direction:column;min-height:100vh;padding:24px;align-items:center}
.result-title{font-size:32px;font-weight:900;margin:16px 0 4px;text-align:center}
.result-score{font-family:var(--mono);font-size:72px;font-weight:700;text-align:center;line-height:1;margin:16px 0}
.score-perfect{color:var(--green);text-shadow:0 0 40px rgba(74,222,128,.6)}
.score-good{color:var(--yellow)}
.score-bad{color:var(--red)}
.result-msg{font-size:14px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.7}

.result-cats{width:100%;max-width:400px;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.cat-result{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.cat-result-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cat-result-name{font-size:13px;font-weight:700}
.cat-result-score{font-family:var(--mono);font-size:13px}
.cat-bar-bg{background:rgba(255,255,255,.06);border-radius:4px;height:5px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}

.result-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px}
.res-btn{padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:700;transition:all .15s}
.res-btn:active{transform:scale(.98)}
.res-btn.primary{background:linear-gradient(135deg,var(--green2),#052e16);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.res-btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.res-btn.danger{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3)}

/* ── WRONG LIST ── */
#wronglist{display:none;flex-direction:column;min-height:100vh;padding:20px}
.wrong-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer}
.wrong-item-q{font-size:13px;font-weight:700;line-height:1.5;margin-bottom:6px}
.wrong-item-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:20px;font-family:var(--mono);letter-spacing:1px}
.tag-cat{background:rgba(96,165,250,.15);color:#93c5fd}
.tag-wrong{background:rgba(248,113,113,.15);color:var(--red)}
.tag-mark{background:rgba(251,191,36,.15);color:var(--yellow)}

/* ── TOAST ── */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a2e1a;border:1px solid var(--green);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--green);z-index:1000;transition:transform .3s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── MISC ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:16px 0}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="home-icon">🦌</div>
  <div class="home-title">狩猟免許<br>完全攻略</div>
  <div class="home-sub">第一種 · 完全合格 · 100点主義</div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="st-total">0</div>
      <div class="stat-lbl">累計回答</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="st-rate" style="color:var(--yellow)">-%</div>
      <div class="stat-lbl">正答率</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="st-wrong" style="color:var(--red)">0</div>
      <div class="stat-lbl">要復習</div>
    </div>
  </div>

  <div class="mode-btns">
    <button class="mode-btn btn-main" onclick="startMode('random')">
      <span class="icon">🎯</span>
      <div><div>ランダム出題 20問</div><div class="desc">全分野から網羅的に出題・100点主義</div></div>
    </button>
    <button class="mode-btn btn-wrong" onclick="startMode('wrong')">
      <span class="icon">❌</span>
      <div><div>間違えた問題だけ</div><div class="desc">苦手を徹底的に潰す</div></div>
      <span class="btn-badge" id="wrong-count-badge">0問</span>
    </button>
    <button class="mode-btn btn-weak" onclick="startMode('weak')">
      <span class="icon">⚠️</span>
      <div><div>マーク済み問題</div><div class="desc">自分でマークした重要問題</div></div>
      <span class="btn-badge yellow" id="mark-count-badge">0問</span>
    </button>
    <button class="mode-btn btn-exam" onclick="startMode('exam')" style="margin-bottom:4px;">
      <span class="icon">📝</span>
      <div><div>本番模擬試験（30問）</div><div class="desc">本番と同じ配点比率・70%以上で合格ライン</div></div>
    </button>
    <button class="mode-btn btn-cat" onclick="showCatScreen()">
      <span class="icon">📚</span>
      <div><div>分野別に攻める</div><div class="desc">法令・安全・識別・猟具・生態</div></div>
    </button>
  </div>
</div>

<!-- CATEGORY SELECT -->
<div id="catscreen">
  <div class="screen-hd">
    <button class="back-btn" onclick="showHome()">← 戻る</button>
    <div class="screen-ttl">分野を選ぶ</div>
  </div>
  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <div class="quiz-top">
      <button class="q-exit" onclick="exitQuiz()">✕ 終了</button>
      <span class="q-info" id="q-counter">1 / 20</span>
      <span class="q-cat-badge" id="q-cat-badge">法令</span>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:5%"></div></div>
  </div>
  <div class="quiz-body">
    <div class="q-number" id="q-number">Q.001</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="result-box" id="result-box">
      <div class="result-label" id="result-label"></div>
      <div class="result-explain" id="result-explain"></div>
      <div class="result-ref" id="result-ref"></div>
      <button class="mark-btn" id="mark-btn" onclick="toggleMark()">☆ 重要マーク</button>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">次の問題 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div style="font-size:48px;margin-top:20px" id="result-emoji">🎯</div>
  <div class="result-title" id="result-title">セッション結果</div>
  <div class="result-score" id="result-score">0%</div>
  <div class="result-msg" id="result-msg"></div>
  <div class="result-cats" id="result-cats"></div>
  <div class="result-btns">
    <div id="res-pass" style="display:none;text-align:center;font-size:14px;font-weight:700;margin-bottom:12px;"></div>
    <div id="res-time" style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:12px;"></div>
    <button class="res-btn primary" onclick="startMode('random')">🎯 もう一度20問</button>
    <button class="res-btn secondary" onclick="startMode('wrong')">❌ 間違えた問題を復習</button>
    <button class="res-btn secondary" onclick="showHome()">🏠 ホームへ</button>
  </div>
</div>

<!-- WRONG LIST (review) -->
<div id="wronglist">
  <div class="screen-hd">
    <button class="back-btn" onclick="showHome()">← 戻る</button>
    <div class="screen-ttl">要復習リスト</div>
  </div>
  <div id="wrong-items"></div>
</div>

<div id="toast"></div>

<script>
const CATS = {
  law:  {name:'法令・制度',     icon:'⚖️', color:'#60a5fa'},
  bird: {name:'鳥獣識別',       icon:'🦅', color:'#f97316'},
  gun:  {name:'猟具・銃器',     icon:'🔫', color:'#a78bfa'},
  safe: {name:'安全・事故防止', icon:'🛡️', color:'#4ade80'},
  eco:  {name:'生態・保護管理', icon:'🌿', color:'#34d399'},
};
const QDB = [
{id:1,cat:'law',
q:'鳥獣保護管理法の目的として正しいものはどれか。',
choices:['狩猟の取締りと違反者の処罰','生物多様性の確保、生活環境の保全及び農林水産業の健全な発展に寄与すること','レクリエーションとしての狩猟文化の普及促進'],
answer:1,
explain:'鳥獣保護管理法の目的は「生物多様性の確保、生活環境の保全及び農林水産業の健全な発展に寄与すること」。「狩猟の取締り」「レクリエーション普及」は誤り。',
ref:'鳥獣保護管理法第1条'},

{id:2,cat:'law',
q:'鳥獣保護管理法における鳥獣行政の担当機関として正しい組み合わせはどれか。',
choices:['国：林野庁、都道府県：農業委員会','国：環境省、都道府県：自然環境行政または農林行政担当部局','国：文化庁、都道府県：文化財保護委員会'],
answer:1,
explain:'鳥獣保護管理法の担当は国＝環境省、都道府県＝自然環境行政または農林行政担当部局。「林野庁」「文化庁」「農業委員会」は誤り。',
ref:'鳥獣保護管理法'},

{id:3,cat:'law',
q:'第一種銃猟免許で使用できる猟具として正しいのはどれか。',
choices:['散弾銃・ライフル銃・空気銃のすべて','空気銃のみ','散弾銃とライフル銃（空気銃は第二種）'],
answer:0,
explain:'第一種銃猟免許は散弾銃・ライフル銃・空気銃すべてに対応。第二種銃猟免許は空気銃のみ。「第二種で散弾銃が使える」は誤りの代表例。',
ref:'鳥獣保護管理法第39条'},

{id:4,cat:'law',
q:'狩猟免許を受けた者が狩猟を行うために必要な手続きとして正しいのはどれか。',
choices:['免許取得後はどこでも自由に狩猟できる','猟を行う都道府県ごとに狩猟者登録を受けなければならない','猟友会に入会すれば全国で狩猟できる'],
answer:1,
explain:'狩猟免許は全国共通だが、狩猟を行う都道府県ごとに狩猟者登録が必要。「免許だけでどこでも可」「猟友会入会で全国可」はいずれも誤り。',
ref:'鳥獣保護管理法第52条'},

{id:5,cat:'law',
q:'狩猟者登録証の有効期間満了後の返納期限として正しいのはどれか。',
choices:['満了後7日以内に公安委員会へ返納','満了後30日以内に交付した都道府県知事へ返納','満了後60日以内に環境省へ返納'],
answer:1,
explain:'狩猟者登録証は有効期間満了後30日以内に、交付した都道府県知事へ返納する義務がある。「公安委員会」「環境省」は誤り。30日という期限も確実に覚えること。',
ref:'鳥獣保護管理法第54条'},

{id:6,cat:'law',
q:'狩猟結果（捕獲報告）の提出期限として正しいのはどれか。',
choices:['有効期間満了日から起算して30日以内（怠ると30万円以下の罰金）','有効期間満了日から60日以内（怠ると警告のみ）','毎年3月31日まで（罰則なし）'],
answer:0,
explain:'捕獲結果報告は有効期間満了日から起算して30日以内に提出義務があり、怠ると30万円以下の罰金。期限と罰則の両方が頻出。',
ref:'鳥獣保護管理法第57条'},

{id:7,cat:'law',
q:'狩猟免許の有効期間として正しいのはどれか。',
choices:['新規取得時は約3年（一律9月14日まで）・更新後はきっちり3年','新規・更新ともに5年','免許の種類によって1〜3年と異なる'],
answer:0,
explain:'狩猟免許は新規取得時は取得年の9月15日〜3年後の9月14日（約3年）。更新後はきっちり3年。「5年」「種類ごとに異なる」は誤り。',
ref:'鳥獣保護管理法第40条'},

{id:8,cat:'law',
q:'狩猟免許が取り消された者が再び受験できるまでの期間として正しいのはどれか。',
choices:['1年間受験できない','3年間受験できない','取消し理由により1〜5年と異なる'],
answer:1,
explain:'狩猟免許取消し後は3年間受験できない。「1年間」は誤り。また法違反で罰金以上の刑を受けた場合も3年経過しないと受験不可。',
ref:'鳥獣保護管理法第41条'},

{id:9,cat:'law',
q:'狩猟鳥獣として指定された鳥のヒナや卵は、猟期中であれば捕獲・採取が可能か。',
choices:['猟期中であれば捕獲・採取が可能','猟期中であっても捕獲・採取は禁止','都道府県知事の許可があれば可能'],
answer:1,
explain:'狩猟鳥獣であっても、ヒナや卵の捕獲・採取は禁止。猟期中であっても例外なし。「猟期中なら可能」は誤り。',
ref:'鳥獣保護管理法第14条'},

{id:10,cat:'law',
q:'令和4年9月15日施行の法改正後、現在の狩猟鳥獣の数として正しいのはどれか。',
choices:['50種（鳥類30種・獣類20種）','46種（鳥類26種・獣類20種）','48種（鳥類28種・獣類20種）'],
answer:1,
explain:'令和4年9月15日施行の改正でゴイサギ・バンが狩猟鳥獣から除外され、現在は46種（鳥類26種・獣類20種）。「50種」「48種」は誤り。旧教材の数値との混同に注意。',
ref:'鳥獣保護管理法施行規則（令和4年改正）'},

{id:11,cat:'law',
q:'令和4年9月15日の改正で狩猟鳥獣から除外されたのはどれか。',
choices:['ヤマドリとキジ','ゴイサギとバン','マガモとコガモ'],
answer:1,
explain:'令和4年9月15日施行の改正でゴイサギとバンが狩猟鳥獣から除外。全国鳥類繁殖分布調査での顕著な個体数減少が理由。ゴイサギ・バンは「非狩猟鳥獣」として正確に覚える。',
ref:'鳥獣保護管理法施行規則（令和4年改正）'},

{id:12,cat:'law',
q:'狩猟（銃猟）が禁止される時間帯として正しいのはどれか。',
choices:['夜間（日没後〜翌日の日出前）のみ禁止','日出前と日没後（夜間）は銃猟禁止','1日中いつでも狩猟できる'],
answer:1,
explain:'銃猟は日出前・日没後は禁止。日の出から日没の間のみ銃猟が認められる。「夜間のみ」という表現は「日出前」も含まれないため誤り。',
ref:'鳥獣保護管理法第14条'},

{id:13,cat:'law',
q:'住居集合地域や多数の人が集まる場所での銃猟について正しいのはどれか。',
choices:['居住者の同意があれば可能','禁止。判例上、発射地点周囲約200m以内に約10軒の人家がある場所は「人家稠密の場所」に該当','猟友会会長の許可があれば可能'],
answer:1,
explain:'住居集合地域・広場・駅等の多数集合場所での銃猟は禁止。最高裁平成9年判例では発射地点周囲半径約200m以内に人家約10軒がある場所は「人家稠密の場所」に該当。',
ref:'鳥獣保護管理法第14条'},

{id:14,cat:'law',
q:'垣・さくで囲まれた土地や作物のある土地で狩猟を行う場合の規制として正しいのはどれか。',
choices:['土地の占有者（所有者等）の承諾なく狩猟できる','占有者の承諾が必要','都道府県知事の許可があれば占有者の承諾は不要'],
answer:1,
explain:'垣・さくで囲まれた土地、作物のある土地では占有者の承諾が必要。「承諾不要」は誤り。占有者の承諾なしに立ち入ると不法侵入にもなりうる。',
ref:'鳥獣保護管理法第14条'},

{id:15,cat:'law',
q:'狩猟免許試験の知識試験の合格基準として正しいのはどれか。',
choices:['30問中25問以上正解（正答率83%以上）','30問中21問以上正解（正答率70%以上）','30問中27問以上正解（正答率90%以上）'],
answer:1,
explain:'狩猟免許試験の知識試験合格基準は正答率70%以上（30問中21問以上正解）。90%は猟銃等講習会の合格基準であり混同注意。',
ref:'鳥獣保護管理法施行規則'},

{id:16,cat:'law',
q:'狩猟免許試験の技能試験の合格基準として正しいのはどれか。',
choices:['持ち点100点のうち減点合計が30点を超えると失格','持ち点100点のうち減点合計が50点を超えると失格','全項目を正しく実施しないと失格'],
answer:0,
explain:'技能試験は減点方式で持ち点100点。減点合計が30点を超えると失格（つまり70点以上で合格）。「50点超で失格」は誤り。',
ref:'鳥獣保護管理法施行規則'},

{id:17,cat:'law',
q:'狩猟免許試験の適性試験（第一種銃猟）における視力の基準として正しいのはどれか。',
choices:['両眼0.5以上','両眼0.7以上かつ片眼それぞれ0.3以上','両眼1.0以上'],
answer:1,
explain:'第一種・第二種銃猟の視力基準は両眼0.7以上かつ片眼それぞれ0.3以上（1眼が見えない等の場合は他眼の視野左右150度以上で視力0.7以上）。わな・網猟は両眼0.5以上。',
ref:'鳥獣保護管理法施行規則'},

{id:18,cat:'law',
q:'狩猟期間（北海道以外）の原則として正しいのはどれか。',
choices:['10月1日〜翌年3月31日','11月15日〜翌年2月15日','11月1日〜翌年1月31日'],
answer:1,
explain:'北海道以外の狩猟期間の原則は11月15日〜翌年2月15日。北海道は10月1日〜翌年1月31日。「11月1日〜1月31日」は令和4年改正前の山形県カモ類の日程であり混同注意。',
ref:'鳥獣保護管理法施行規則'},

{id:19,cat:'law',
q:'山形県のカモ類の猟期について、令和4年度以降の正しい期間はどれか。',
choices:['11月1日〜翌年1月31日（従来通り）','11月15日〜翌年2月15日（全国一般期間に変更）','10月15日〜翌年3月15日（延長）'],
answer:1,
explain:'山形県のカモ類猟期は令和4年9月15日施行の改正で「11月1日〜1月31日」から「11月15日〜2月15日」に変更（青森・秋田・山形の3県共通）。近年の暖冬・少雪によるカモ類の渡来・渡去時期のずれへの対応。',
ref:'鳥獣保護管理法施行規則（令和4年改正）'},

{id:20,cat:'law',
q:'山形県でのイノシシ・ニホンジカの猟期として正しいのはどれか。',
choices:['11月15日〜翌年2月15日（全国一般期間）','11月15日〜翌年3月31日（延長措置）','通年捕獲可能'],
answer:1,
explain:'山形県のイノシシ・ニホンジカは11月15日〜翌年3月31日に延長措置がとられている。全国一般期間（2月15日まで）より長い点が山形県の特徴。',
ref:'山形県告示'},

{id:21,cat:'law',
q:'ヤマドリのメス・キジのメスについて正しいのはどれか。',
choices:['オスと同様に狩猟鳥獣として捕獲できる','令和9年9月14日まで全国で捕獲禁止','猟期外のみ捕獲禁止で猟期中は可能'],
answer:1,
explain:'ヤマドリのメス・キジのメスは令和9年9月14日まで全国で捕獲禁止（個体数保護のため）。猟期中であっても捕獲不可。「オスと同様に可」は誤り。',
ref:'鳥獣保護管理法施行規則'},

{id:22,cat:'law',
q:'カモ類の1日の捕獲制限として正しいのはどれか。',
choices:['1日合計3羽まで','1日合計5羽まで','制限なし（ただし1期間200羽まで）'],
answer:1,
explain:'カモ類は1日合計5羽まで（網使用は1猟期合計200羽まで）。「3羽」「制限なし」は誤り。種ごとの制限数値は頻出。',
ref:'鳥獣保護管理法施行規則'},

{id:23,cat:'law',
q:'キジバトの1日の捕獲制限として正しいのはどれか。',
choices:['1日2羽まで','1日10羽まで','1日5羽まで'],
answer:1,
explain:'キジバトは1日10羽まで。ヤマドリ・キジ（オス）は合計1日2羽、コジュケイは1日5羽、ヤマシギ・タシギは合計1日5羽、エゾライチョウは1日2羽。各種の制限数値を区別して覚える。',
ref:'鳥獣保護管理法施行規則'},

{id:24,cat:'law',
q:'法に違反した場合の狩猟免許の処分として正しいのはどれか。',
choices:['違反の程度にかかわらず必ず免許取消し','懲役相当の違反は免許取消し、罰金相当は1年の効力停止が原則','罰金以上の刑を受けた場合のみ3年間停止'],
answer:1,
explain:'違反処分は違反の重さによって異なる。懲役相当→取消し、罰金相当→1年の効力停止が原則。「違反の程度にかかわらず必ず取消し」は誤り。',
ref:'鳥獣保護管理法第44条'},

{id:25,cat:'law',
q:'禁止猟法として正しいのはどれか。',
choices:['くくりわなによるイノシシの捕獲','とりもちや据銃による捕獲','散弾銃によるキジの捕獲'],
answer:1,
explain:'とりもち・据銃（銃を固定して引き金を遠隔操作等で発射させる方法）は禁止猟法。くくりわなは適正な規格（輪の直径12cm以下等）を守れば使用可。',
ref:'鳥獣保護管理法第12条'},

{id:26,cat:'law',
q:'狩猟免許試験（知識試験）の問題数・試験時間として正しいのはどれか。',
choices:['20問・60分','30問・90分','50問・60分'],
answer:1,
explain:'狩猟免許試験の知識試験は三肢択一30問・90分。50問・60分は猟銃等講習会考査（○×式）の形式。混同しないこと。',
ref:'鳥獣保護管理法施行規則'},

{id:27,cat:'law',
q:'捕獲禁止場所として正しいのはどれか。',
choices:['農地（田畑）での捕獲は常に禁止','公道（法面含む）・都市公園・社寺境内・墓地・自然公園特別保護地区等は捕獲禁止','山林での捕獲は常に禁止'],
answer:1,
explain:'公道・都市公園・社寺境内・墓地・自然公園特別保護地区・原生自然環境保全地域等は捕獲禁止。農地・山林は原則可（ただし占有者の承諾等が必要な場合あり）。',
ref:'鳥獣保護管理法第14条'},

{id:28,cat:'law',
q:'ライフル銃でイノシシ・シカ・クマを捕獲する場合の最小口径として正しいのはどれか。',
choices:['4.5mm以上','5.9mm以上','7.62mm以上'],
answer:1,
explain:'イノシシ・シカ・クマに使用できるライフルの最小口径は5.9mm。4.5mm（空気銃の一般的口径）・7.62mmは誤り。また10番以上の口径の銃器使用は禁止。',
ref:'鳥獣保護管理法施行規則'},

{id:29,cat:'law',
q:'散弾銃で使用が禁止されている弾倉の装填数として正しいのはどれか。',
choices:['弾倉に2発以上装填できる散弾銃は禁止','弾倉に3発以上装填できる散弾銃は禁止','弾倉に6発以上装填できる散弾銃は禁止'],
answer:1,
explain:'弾倉に3発以上装填できる構造の散弾銃は禁止（薬室1発＋弾倉2発の計3発が上限）。ライフル・空気銃は弾倉6発以上が禁止（薬室1＋弾倉5の計6発が上限）。数値を混同しないこと。',
ref:'銃砲刀剣類所持等取締法第4条'},

{id:30,cat:'law',
q:'イノシシ・シカ用くくりわなの規格として正しいのはどれか。',
choices:['輪の直径15cm以下、ワイヤー直径3mm以上','輪の直径12cm以下、締付け防止金具・よりもどし装着、ワイヤー直径4mm以上','輪の直径10cm以下、ワイヤー直径5mm以上'],
answer:1,
explain:'くくりわなの規格：輪の直径12cm以下、締付け防止金具・よりもどし装着、ワイヤー直径4mm以上。「15cm以下」「3mm以上」は誤り。数値の入れ替えに注意。',
ref:'鳥獣保護管理法施行規則'},

{id:31,cat:'law',
q:'狩猟での実包消費（無許可消費）の1日の上限として正しいのはどれか。',
choices:['狩猟は1日200個まで・標的射撃は1日100個まで','狩猟は1日100個まで・標的射撃は1日400個まで','どちらも1日300個まで'],
answer:1,
explain:'無許可消費の上限：狩猟・有害鳥獣駆除は1日100個以下、標的射撃は1日400個以下。数値が逆の選択肢が頻出ひっかけ。',
ref:'火薬類取締法'},

{id:32,cat:'law',
q:'猟銃の全長と空気銃の全長の基準として正しいのはどれか。',
choices:['猟銃80cm以上・空気銃94cm以上','猟銃94cm以上・空気銃80cm以上','どちらも94cm以上'],
answer:1,
explain:'猟銃の全長は94cm以上、空気銃の全長は80cm以上。逆の組み合わせは誤り。猟銃の銃身長（替え銃身）は48.8cm以上。',
ref:'銃砲刀剣類所持等取締法'},

{id:101,cat:'bird',
q:'令和4年9月15日以降、ゴイサギの扱いとして正しいのはどれか。',
choices:['引き続き狩猟鳥獣として捕獲できる','狩猟鳥獣から除外され非狩猟鳥獣となったため捕獲禁止','都道府県の許可があれば捕獲できる'],
answer:1,
explain:'ゴイサギは令和4年9月15日施行の改正で狩猟鳥獣から除外。全国調査で顕著な個体数減少が確認されたため。試験では「非狩猟鳥獣＝捕獲禁止（×）」と即答できるようにする。',
ref:'鳥獣保護管理法施行規則（令和4年改正）'},

{id:102,cat:'bird',
q:'バンの扱いとして令和4年9月15日以降に正しいのはどれか。',
choices:['狩猟鳥として捕獲できる','狩猟鳥獣から除外され非狩猟鳥獣となった','冬期のみ捕獲が許可されている'],
answer:1,
explain:'バンも令和4年9月15日施行の改正でゴイサギと同様に狩猟鳥獣から除外。旧教材ではバンが狩猟鳥獣として記載されているため注意。現在は非狩猟鳥獣。',
ref:'鳥獣保護管理法施行規則（令和4年改正）'},

{id:103,cat:'bird',
q:'イタチの雌雄と狩猟鳥獣としての扱いについて正しいのはどれか。',
choices:['オス・メスともに狩猟獣として捕獲できる','オスは狩猟獣だがメスは非狩猟獣（雌雄同色・同形のため大きさで判断）','メスは狩猟獣だがオスは非狩猟獣'],
answer:1,
explain:'イタチはオスのみ狩猟獣、メスは非狩猟獣。雌雄が同色・同形のため大きさで判断（オス頭胴長30〜40cm、メス15〜20cm）。「メス」と明示されたら非狩猟獣（×）。最重要識別問題。',
ref:'狩猟読本 鳥獣識別編'},

{id:104,cat:'bird',
q:'キジバトの識別特徴として正しいのはどれか。',
choices:['全身灰色で首に横縞模様がなく、都市部に多いドバトと同じ種','首の側面に青灰色と黒の横縞模様があり、狩猟鳥である','翼に鮮やかな緑色の光沢があり非狩猟鳥である'],
answer:1,
explain:'キジバトは首の側面に青灰色と黒の横縞模様（鱗状斑）があり狩猟鳥。ドバト（カワラバト）・アオバト・シラコバトは非狩猟鳥。都市部に多いのはドバト。',
ref:'狩猟読本 鳥獣識別編'},

{id:105,cat:'bird',
q:'ドバト（カワラバト）の狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['キジバトと同様に狩猟鳥','非狩猟鳥のため捕獲禁止','都道府県によって異なる'],
answer:1,
explain:'ドバト（カワラバト）は非狩猟鳥。一見キジバトと混同しやすいが、ドバトは横縞がなく都市部に多い。キジバト（狩猟鳥）との識別は頻出。',
ref:'狩猟読本 鳥獣識別編'},

{id:106,cat:'bird',
q:'スズガモとキンクロハジロ（オス）の識別ポイントとして正しいのはどれか。',
choices:['嘴の色が異なり、スズガモは黄色・キンクロハジロは黒','後頭部の冠羽の有無で識別（キンクロハジロはオスに冠羽あり、スズガモはなし）','体の大きさのみで識別（スズガモが大きい）'],
answer:1,
explain:'スズガモとキンクロハジロの識別：キンクロハジロのオスは後頭部に特徴的な冠羽（長い黒い羽）がある。スズガモにはない。両方とも狩猟鳥だが識別は必須。',
ref:'狩猟読本 鳥獣識別編'},

{id:107,cat:'bird',
q:'カモシカの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['シカ類として狩猟獣に指定されている','特別天然記念物に指定されており非狩猟獣','有害鳥獣として捕獲できる'],
answer:1,
explain:'ニホンカモシカは特別天然記念物に指定されており非狩猟獣。シカの名がついているが狩猟対象のニホンジカとは別種。「シカ類として狩猟可」は誤り。',
ref:'狩猟読本 鳥獣識別編'},

{id:108,cat:'bird',
q:'ムササビ・モモンガの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['リス類として狩猟獣','非狩猟獣（捕獲禁止）','夜間のみ捕獲可能'],
answer:1,
explain:'ムササビ・モモンガは非狩猟獣で捕獲禁止。滑空している写真が出たら必ず「×（非狩猟）」と答える。ニホンリスも非狩猟獣。',
ref:'狩猟読本 鳥獣識別編'},

{id:109,cat:'bird',
q:'ニホンザルの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['狩猟獣として捕獲できる','非狩猟獣のため通常の狩猟では捕獲できない（有害鳥獣許可捕獲の対象にはなりうる）','猟期外のみ捕獲禁止'],
answer:1,
explain:'ニホンザルは狩猟獣ではなく非狩猟獣。ただし農業被害等の場合は有害鳥獣捕獲許可の対象にはなりうる。狩猟による捕獲は不可。',
ref:'狩猟読本 鳥獣識別編'},

{id:110,cat:'bird',
q:'鳥獣識別試験（技能試験）で「自信がない鳥獣・見覚えのない鳥獣」への対応として適切なのはどれか。',
choices:['知っている鳥獣に似ているなら狩猟鳥獣（○）と答える','迷ったら「非狩猟鳥獣（×）」と答える方が安全','種名が思い出せなくても○をつければ加点される'],
answer:1,
explain:'識別試験の鉄則：「見覚えのない・自信がないものは非狩猟鳥獣（×）と答える」。誤って狩猟鳥獣（○）と答えて間違いより、非狩猟（×）と答えておく方が安全な戦略。',
ref:'狩猟読本 鳥獣識別編'},

{id:111,cat:'bird',
q:'アオバトの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['キジバトと同じく狩猟鳥','非狩猟鳥','海岸部のみで捕獲可能'],
answer:1,
explain:'アオバトは非狩猟鳥。翼に鮮やかな緑色の光沢がある美しいハト科の鳥だが狩猟対象ではない。キジバト（狩猟鳥）との混同注意。',
ref:'狩猟読本 鳥獣識別編'},

{id:112,cat:'bird',
q:'シラコバトの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['狩猟鳥として捕獲できる','埼玉県等の限られた地域に生息する非狩猟鳥','渡り鳥のため捕獲制限あり'],
answer:1,
explain:'シラコバトは非狩猟鳥。埼玉県の一部地域等に生息し、個体数が少ない。キジバトと混同しやすいが狩猟対象ではない。',
ref:'狩猟読本 鳥獣識別編'},

{id:113,cat:'bird',
q:'オコジョの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['イタチの仲間として狩猟獣','非狩猟獣のため捕獲禁止','高山帯では捕獲可能'],
answer:1,
explain:'オコジョはイタチ科だが非狩猟獣。イタチ（オスのみ狩猟獣）と混同注意。白い冬毛の写真が出たら非狩猟獣（×）。',
ref:'狩猟読本 鳥獣識別編'},

{id:114,cat:'bird',
q:'ニホンリスの狩猟鳥獣としての扱いで正しいのはどれか。',
choices:['林業害獣として狩猟獣に指定','非狩猟獣のため捕獲禁止','本州では狩猟獣、北海道では非狩猟獣'],
answer:1,
explain:'ニホンリスは非狩猟獣。タイワンリス（特定外来種）とは別種で混同注意。写真が出たら非狩猟獣（×）と答える。',
ref:'狩猟読本 鳥獣識別編'},

function showCatScreen(){
  hideAll();
  document.getElementById('catscreen').style.display='flex';
  document.getElementById('cat-grid').innerHTML=Object.entries(CATS).map(([k,v])=>{
    const qs=QDB.filter(q=>q.cat===k);

    </button>`;
  }).join('');
}

function startMode(mode,cat=''){
  let pool=[];
  if(mode==='random') pool=shuffle([...QDB]);
  else if(mode==='wrong'){
    pool=QDB.filter(q=>state.wrongIds.includes(q.id));
    if(!pool.length){showToast('間違えた問題がありません！完璧です！🎉');return;}
    pool=shuffle(pool);
  } else if(mode==='weak'){
    pool=QDB.filter(q=>state.markedIds.includes(q.id));
    if(!pool.length){showToast('マーク済み問題がありません');return;}
    pool=shuffle(pool);
  } else if(mode==='cat'){
    pool=shuffle(QDB.filter(q=>q.cat===cat));
  } else if(mode==='exam'){
    // 本番模擬：30問・配点比率に近い構成
    const lawQ=shuffle(QDB.filter(q=>q.cat==='law')).slice(0,13);
    const birdQ=shuffle(QDB.filter(q=>q.cat==='bird')).slice(0,9);
    const gunQ=shuffle(QDB.filter(q=>q.cat==='gun')).slice(0,6);
    const safeQ=shuffle(QDB.filter(q=>q.cat==='safe')).slice(0,1);
    const ecoQ=shuffle(QDB.filter(q=>q.cat==='eco')).slice(0,1);
    pool=shuffle([...lawQ,...birdQ,...gunQ,...safeQ,...ecoQ]);
  }
  const count=mode==='exam'?Math.min(30,pool.length):Math.min(20,pool.length);
  session={qs:pool.slice(0,count),idx:0,answers:[],mode,cat,startTime:Date.now()};
  hideAll();
  document.getElementById('quiz').style.display='flex';
  renderQ();
}

let shuffledAnswerIdx=0;
function shuffleChoices(q){
  const indexed=q.choices.map((text,i)=>({text,isCorrect:i===q.answer}));
  for(let i=indexed.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [indexed[i],indexed[j]]=[indexed[j],indexed[i]];
  }
  return indexed;
}

function renderQ(){
  const q=session.qs[session.idx];
  currentQ=q;answered=false;
  const shuffled=shuffleChoices(q);
  shuffledAnswerIdx=shuffled.findIndex(c=>c.isCorrect);
  currentQ._shuffled=shuffled;
  const ci=CATS[q.cat];
  const badge=document.getElementById('q-cat-badge');
  badge.textContent=ci.name;
  badge.style.cssText=`background:${ci.color}22;color:${ci.color};border:1px solid ${ci.color}44;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:1px`;
  document.getElementById('q-number').textContent=`Q.${String(q.id).padStart(3,'0')}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-counter').textContent=`${session.idx+1} / ${session.qs.length}`;
  document.getElementById('prog-bar').style.width=((session.idx+1)/session.qs.length*100)+'%';
  const labels=['A','B','C'];
  document.getElementById('choices').innerHTML=shuffled.map((c,i)=>
    `<button class="choice" onclick="answer(${i})">
      <span class="choice-label">${labels[i]}</span>
      <span class="choice-text">${c.text}</span>
    </button>`).join('');
  document.getElementById('result-box').style.display='none';
  document.getElementById('next-btn').style.display='none';
  updateMarkBtn();
}

function answer(idx){
  if(answered)return;
  answered=true;
  const q=currentQ;
  const correct=idx===shuffledAnswerIdx;
  session.answers.push({id:q.id,correct,chosen:idx});
  state.totalAnswered++;
  if(correct)state.totalCorrect++;
  if(!state.catStats[q.cat])state.catStats[q.cat]={a:0,c:0};
  state.catStats[q.cat].a++;
  if(correct)state.catStats[q.cat].c++;
  if(!correct){if(!state.wrongIds.includes(q.id))state.wrongIds.push(q.id);}
  else{state.wrongIds=state.wrongIds.filter(id=>id!==q.id);}
  saveState();
  const choices=document.querySelectorAll('.choice');
  choices.forEach((el,i)=>{
    if(i===shuffledAnswerIdx)el.classList.add(correct&&i===idx?'correct':'show-correct');
    else if(i===idx)el.classList.add('wrong');
    el.style.pointerEvents='none';
  });
  if(idx===shuffledAnswerIdx)choices[idx].classList.add('correct');
  const rb=document.getElementById('result-box');
  rb.style.display='block';
  rb.className='result-box '+(correct?'':'wrong-box');
  document.getElementById('result-label').innerHTML=correct?'<span style="color:#4ade80;font-size:1.2rem;">✅ 正解！</span>':'<span style="color:#f43f5e;font-size:1.2rem;">❌ 不正解</span>';
  document.getElementById('result-explain').textContent=q.explain;
  document.getElementById('result-ref').textContent=q.ref?`📖 ${q.ref}`:'';
  document.getElementById('next-btn').style.display='block';
}

  if(session.idx>=session.qs.length){showResult();return;}

async function _putBin(data){
  const {apiKey,binId}=getSyncCfg();
  const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{
    method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':apiKey},
    body:JSON.stringify(data)
  });
  return r.ok;
}
async function syncPush(appKey, appData){
  if(!hasSyncCfg()) return false;
  try{ const e=await _fetchBin(); return await _putBin({...e,[appKey]:appData,_updated:Date.now()}); }catch(e){ return false; }
}
// ════════════════════════════════════

// ── 起動時クラウド自動ロード ──
(async()=>{
  if(!hasSyncCfg()) return;
  try{
    const data=await _fetchBin();
    if(data&&data['hunter_quiz_v1']){
      const cloud=data['hunter_quiz_v1'];
      const localRaw=localStorage.getItem('hunter_quiz_v1');
      const local=localRaw?JSON.parse(localRaw):{totalAnswered:0};
      if((cloud.totalAnswered||0)>=(local.totalAnswered||0)){
        localStorage.setItem('hunter_quiz_v1',JSON.stringify(cloud));
        state=loadState(); updateHomeStats();
        showToast('☁️ データを復元しました');
      }
    }
  }catch(e){}
})();

// ── 問題終了時の自動保存 ──
async function autoSave(){
  if(!hasSyncCfg()) return;
  try{ await syncPush('hunter_quiz_v1', state); }catch(e){}
}
</script>
