<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>散歩メモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2535;
    --accent: #00d4aa;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e8eaf0;
    --text-dim: #6b7a99;
    --border: rgba(255,255,255,0.08);
    --rec: #ff4757;
    --glow: 0 0 30px rgba(0,212,170,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* ── APP SHELL ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,15,30,0.9);
    backdrop-filter: blur(20px);
    z-index: 100;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:active { transform: scale(0.93); background: var(--surface2); }
  .icon-btn.active { color: var(--accent); border-color: var(--accent); }

  /* ── NAV TABS ── */
  .nav {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .nav-tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    user-select: none;
  }
  .nav-tab .nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PAGES ── */
  .page { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .page.active { display: flex; }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ═══════════════════════════════════
     PAGE 1: 録音
  ═══════════════════════════════════ */
  #page-rec {
    align-items: center;
    justify-content: space-between;
    padding: 24px 20px;
    gap: 20px;
  }

  /* Waveform */
  .waveform-wrap {
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    overflow: hidden;
  }
  .wave-bar {
    width: 3px;
    border-radius: 10px;
    background: var(--accent);
    opacity: 0.3;
    transition: height 0.1s ease;
    flex-shrink: 0;
  }
  .recording .wave-bar { opacity: 1; animation: wave-anim 0.5s ease-in-out infinite alternate; }
  @keyframes wave-anim {
    from { height: 4px; }
    to { height: 60px; }
  }

  /* Live transcript */
  .live-transcript {
    width: 100%;
    min-height: 80px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }
  .live-transcript .placeholder {
    color: var(--text-dim);
    font-size: 14px;
  }
  .live-transcript.active-text { border-color: rgba(0,212,170,0.3); }
  .interim { color: var(--text-dim); font-style: italic; }

  /* Big record button */
  .rec-btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .rec-btn {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 3px solid var(--rec);
    background: rgba(255,71,87,0.1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .rec-btn::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(255,71,87,0.2);
    animation: ring-pulse 2s ease-out infinite;
  }
  @keyframes ring-pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .rec-btn.pressed {
    background: rgba(255,71,87,0.25);
    border-color: var(--rec);
    transform: scale(0.95);
    box-shadow: 0 0 40px rgba(255,71,87,0.5);
  }
  .rec-icon {
    width: 40px; height: 40px;
    background: var(--rec);
    border-radius: 50%;
    transition: border-radius 0.15s ease;
  }
  .rec-btn.pressed .rec-icon { border-radius: 8px; width: 36px; height: 36px; }
  .rec-label {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.1em;
  }
  .rec-label strong { color: var(--text); }

  /* Save area */
  .save-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .tag-chip.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,170,0.1);
  }
  .save-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #00a887 100%);
    color: #0a0f1e;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .save-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .save-btn:not(:disabled):active { transform: scale(0.97); }

  /* ═══════════════════════════════════
     PAGE 2: メモ一覧
  ═══════════════════════════════════ */
  .memo-filters {
    display: flex;
    gap: 8px;
    padding: 12px 16px 0;
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .memo-filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    font-family: inherit;
  }
  .filter-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,170,0.1);
  }

  .memo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .memo-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 3px 0 0 3px;
  }
  .memo-card:active { transform: scale(0.98); background: var(--surface2); }
  .memo-card .memo-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .memo-date {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }
  .memo-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .memo-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(124,58,237,0.2);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.3);
  }
  .memo-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .memo-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 10px;
  }
  .memo-action-btn {
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .memo-action-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .memo-action-btn.danger:hover { color: var(--rec); border-color: var(--rec); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  /* ═══════════════════════════════════
     PAGE 3: AI整理
  ═══════════════════════════════════ */
  .ai-hero {
    background: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, rgba(0,212,170,0.1) 100%);
    border: 1px solid rgba(124,58,237,0.2);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .ai-hero h2 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #a78bfa;
  }
  .ai-hero p { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

  .ai-mode-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .ai-mode-btn {
    padding: 14px 10px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .ai-mode-btn .mode-icon { font-size: 22px; display: block; margin-bottom: 6px; }
  .ai-mode-btn.selected {
    border-color: var(--accent2);
    color: #a78bfa;
    background: rgba(124,58,237,0.1);
  }

  .ai-run-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent2) 0%, #5b21b6 100%);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
  }
  .ai-run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ai-run-btn:not(:disabled):active { transform: scale(0.97); }

  .ai-result {
    background: var(--surface);
    border: 1px solid rgba(124,58,237,0.2);
    border-radius: 16px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .ai-result h3 {
    font-size: 14px;
    color: #a78bfa;
    margin-bottom: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ai-loading {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0;
    color: var(--text-dim);
    font-size: 14px;
  }
  .ai-spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(124,58,237,0.3);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══════════════════════════════════
     PAGE 4: アイデアマップ
  ═══════════════════════════════════ */
  .idea-section {
    margin-bottom: 20px;
  }
  .idea-section-title {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .idea-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .idea-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .idea-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    position: relative;
  }
  .idea-card-num {
    position: absolute;
    top: 14px; right: 14px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
  }
  .idea-card-text { font-size: 14px; line-height: 1.6; padding-right: 36px; }
  .idea-card-source {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
  }

  /* ═══════════════════════════════════
     MODAL / OVERLAY
  ═══════════════════════════════════ */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 20px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slide-up 0.25s ease;
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }
  .modal-text {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 16px;
  }
  .modal-close {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
  }

  /* ═══════════════════════════════════
     SETTINGS OVERLAY
  ═══════════════════════════════════ */
  .settings-row {
    margin-bottom: 16px;
  }
  .settings-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: block;
    letter-spacing: 0.05em;
  }
  .settings-input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .settings-input:focus { border-color: var(--accent); }
  .settings-save {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #00a887 100%);
    color: #0a0f1e;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
  }
  .settings-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--accent);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 300;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── COUNT badge ─── */
  .count-badge {
    display: inline-block;
    min-width: 18px;
    height: 18px;
    background: var(--accent);
    color: #0a0f1e;
    border-radius: 9px;
    font-size: 10px;
    font-weight: 700;
    line-height: 18px;
    text-align: center;
    padding: 0 5px;
    margin-left: 4px;
  }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-title">
      <span class="dot"></span>
      散歩メモ
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-settings" title="設定">⚙️</button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <div class="nav-tab active" data-page="rec">
      <span class="nav-icon">🎤</span>録音
    </div>
    <div class="nav-tab" data-page="list">
      <span class="nav-icon">📝</span>メモ
    </div>
    <div class="nav-tab" data-page="ai">
      <span class="nav-icon">🤖</span>AI整理
    </div>
    <div class="nav-tab" data-page="map">
      <span class="nav-icon">💡</span>アイデア
    </div>
  </div>

  <!-- PAGE: 録音 -->
  <div class="page active" id="page-rec">
    <!-- waveform -->
    <div class="waveform-wrap" id="waveform"></div>

    <!-- live text -->
    <div class="live-transcript" id="live-transcript">
      <span class="placeholder" id="transcript-placeholder">録音ボタンを長押しして話してください</span>
      <span id="final-text"></span>
      <span class="interim" id="interim-text"></span>
    </div>

    <!-- record button -->
    <div class="rec-btn-wrap">
      <div class="rec-btn" id="rec-btn">
        <div class="rec-icon"></div>
      </div>
      <div class="rec-label" id="rec-label"><strong>長押し</strong>で録音</div>
    </div>

    <!-- tags + save -->
    <div class="save-area">
      <div class="tag-row" id="tag-row">
        <span class="tag-chip" data-tag="アイデア">💡 アイデア</span>
        <span class="tag-chip" data-tag="思考">🧠 思考</span>
        <span class="tag-chip" data-tag="気づき">✨ 気づき</span>
        <span class="tag-chip" data-tag="TODO">📌 TODO</span>
        <span class="tag-chip" data-tag="感情">❤️ 感情</span>
      </div>
      <button class="save-btn" id="save-btn" disabled>メモを保存</button>
    </div>
  </div>

  <!-- PAGE: メモ一覧 -->
  <div class="page" id="page-list">
    <div class="memo-filters" id="memo-filters">
      <button class="filter-chip active" data-filter="all">すべて</button>
      <button class="filter-chip" data-filter="アイデア">💡 アイデア</button>
      <button class="filter-chip" data-filter="思考">🧠 思考</button>
      <button class="filter-chip" data-filter="気づき">✨ 気づき</button>
      <button class="filter-chip" data-filter="TODO">📌 TODO</button>
      <button class="filter-chip" data-filter="感情">❤️ 感情</button>
    </div>
    <div class="scroll-area" id="memo-list-area">
      <div class="empty-state" id="empty-memos">
        <div class="empty-icon">🚶</div>
        <p>まだメモがありません<br>散歩しながら録音してみましょう！</p>
      </div>
    </div>
  </div>

  <!-- PAGE: AI整理 -->
  <div class="page" id="page-ai">
    <div class="scroll-area">
      <div class="ai-hero">
        <h2>🤖 Claude AI で整理</h2>
        <p>保存したメモをまとめて、Claude AIがカテゴリ分けや要約をしてくれます。</p>
      </div>

      <div class="ai-mode-select">
        <button class="ai-mode-btn selected" data-mode="summary">
          <span class="mode-icon">📋</span>
          まとめ・要約
        </button>
        <button class="ai-mode-btn" data-mode="categorize">
          <span class="mode-icon">🗂️</span>
          カテゴリ分け
        </button>
        <button class="ai-mode-btn" data-mode="insights">
          <span class="mode-icon">💡</span>
          インサイト抽出
        </button>
        <button class="ai-mode-btn" data-mode="action">
          <span class="mode-icon">🎯</span>
          アクション化
        </button>
      </div>

      <button class="ai-run-btn" id="ai-run-btn">✨ AI整理を実行</button>

      <div id="ai-result-area"></div>
    </div>
  </div>

  <!-- PAGE: アイデアマップ -->
  <div class="page" id="page-map">
    <div class="scroll-area" id="idea-map-area">
      <div class="empty-state">
        <div class="empty-icon">🗺️</div>
        <p>AI整理を実行すると<br>ここにアイデアが整理されます</p>
      </div>
    </div>
  </div>
</div>

<!-- MEMO DETAIL MODAL -->
<div class="overlay" id="modal-overlay">
  <div class="modal" id="memo-modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title">メモ詳細</h3>
    <div class="modal-text" id="modal-text"></div>
    <div id="modal-meta" style="margin-bottom:12px; font-size:12px; color:var(--text-dim); font-family:'Space Mono',monospace;"></div>
    <button class="modal-close" id="modal-close">閉じる</button>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settings-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>⚙️ 設定</h3>
    <div class="settings-row">
      <label class="settings-label">ANTHROPIC API KEY</label>
      <input type="password" class="settings-input" id="api-key-input" placeholder="sk-ant-...">
      <div class="settings-hint">Claude AIによる整理機能に必要です。<br>キーはこのブラウザのみに保存されます。</div>
    </div>
    <div class="settings-row">
      <label class="settings-label">データ管理</label>
      <button class="memo-action-btn danger" id="export-btn" style="width:100%;padding:12px;margin-bottom:8px;font-size:13px;">📤 データをエクスポート (JSON)</button>
      <button class="memo-action-btn danger" id="clear-btn" style="width:100%;padding:12px;font-size:13px;color:var(--rec)">🗑️ 全データを削除</button>
    </div>
    <button class="settings-save" id="settings-save">保存</button>
    <button class="modal-close" id="settings-close" style="margin-top:8px;">キャンセル</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let memos = JSON.parse(localStorage.getItem('sanpo_memos') || '[]');
let apiKey = localStorage.getItem('sanpo_apikey') || '';
let currentFilter = 'all';
let currentAiMode = 'summary';
let recognition = null;
let isRecording = false;
let finalText = '';
let selectedTags = [];
let lastAiResult = '';

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function save() {
  localStorage.setItem('sanpo_memos', JSON.stringify(memos));
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════
// WAVEFORM
// ═══════════════════════════════════════
const waveWrap = document.getElementById('waveform');
const BARS = 40;
for (let i = 0; i < BARS; i++) {
  const b = document.createElement('div');
  b.className = 'wave-bar';
  b.style.height = '4px';
  b.style.animationDelay = `${(i * 0.5 / BARS).toFixed(2)}s`;
  waveWrap.appendChild(b);
}

function animateWave(active) {
  const bars = waveWrap.querySelectorAll('.wave-bar');
  if (active) {
    waveWrap.classList.add('recording');
    bars.forEach((b, i) => {
      const h = 4 + Math.random() * 56;
      b.style.height = h + 'px';
    });
  } else {
    waveWrap.classList.remove('recording');
    bars.forEach(b => b.style.height = '4px');
  }
}

let waveInterval = null;
function startWave() {
  waveInterval = setInterval(() => {
    const bars = waveWrap.querySelectorAll('.wave-bar');
    bars.forEach(b => {
      const h = 4 + Math.random() * 60;
      b.style.height = h + 'px';
    });
  }, 100);
}
function stopWave() {
  clearInterval(waveInterval);
  waveWrap.querySelectorAll('.wave-bar').forEach(b => b.style.height = '4px');
  waveWrap.classList.remove('recording');
}

// ═══════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('⚠️ このブラウザは音声認識非対応です');
    return null;
  }
  const r = new SR();
  r.lang = 'ja-JP';
  r.continuous = true;
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalText += t;
      } else {
        interim = t;
      }
    }
    updateTranscript(interim);
  };

  r.onerror = (e) => {
    if (e.error !== 'aborted') {
      showToast('音声認識エラー: ' + e.error);
    }
    stopRecording();
  };

  r.onend = () => {
    if (isRecording) {
      try { r.start(); } catch(e) {}
    }
  };

  return r;
}

function updateTranscript(interim) {
  const ph = document.getElementById('transcript-placeholder');
  const ft = document.getElementById('final-text');
  const it = document.getElementById('interim-text');
  const area = document.getElementById('live-transcript');

  const hasText = finalText || interim;
  ph.style.display = hasText ? 'none' : 'block';
  ft.textContent = finalText;
  it.textContent = interim;

  if (hasText) area.classList.add('active-text');
  else area.classList.remove('active-text');

  document.getElementById('save-btn').disabled = !finalText.trim();
}

function startRecording() {
  if (isRecording) return;
  isRecording = true;

  if (!recognition) recognition = initSpeech();
  if (!recognition) { isRecording = false; return; }

  try { recognition.start(); } catch(e) {}

  const btn = document.getElementById('rec-btn');
  btn.classList.add('pressed');
  document.getElementById('rec-label').innerHTML = '<strong style="color:var(--rec)">録音中...</strong> 離すと停止';
  startWave();
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;

  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }

  const btn = document.getElementById('rec-btn');
  btn.classList.remove('pressed');
  document.getElementById('rec-label').innerHTML = '<strong>長押し</strong>で録音';
  stopWave();
  updateTranscript('');
}

// ═══════════════════════════════════════
// RECORD BUTTON EVENTS
// ═══════════════════════════════════════
const recBtn = document.getElementById('rec-btn');

recBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
recBtn.addEventListener('mouseup', stopRecording);
recBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });

recBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  startRecording();
}, { passive: false });

recBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  stopRecording();
}, { passive: false });

recBtn.addEventListener('touchcancel', stopRecording);

// ═══════════════════════════════════════
// TAGS
// ═══════════════════════════════════════
document.getElementById('tag-row').addEventListener('click', (e) => {
  const chip = e.target.closest('.tag-chip');
  if (!chip) return;
  const tag = chip.dataset.tag;
  if (selectedTags.includes(tag)) {
    selectedTags = selectedTags.filter(t => t !== tag);
    chip.classList.remove('selected');
  } else {
    selectedTags.push(tag);
    chip.classList.add('selected');
  }
});

// ═══════════════════════════════════════
// SAVE MEMO
// ═══════════════════════════════════════
document.getElementById('save-btn').addEventListener('click', () => {
  const text = finalText.trim();
  if (!text) return;

  const memo = {
    id: Date.now(),
    text,
    tags: [...selectedTags],
    createdAt: new Date().toISOString()
  };

  memos.unshift(memo);
  save();
  showToast('✅ メモを保存しました！');

  // reset
  finalText = '';
  selectedTags = [];
  document.getElementById('final-text').textContent = '';
  document.getElementById('interim-text').textContent = '';
  document.getElementById('transcript-placeholder').style.display = 'block';
  document.getElementById('live-transcript').classList.remove('active-text');
  document.getElementById('save-btn').disabled = true;
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('selected'));

  renderMemoList();
});

// ═══════════════════════════════════════
// MEMO LIST
// ═══════════════════════════════════════
function renderMemoList() {
  const area = document.getElementById('memo-list-area');
  const empty = document.getElementById('empty-memos');

  let filtered = currentFilter === 'all'
    ? memos
    : memos.filter(m => m.tags && m.tags.includes(currentFilter));

  if (filtered.length === 0) {
    empty.style.display = 'block';
    const existing = area.querySelectorAll('.memo-card');
    existing.forEach(el => el.remove());
    return;
  }

  empty.style.display = 'none';

  // rebuild
  area.querySelectorAll('.memo-card').forEach(el => el.remove());

  filtered.forEach(memo => {
    const card = document.createElement('div');
    card.className = 'memo-card';
    const tagsHtml = (memo.tags || []).map(t => `<span class="memo-tag">${t}</span>`).join('');
    card.innerHTML = `
      <div class="memo-meta">
        <span class="memo-date">${formatDate(memo.createdAt)}</span>
        <div class="memo-tags">${tagsHtml}</div>
      </div>
      <div class="memo-text">${escHtml(memo.text)}</div>
      <div class="memo-actions">
        <button class="memo-action-btn danger" data-del="${memo.id}">削除</button>
        <button class="memo-action-btn" data-view="${memo.id}">全文を見る</button>
      </div>
    `;
    area.appendChild(card);
  });

  // Update nav badge
  updateMemoCount();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateMemoCount() {
  const tab = document.querySelector('.nav-tab[data-page="list"]');
  const existing = tab.querySelector('.count-badge');
  if (existing) existing.remove();
  if (memos.length > 0) {
    const badge = document.createElement('span');
    badge.className = 'count-badge';
    badge.textContent = memos.length;
    tab.appendChild(badge);
  }
}

// Filter clicks
document.getElementById('memo-filters').addEventListener('click', (e) => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFilter = chip.dataset.filter;
  renderMemoList();
});

// List area click delegation
document.getElementById('memo-list-area').addEventListener('click', (e) => {
  const delBtn = e.target.closest('[data-del]');
  const viewBtn = e.target.closest('[data-view]');

  if (delBtn) {
    const id = parseInt(delBtn.dataset.del);
    if (confirm('このメモを削除しますか？')) {
      memos = memos.filter(m => m.id !== id);
      save();
      renderMemoList();
      showToast('🗑️ 削除しました');
    }
    return;
  }

  if (viewBtn) {
    const id = parseInt(viewBtn.dataset.view);
    const memo = memos.find(m => m.id === id);
    if (memo) openMemoModal(memo);
    return;
  }
});

function openMemoModal(memo) {
  document.getElementById('modal-text').textContent = memo.text;
  document.getElementById('modal-meta').textContent = formatDate(memo.createdAt) + (memo.tags?.length ? '  ·  ' + memo.tags.join(', ') : '');
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
});

// ═══════════════════════════════════════
// AI MODES
// ═══════════════════════════════════════
document.querySelectorAll('.ai-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ai-mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentAiMode = btn.dataset.mode;
  });
});

// ═══════════════════════════════════════
// AI RUN
// ═══════════════════════════════════════
document.getElementById('ai-run-btn').addEventListener('click', runAI);

async function runAI() {
  if (memos.length === 0) {
    showToast('⚠️ メモが1件もありません');
    return;
  }

  const key = localStorage.getItem('sanpo_apikey');
  if (!key) {
    showToast('⚠️ 設定からAPIキーを入力してください');
    document.getElementById('settings-overlay').classList.add('open');
    return;
  }

  const btn = document.getElementById('ai-run-btn');
  btn.disabled = true;
  const area = document.getElementById('ai-result-area');

  area.innerHTML = `
    <div class="ai-loading">
      <div class="ai-spinner"></div>
      <span>Claude AIが分析中...</span>
    </div>
  `;

  const memosText = memos.map((m, i) =>
    `[メモ${i+1}] ${formatDate(m.createdAt)}${m.tags?.length ? ` (${m.tags.join(',')})` : ''}\n${m.text}`
  ).join('\n\n---\n\n');

  const prompts = {
    summary: `以下は散歩中に音声で記録したメモです。全体を読んで、重要なポイントをわかりやすく要約してください。箇条書きや見出しを使って構造化してください。\n\n${memosText}`,
    categorize: `以下は散歩中に音声で記録したメモです。内容を分析して、テーマやカテゴリ別に整理してください。各カテゴリに関連するメモを分類して示してください。\n\n${memosText}`,
    insights: `以下は散歩中に音声で記録したメモです。このメモ群から重要なインサイト、パターン、繰り返し現れるテーマを抽出してください。表面的な内容だけでなく、深い洞察も含めてください。\n\n${memosText}`,
    action: `以下は散歩中に音声で記録したメモです。これらの考えやアイデアを実際のアクションに変換してください。「何をすべきか」「どう実行するか」を具体的なステップで示してください。\n\n${memosText}`
  };

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompts[currentAiMode] }]
      })
    });

    const data = await resp.json();

    if (data.error) throw new Error(data.error.message);

    const result = data.content?.[0]?.text || '結果を取得できませんでした';
    lastAiResult = result;

    const modeLabels = {
      summary: '📋 まとめ・要約',
      categorize: '🗂️ カテゴリ分け',
      insights: '💡 インサイト抽出',
      action: '🎯 アクション化'
    };

    area.innerHTML = `
      <div class="ai-result">
        <h3>${modeLabels[currentAiMode]}</h3>
        ${escHtml(result).replace(/\n/g, '<br>')}
      </div>
    `;

    // Update idea map
    updateIdeaMap(result, currentAiMode);
    showToast('✨ AI整理完了！');

  } catch(err) {
    area.innerHTML = `<div class="ai-result" style="border-color:rgba(255,71,87,0.3);color:var(--rec)">エラー: ${escHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════
// IDEA MAP
// ═══════════════════════════════════════
function updateIdeaMap(text, mode) {
  const area = document.getElementById('idea-map-area');

  // Simple parsing: split by lines/paragraphs for display
  const lines = text.split('\n').filter(l => l.trim());
  const sections = [];
  let currentSection = null;

  lines.forEach(line => {
    const clean = line.replace(/^#+\s*/, '').replace(/^\*+\s*/, '').replace(/^-\s*/, '').trim();
    if (!clean) return;

    // Detect headers (markdown or lines ending with : or short lines)
    if (line.match(/^#{1,3}\s/) || (clean.length < 30 && line.match(/^[^\-\*]/) && !line.match(/^\d+\./))) {
      currentSection = { title: clean, items: [] };
      sections.push(currentSection);
    } else {
      if (!currentSection) {
        currentSection = { title: 'メモ', items: [] };
        sections.push(currentSection);
      }
      currentSection.items.push(clean);
    }
  });

  if (sections.length === 0) {
    area.innerHTML = `<div class="ai-result">${escHtml(text).replace(/\n/g,'<br>')}</div>`;
    return;
  }

  let html = '';
  sections.forEach(sec => {
    if (sec.items.length === 0) return;
    html += `<div class="idea-section">
      <div class="idea-section-title">${escHtml(sec.title)}</div>
      <div class="idea-cards">`;
    sec.items.forEach((item, idx) => {
      html += `<div class="idea-card">
        <div class="idea-card-num">${String(idx+1).padStart(2,'0')}</div>
        <div class="idea-card-text">${escHtml(item)}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  area.innerHTML = html || `<div class="ai-result">${escHtml(text).replace(/\n/g,'<br>')}</div>`;
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const pageId = 'page-' + tab.dataset.page;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(pageId).classList.add('active');

    if (tab.dataset.page === 'list') renderMemoList();
  });
});

// ═══════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════
document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('api-key-input').value = apiKey;
  document.getElementById('settings-overlay').classList.add('open');
});

document.getElementById('settings-save').addEventListener('click', () => {
  const key = document.getElementById('api-key-input').value.trim();
  apiKey = key;
  localStorage.setItem('sanpo_apikey', key);
  document.getElementById('settings-overlay').classList.remove('open');
  showToast('✅ 設定を保存しました');
});

document.getElementById('settings-close').addEventListener('click', () => {
  document.getElementById('settings-overlay').classList.remove('open');
});

document.getElementById('export-btn').addEventListener('click', () => {
  const data = JSON.stringify(memos, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sanpo-memo-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 エクスポートしました');
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (confirm('⚠️ 全メモを削除しますか？この操作は元に戻せません。')) {
    memos = [];
    save();
    renderMemoList();
    document.getElementById('settings-overlay').classList.remove('open');
    showToast('🗑️ 全データを削除しました');
  }
});

document.getElementById('settings-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('settings-overlay')) {
    document.getElementById('settings-overlay').classList.remove('open');
  }
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderMemoList();
updateMemoCount();
</script>
</body>
</html>
